name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Test suite is dependency-free (Node built-in `node:test`, `assert`,
      # `child_process`, `http`). No `npm install` needed.
      - name: Run unit + integration tests
        run: node --test tests/aio.test.js tests/qa-lib.test.js tests/session.integration.test.js
