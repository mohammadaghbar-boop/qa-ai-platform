/* ─── Claude API ─────────────────────────────────────────────────────────── */
async function callAI(messages, sys="", max=4000, key="") {
  // 1 — Try local Claude Code proxy (node server.js)
  try {
    const r = await fetch("http://localhost:3456/api/ai", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ messages, system:sys })
    });
    if (r.ok) {
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      return d.text || "";
    } else {
      const d = await r.json().catch(()=>({}));
      throw new Error(d.error || "Server error " + r.status);
    }
  } catch(proxyErr) {
    if (!proxyErr.message.includes("fetch")) {
      throw proxyErr; // real error from proxy, surface it
    }
    throw new Error("AI server is not running.\n\nPlease open a terminal and run:\n  node server.js\n\nKeep it open while using the app.");
  }
}

/* ─── Jira API ───────────────────────────────────────────────────────────── */
async function callJira(proj, method, path, body=null) {
  if (!proj?.jiraUrl||!proj?.jiraToken||!proj?.jiraEmail) throw new Error("Jira not configured");
  const auth = btoa(proj.jiraEmail+":"+proj.jiraToken);
  // Route through local proxy to avoid CORS
  try {
    const r = await fetch("http://localhost:3456/api/jira", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ jiraUrl:proj.jiraUrl, path, method, auth, body })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    return d;
  } catch(proxyErr) {
    if (!proxyErr.message.includes("fetch")) throw proxyErr;
    // Proxy not running — try direct (may fail due to CORS)
    const opts = { method, headers:{"Authorization":"Basic "+auth,"Content-Type":"application/json","Accept":"application/json"} };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(proj.jiraUrl+"/rest/api/3"+path, opts);
    if (!r.ok) { const t=await r.text(); throw new Error("Jira "+r.status+": "+t.slice(0,100)); }
    return r.json();
  }
}

/* ─── File helpers ───────────────────────────────────────────────────────── */
function dlFile(content, name, mime="text/plain") {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content],{type:mime}));
  a.download = name; a.click();
}
function exportCSV(cases, sid) {
  const h = ["ID","Title","Type","Preconditions","Steps","Expected","Platform","Automatable"];
  const rows = cases.filter(c=>c.status==="approved").map(c=>[
    c.id,c.title,c.type,c.preconditions||"",(c.steps||[]).join(" | "),c.expected||"",c.platform||"web",c.automatable===false?"No":"Yes"
  ]);
  const csv = [h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  dlFile("\uFEFF"+csv,"AIO_"+sid+".csv","text/csv;charset=utf-8");
}

/* ─── Markdown renderer for chat ─────────────────────────────────────────── */
function renderMd(text){
  const lines=text.split("\n");
  const out=[];let i=0;
  while(i<lines.length){
    const l=lines[i];
    // heading
    if(/^###\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:13,marginTop:10,marginBottom:2}}>{l.replace(/^###\s/,"")}</div>);i++;continue;}
    if(/^##\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:14,marginTop:12,marginBottom:3}}>{l.replace(/^##\s/,"")}</div>);i++;continue;}
    if(/^#\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:15,marginTop:14,marginBottom:4}}>{l.replace(/^#\s/,"")}</div>);i++;continue;}
    // bullet list
    if(/^[-*]\s/.test(l)){
      const items=[];
      while(i<lines.length&&/^[-*]\s/.test(lines[i])){items.push(lines[i].replace(/^[-*]\s/,""));i++;}
      out.push(<ul key={i} style={{margin:"4px 0 4px 18px",padding:0}}>{items.map((it,j)=><li key={j} style={{marginBottom:2}}>{inlineMd(it)}</li>)}</ul>);
      continue;
    }
    // numbered list
    if(/^\d+\.\s/.test(l)){
      const items=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s/,""));i++;}
      out.push(<ol key={i} style={{margin:"4px 0 4px 18px",padding:0}}>{items.map((it,j)=><li key={j} style={{marginBottom:2}}>{inlineMd(it)}</li>)}</ol>);
      continue;
    }
    // horizontal rule
    if(/^---+$/.test(l.trim())){out.push(<hr key={i} style={{border:"none",borderTop:"1px solid var(--color-border-tertiary)",margin:"8px 0"}}/>);i++;continue;}
    // blank line
    if(l.trim()===""){out.push(<div key={i} style={{height:6}}/>);i++;continue;}
    // paragraph
    out.push(<div key={i} style={{marginBottom:2}}>{inlineMd(l)}</div>);i++;
  }
  return out;
}
function inlineMd(text){
  // split on bold, italic, inline code
  const parts=[];let rest=text;let k=0;
  const re=/(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;let m;let last=0;
  while((m=re.exec(rest))!==null){
    if(m.index>last)parts.push(<span key={k++}>{rest.slice(last,m.index)}</span>);
    if(m[2])parts.push(<strong key={k++}>{m[2]}</strong>);
    else if(m[3])parts.push(<em key={k++}>{m[3]}</em>);
    else if(m[4])parts.push(<code key={k++} style={{background:"var(--color-background-secondary)",borderRadius:3,padding:"1px 5px",fontSize:12,fontFamily:"monospace"}}>{m[4]}</code>);
    last=m.index+m[0].length;
  }
  if(last<rest.length)parts.push(<span key={k++}>{rest.slice(last)}</span>);
  return parts.length>0?parts:text;
}

/* ─── AI Chat ─────────────────────────────────────────────────────────────── */
function AIChat({proj,sid,sdata,cases=[],gapText="",result=null,sessionBugs=[],coverageText="",platform=""}) {
  const [msgs,setMsgs]=useState([{role:"assistant",text:"Hi! I can see your full story, test cases, execution results and bugs. Ask me anything!"}]);
  const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const [jiraCtx,setJiraCtx]=useState("");
  const msgsRef=useRef(null);
  useEffect(()=>{if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);

  // Pre-fetch story Jira context on open
  useEffect(()=>{
    if(!proj?.jiraProjKey||!sid)return;
    (async()=>{
      try{
        const issue=await callJira(proj,"GET","/issue/"+sid+"?fields=summary,status,assignee,priority,description,issuetype,comment");
        const comments=(issue.fields?.comment?.comments||[]).slice(-3).map(c=>`  [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}"`).join("\n");
        const ctx=`Current Jira story:\n  Key: ${issue.key}\n  Summary: ${issue.fields?.summary}\n  Status: ${issue.fields?.status?.name}\n  Priority: ${issue.fields?.priority?.name}\n  Assignee: ${issue.fields?.assignee?.displayName||"Unassigned"}\n  Type: ${issue.fields?.issuetype?.name}${comments?"\n  Recent comments:\n"+comments:""}`;
        setJiraCtx(ctx);
      }catch{setJiraCtx("");}
    })();
  },[sid]);

  const isJiraQuery=t=>/bug|issue|ticket|jira|open|status|assign|sprint|backlog|comment|story|task|priority|close|resolve|report|list|show|fetch|get|[A-Z]+-\d+/i.test(t);

  const fetchJiraData=async(q)=>{
    if(!proj?.jiraProjKey)return"";
    const parts=[];
    try{
      // fetch specific issue keys mentioned in query e.g. JF-10, PROJ-5
      const keyMatches=[...new Set((q.match(/[A-Za-z]+-\d+/g)||[]).map(k=>k.toUpperCase()))];
      for(const key of keyMatches){
        try{
          const issue=await callJira(proj,"GET",`/issue/${key}?fields=summary,status,assignee,priority,description,issuetype,comment`);
          const descText=issue.fields?.description?.content?.[0]?.content?.[0]?.text||"";
          const comments=(issue.fields?.comment?.comments||[]).slice(-3).map(c=>`    [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}`).join("\n");
          parts.push(`Issue ${issue.key}:\n  Summary: ${issue.fields?.summary}\n  Type: ${issue.fields?.issuetype?.name}\n  Status: ${issue.fields?.status?.name}\n  Priority: ${issue.fields?.priority?.name}\n  Assignee: ${issue.fields?.assignee?.displayName||"Unassigned"}${descText?"\n  Description: "+descText:""}${comments?"\n  Recent comments:\n"+comments:""}`);
        }catch{}
      }
      // fetch active sprint tickets
      if(/sprint/i.test(q)){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND sprint in openSprints() ORDER BY priority ASC`,maxResults:20,fields:["summary","status","issuetype","assignee","priority"]});
          const items=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.issuetype?.name}/${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name} (${i.fields?.assignee?.displayName||"Unassigned"})`).join("\n");
          parts.push(items?`Active sprint tickets in ${proj.jiraProjKey} (${r.issues?.length||0}):\n${items}`:`No active sprint found in ${proj.jiraProjKey}.`);
        }catch(e){parts.push(`Could not fetch sprint data: ${e.message}`);}
      }
      // fetch open bugs for project
      if(/bug/i.test(q)){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND issuetype=Bug AND status!=Done ORDER BY created DESC`,maxResults:10,fields:["summary","status","priority","assignee"]});
          const bugs=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name} (${i.fields?.assignee?.displayName||"Unassigned"})`).join("\n");
          parts.push(bugs?`Open bugs in ${proj.jiraProjKey}:\n${bugs}`:`No open bugs found.`);
        }catch(e){parts.push(`Could not fetch bugs: ${e.message}`);}
      }
      // fetch recent issues
      if(/issue|ticket|task|list|show|fetch|open/i.test(q)&&!/bug|sprint/i.test(q)&&keyMatches.length===0){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND status!=Done ORDER BY updated DESC`,maxResults:10,fields:["summary","status","issuetype","assignee","priority"]});
          const issues=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.issuetype?.name}/${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name}`).join("\n");
          parts.push(issues?`Recent open issues in ${proj.jiraProjKey}:\n${issues}`:`No open issues found.`);
        }catch(e){parts.push(`Could not fetch issues: ${e.message}`);}
      }
      // fetch comments on current story
      if(sid&&/comment/i.test(q)&&keyMatches.length===0){
        try{
          const r=await callJira(proj,"GET","/issue/"+sid+"/comment?maxResults=5");
          const comments=(r.comments||[]).map(c=>`  [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}`).join("\n");
          if(comments)parts.push(`Comments on ${sid}:\n${comments}`);
        }catch{}
      }
    }catch{}
    return parts.join("\n\n");
  };

  const send=async()=>{
    if(!msg.trim()||busy)return;
    const u=msg.trim(); setMsg(""); setMsgs(m=>[...m,{role:"user",text:u}]); setBusy(true);
    const hist=msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    try{
      let liveCtx="";
      if(isJiraQuery(u))liveCtx=await fetchJiraData(u);
      const jiraSection=[jiraCtx,liveCtx].filter(Boolean).join("\n\n");

      // Build workspace context from current session data
      const storySection=sdata?`USER STORY:\n  ID: ${sid}\n  Summary: ${sdata.summary||""}\n  Description: ${sdata.description||sdata.rawText||""}\n  Platform: ${platform}`:sid?`Story ID: ${sid}`:"No story loaded yet.";
      const gapSection=gapText?`GAP ANALYSIS:\n${gapText}`:"";
      const casesSection=cases.length>0?`TEST CASES (${cases.length} total):\n${cases.map(c=>`  [${c.status?.toUpperCase()||"PENDING"}] ${c.id} (${c.type}): ${c.title}${c.steps?.length?"\n    Steps: "+c.steps.join(" → "):""}`).join("\n")}`:"No test cases yet.";
      const resultSection=result?`EXECUTION RESULTS:\n  Total: ${result.total} | Passed: ${result.pass?.length||0} | Failed: ${result.fail?.length||0}\n  Passed: ${(result.pass||[]).join(", ")||"none"}\n  Failed: ${(result.fail||[]).join(", ")||"none"}`:"No execution results yet.";
      const bugsSection=sessionBugs.length>0?`BUGS FILED (${sessionBugs.length}):\n${sessionBugs.map(b=>`  ${b.bid} [${b.sev}]: ${b.summary}${b.jKey?" → "+b.jKey:""}`).join("\n")}`:"No bugs filed yet.";
      const coverageSection=coverageText?`COVERAGE REPORT:\n${coverageText}`:"";

      const workspaceCtx=[storySection,gapSection,casesSection,resultSection,bugsSection,coverageSection].filter(Boolean).join("\n\n");
      const sys=`You are a QA expert assistant embedded in the QA AI Platform. CRITICAL RULES:\n1. You have ZERO tools and ZERO external access. You cannot call any APIs.\n2. NEVER mention permissions, tool access, approvals, or ask the user to do anything to grant access.\n3. All Jira data you will ever receive has already been fetched by the app and is shown below under "JIRA DATA". If it is empty, say "No data was returned from Jira for this query" and stop.\n4. Answer only from the context provided below and your QA expertise.\n\nProject: ${proj?.name||"—"} (Jira key: ${proj?.jiraProjKey||"—"})\n\n=== CURRENT SESSION ===\n${workspaceCtx}\n${jiraSection?`\n=== JIRA DATA (already fetched by the app) ===\n${jiraSection}`:"\n=== JIRA DATA ===\n(No Jira data was fetched for this query.)"}\n\nBe concise. Reference IDs and keys by name when relevant.`;
      const r=await callAI([...hist,{role:"user",content:u}],sys,2000,proj?.anthropicKey||"");
      setMsgs(m=>[...m,{role:"assistant",text:r}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"Error: "+e.message}]);}
    setBusy(false);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {jiraCtx&&<div style={{fontSize:11,color:"var(--color-text-tertiary)",padding:"4px 0 8px",display:"flex",alignItems:"center",gap:5}}>
      <span style={{width:7,height:7,borderRadius:"50%",background:"#36B37E",display:"inline-block"}}/>Connected to Jira · {proj?.jiraProjKey}{sid?" · "+sid:""}
    </div>}
    <div ref={msgsRef} style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,fontSize:13,lineHeight:1.65,background:m.role==="user"?"var(--color-text-info)":"var(--color-background-primary)",color:m.role==="user"?"#fff":"var(--color-text-primary)",border:m.role==="assistant"?"1px solid var(--color-border-tertiary)":"none"}}>
          {m.role==="assistant"?renderMd(m.text):<span style={{whiteSpace:"pre-wrap"}}>{m.text}</span>}
        </div>
      </div>)}
      {busy&&<div style={{alignSelf:"flex-start",padding:"10px 14px",borderRadius:12,background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",fontSize:13,color:"var(--color-text-tertiary)"}}>Thinking…</div>}
    </div>
    <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1px solid var(--color-border-tertiary)"}}>
      <input style={{...inp,flex:1,fontSize:13}} value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask about this story, open bugs, Jira issues…"/>
      <Btn v="primary" onClick={send} disabled={busy}>Send</Btn>
    </div>
  </div>;
}

/* ─── ADF text extractor (recursive) ────────────────────────────────────── */
function adfToText(node) {
  if (!node) return '';
  if (node.type === 'text') {
    const link = (node.marks||[]).find(m=>m.type==='link');
    return link ? `${node.text||''} (${link.attrs?.href||''})` : (node.text||'');
  }
  if (node.type === 'inlineCard' || node.type === 'blockCard' || node.type === 'embedCard') return node.attrs?.url||'';
  if (node.type === 'hardBreak') return '\n';
  const inner = (node.content||[]).map(adfToText).join('');
  return ['paragraph','heading','listItem','bulletList','orderedList','blockquote','panel','rule'].includes(node.type) ? inner+'\n' : inner;
}

      <div style={overlayStyle} onClick={()=>setSaveModal(null)}>
        <div style={boxStyle} onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:600,fontSize:16,marginBottom:4}}>Choose a sprint</div>
          <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:14}}>Select which sprint this session belongs to.</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflow:"auto",marginBottom:14}}>
            {cats.length===0&&<div style={{fontSize:13,color:"var(--color-text-tertiary)",padding:"8px 0"}}>No sprints yet. Create one below.</div>}
            {cats.map(c=>{
              const stories=DB.savedStories.filter(s=>s.categoryId===c.id);
              return <div key={c.id} onClick={()=>commitSave(saveModal.name||sid,c.id)} style={{borderRadius:8,border:"1px solid var(--color-border-secondary)",padding:"10px 14px",cursor:"pointer",background:"var(--color-background-secondary)"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--color-text-info)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--color-border-secondary)"}>
                <div style={{fontWeight:500,fontSize:14}}>{c.name}</div>
                <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:2}}>{stories.length} session{stories.length!==1?"s":""}{stories.length>0?" · "+stories.map(s=>s.sid).join(", "):""}</div>
              </div>;
            })}
          </div>
          <div style={{borderTop:"1px solid var(--color-border-tertiary)",paddingTop:12,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:6}}>Create new sprint</div>
            <div style={{display:"flex",gap:8}}>
              <input style={{...inp,flex:1,fontSize:13}} value={saveModal.newCat||""} onChange={e=>setSaveModal(m=>({...m,newCat:e.target.value}))} placeholder="e.g. Sprint 3" onKeyDown={e=>{if(e.key==="Enter"&&saveModal.newCat?.trim()){const c={id:uid(),name:saveModal.newCat.trim(),createdAt:Date.now()};DB.categories.push(c);saveDB();commitSave(saveModal.name||sid,c.id);}}}/>
              <Btn v="primary" onClick={()=>{if(!saveModal.newCat?.trim())return;const c={id:uid(),name:saveModal.newCat.trim(),createdAt:Date.now()};DB.categories.push(c);saveDB();commitSave(saveModal.name||sid,c.id);}}>Create & Save</Btn>
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
            <button onClick={()=>setSaveModal(m=>({...m,step:1}))} style={ghostBtn}>← Back</button>
            <button onClick={()=>commitSave(saveModal.name||sid,null)} style={{...ghostBtn,fontSize:12,color:"var(--color-text-tertiary)"}}>Save without sprint</button>
          </div>
        </div>
      </div>);
  })();

  return <div>
    {SaveModal}
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
      <div><div style={{fontSize:20,fontWeight:500,marginBottom:4}}>QA Workspace</div>
        <div style={{fontSize:13,color:"var(--color-text-secondary)",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <span>Project: <b>{proj.name}</b></span><Tag c="blue">{proj.jiraProjKey}</Tag>
          {phase!=="input"&&<Tag c={platform==="mobile"?"amber":"blue"}>{platform}</Tag>}
          {sdata&&<Tag c={sdata.sim?"":"green"}>{sdata.sim?"AI simulation":"Jira ✓"}</Tag>}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        {phase!=="input"&&sid&&<button onClick={openSaveModal} style={ghostBtn} title="Save current session to history">💾 Save</button>}
        {phase!=="input"&&sid&&<button onClick={reset} disabled={!hasSaved} title={hasSaved?"Start a new story":"Save first to enable"} style={{...ghostBtn,opacity:hasSaved?1:0.4,cursor:hasSaved?"pointer":"not-allowed"}}>↩ New story</button>}
        {phase!=="input"&&<button onClick={()=>setChat(o=>!o)} style={ghostBtn}>{chat?"Hide chat":"🤖 AI Chat"}</button>}
        {phase==="coverage"&&<button onClick={saveAndReset} style={ghostBtn}>↩ New story</button>}
      </div>
    </div>
    <StepBar steps={WS_STEPS} cur={WS_IDX[phase]??0} onStepClick={goToStep}/>
    <div style={{display:"flex",gap:16}}>
      <div style={{flex:1,minWidth:0}}>
        {loading&&<Loader msg={lmsg}/>}

        {!loading&&phase==="input"&&<div>
          {hist.length>0&&<div style={{...card,padding:"12px 16px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8}}>Recent stories</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{hist.slice().reverse().slice(0,5).map((h,i)=><button key={i} onClick={()=>setSid(h.sid)} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>{h.sid} {h.passed}P/{h.failed}F</button>)}</div>
          </div>}
          <div style={card}><H2>Enter Jira story ID</H2>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:12}}>{proj.jiraToken?<Tag c="green">✓ Jira configured</Tag>:<Tag c="amber">No token — AI simulation</Tag>}</div>
            <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
              <div style={{flex:1}}><Lbl>Story ID</Lbl><input style={inp} value={sid} onChange={e=>{setSid(e.target.value);setFetchError("");}} placeholder={proj.jiraProjKey+"-123"} onKeyDown={e=>e.key==="Enter"&&sid&&doFetch()}/></div>
              <Btn v="primary" onClick={()=>sid&&doFetch()}>Fetch story →</Btn>
            </div>
            {fetchError&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:8,background:"var(--color-background-danger)",border:"1px solid var(--color-text-danger)",color:"var(--color-text-danger)",fontSize:13}}>⚠ {fetchError}</div>}
          </div>
        </div>}

        {!loading&&phase==="mode"&&<div>
          {sdata&&!sdata.sim&&<div style={{...card,background:"var(--color-background-success)",marginBottom:12}}>
            <div style={{fontWeight:500,marginBottom:6}}>{sdata.summary}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:13,color:"var(--color-text-secondary)",alignItems:"center"}}>
              <Tag c="blue">{sdata.type}</Tag><Tag c="amber">{sdata.status}</Tag><span>{sdata.assignee}</span><Tag c={sdata.priority==="High"?"red":"blue"}>{sdata.priority}</Tag>
              {(sdata.labels||[]).map((l,i)=><Tag key={i}>{l}</Tag>)}
            </div>
            {sdata.description&&<div style={{fontSize:13,marginTop:6,lineHeight:1.5}}>{sdata.description.slice(0,200)}</div>}
          </div>}
          {proj.platform==="both"&&<div style={{...card,marginBottom:12}}><H2>Select platform for this story</H2><div style={{display:"flex",gap:12,marginTop:12}}>{[{v:"web",icon:"🌐",label:"Web",sub:"Playwright"},{v:"mobile",icon:"📱",label:"Mobile",sub:"Appium"}].map(o=><button key={o.v} onClick={()=>setPlatform(o.v)} style={{flex:1,padding:16,borderRadius:12,border:"2px solid "+(platform===o.v?"var(--color-text-info)":"var(--color-border-secondary)"),background:platform===o.v?"var(--color-background-info)":"var(--color-background-primary)",cursor:"pointer",textAlign:"left"}}><div style={{fontSize:22,marginBottom:4}}>{o.icon}</div><div style={{fontWeight:500,fontSize:14}}>{o.label}</div><div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{o.sub}</div></button>)}</div></div>}
          <div style={card}><div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}}>Story: <b>{sid}</b></div><H2>What would you like to do?</H2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{icon:"🔍",title:"Story review + GAP analysis",desc:"Analyze ACs for gaps and missing scenarios.",fn:doGap},{icon:"📝",title:"Write test cases",desc:"Generate structured manual test cases.",fn:()=>setPhase("ctype")}].map(o=><button key={o.title} onClick={o.fn} style={{padding:20,borderRadius:12,border:"1px solid var(--color-border-secondary)",background:"var(--color-background-primary)",cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:24,marginBottom:8}}>{o.icon}</div><div style={{fontWeight:500,fontSize:15,marginBottom:4}}>{o.title}</div><div style={{fontSize:13,color:"var(--color-text-secondary)",lineHeight:1.5}}>{o.desc}</div>
              </button>)}
            </div>
          </div>
        </div>}

        {!loading&&phase==="gap"&&<div>
          <div style={card}><div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}><Tag c="blue">{sid}</Tag><span style={{fontWeight:500}}>GAP Analysis</span></div><div style={{whiteSpace:"pre-wrap",fontSize:14,lineHeight:1.85}}>{gapText}</div></div>
          <Confirm icon="📝" title="Would you like to write test cases?" onYes={()=>setPhase("ctype")} yesLabel="Yes, write test cases"/>
        </div>}

        {!loading&&phase==="ctype"&&<div style={card}>
          <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}}>Story: <b>{sid}</b></div><H2>Which test case types?</H2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {(()=>{const ect=[...new Set(cases.map(c=>c.type))];return [{k:"happy",l:"Happy flow",d:"Core successful journeys"},{k:"edge",l:"Edge cases",d:"Boundary values"},{k:"negative",l:"Negative cases",d:"Error handling"},{k:"all",l:"All of the above",d:"Full coverage"}].map(o=>{const isDisabled=ctypes.includes("all")&&o.k!=="all";const hasCases=o.k==="all"?false:ect.includes(o.k);const count=hasCases?cases.filter(c=>c.type===o.k).length:0;return <label key={o.k} style={{display:"flex",gap:10,padding:14,borderRadius:10,border:"1px solid "+(ctypes.includes(o.k)?"var(--color-text-info)":"var(--color-border-secondary)"),background:ctypes.includes(o.k)?"var(--color-background-info)":isDisabled?"var(--color-background-tertiary)":"var(--color-background-primary)",cursor:isDisabled?"not-allowed":"pointer",opacity:isDisabled?0.45:1}}>
              <input type="checkbox" checked={ctypes.includes(o.k)} disabled={isDisabled} onChange={()=>{if(o.k==="all"){setCtypes(p=>p.includes("all")?[]:["all"]);}else{setCtypes(p=>{const w=p.filter(x=>x!=="all"&&x!==o.k);return p.includes(o.k)?w:[...w,o.k];});}}} style={{marginTop:2}}/>
              <div><div style={{fontWeight:500,display:"flex",alignItems:"center",gap:6}}>{o.l}{hasCases&&<span style={{fontSize:11,color:"var(--color-text-success)",fontWeight:400}}>✓ {count} cases</span>}</div><div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{hasCases?"Will be kept — uncheck to remove":o.d}</div></div>
            </label>;});})()}
          </div>
          <Btn v="primary" onClick={()=>ctypes.length>0&&doGen()} disabled={ctypes.length===0}>Generate test cases →</Btn>
        </div>}

        {!loading&&phase==="ready"&&<div>
          <Banner icon="✅" title={cases.length+" test cases generated"} sub={"Platform: "+platform+" · "+autoable.length+" automatable · "+manOnly.length+" manual-only"} color="success"/>
          <div style={card}>{cases.map(c=><div key={c.id} style={{padding:"9px 0",borderBottom:"1px solid var(--color-border-tertiary)",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}><Tag c="blue">{c.id}</Tag><Tag c={tcol(c.type)}>{c.type}</Tag>{c.automatable===false&&<Tag>manual only</Tag>}<span style={{fontSize:14}}>{c.title}</span></div>)}</div>
          <Confirm icon="🔍" title="Would you like to review and edit the test cases?" desc="Approve, reject, and modify each case before proceeding." onYes={()=>{setEditOn(true);setPhase("review");}} onNo={()=>{setCases(cs=>cs.map(c=>({...c,status:"approved"})));setPhase("jira");}} yesLabel="Yes, review" noLabel="Approve all"/>
        </div>}

        {!loading&&phase==="review"&&<div>
          <div style={{...card,padding:"12px 20px",display:"flex",alignItems:"center",gap:16}}>
            <div style={{flex:1,fontSize:14}}>Story: <b>{sid}</b> · <Tag c={platform==="mobile"?"amber":"blue"}>{platform}</Tag></div>
            <div style={{fontSize:13,display:"flex",gap:12,alignItems:"center"}}>
              <span style={{color:"var(--color-text-success)"}}>✓ {cases.filter(c=>c.status==="approved").length}</span>
              <span style={{color:"var(--color-text-danger)"}}>✗ {cases.filter(c=>c.status==="rejected").length}</span>
              <span style={{color:"var(--color-text-tertiary)"}}>⏳ {cases.filter(c=>c.status==="pending").length}</span>
            </div>
          </div>
          {cases.map(c=><div key={c.id} style={{...card,borderLeft:"3px solid "+(c.status==="approved"?"var(--color-text-success)":c.status==="rejected"?"var(--color-text-danger)":"var(--color-border-secondary)")}}>
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}><Tag c="blue">{c.id}</Tag><Tag c={tcol(c.type)}>{c.type}</Tag>{c.automatable===false&&<Tag>manual only</Tag>}{c.status==="approved"&&<Tag c="green">✓ approved</Tag>}{c.status==="rejected"&&<span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:12,fontWeight:500,background:"var(--color-background-danger)",color:"var(--color-text-danger)"}}>✗ rejected</span>}</div>
                <Lbl>Title</Lbl><input style={{...inp,marginBottom:8,fontWeight:500}} value={c.title} onChange={e=>editC(c.id,"title",e.target.value)} disabled={!editOn}/>
                <Lbl>Preconditions</Lbl><input style={{...inp,marginBottom:8}} value={c.preconditions||""} onChange={e=>editC(c.id,"preconditions",e.target.value)} disabled={!editOn}/>
                <Lbl>Steps</Lbl>{(c.steps||[]).map((step,si)=><div key={si} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}><span style={{fontSize:11,color:"var(--color-text-tertiary)",minWidth:18}}>{si+1}.</span><input style={inp} value={step} onChange={e=>editS(c.id,si,e.target.value)} disabled={!editOn}/></div>)}
                {editOn&&<button onClick={()=>addStep(c.id)} style={{marginTop:6,padding:"4px 10px",borderRadius:6,border:"1px dashed var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>+ Add step</button>}
                <Lbl>Expected result</Lbl><input style={inp} value={c.expected||""} onChange={e=>editC(c.id,"expected",e.target.value)} disabled={!editOn}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,minWidth:96}}><Btn v="success" onClick={()=>approve(c.id)}>✓ Approve</Btn><Btn v="danger" onClick={()=>reject(c.id)}>✗ Reject</Btn></div>
            </div>
          </div>)}
          <div style={{marginBottom:16}}>
            <button onClick={()=>setShowAddCase(o=>!o)} style={{...ghostBtn,borderStyle:"dashed"}}>+ Add test case manually</button>
          </div>
          {showAddCase&&<div style={{...card,border:"2px dashed var(--color-border-secondary)",marginBottom:16}}>
            <div style={{fontWeight:500,marginBottom:12}}>New manual test case</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div style={{gridColumn:"1/-1"}}><Lbl>Title</Lbl><input style={inp} value={newCase.title} onChange={e=>setNewCase(p=>({...p,title:e.target.value}))} placeholder="e.g. Submit form with valid data"/></div>
              <div><Lbl>Type</Lbl><select style={sel} value={newCase.type} onChange={e=>setNewCase(p=>({...p,type:e.target.value}))}><option value="happy">Happy flow</option><option value="edge">Edge case</option><option value="negative">Negative</option></select></div>
              <div><Lbl>Platform</Lbl><select style={sel} value={newCase.platform} onChange={e=>setNewCase(p=>({...p,platform:e.target.value}))}><option value="web">Web</option><option value="mobile">Mobile</option></select></div>
              <div style={{gridColumn:"1/-1"}}><Lbl>Preconditions</Lbl><input style={inp} value={newCase.preconditions} onChange={e=>setNewCase(p=>({...p,preconditions:e.target.value}))} placeholder="e.g. User is logged in"/></div>
            </div>
            <Lbl>Steps</Lbl>
            {newCase.steps.map((s,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--color-text-tertiary)",minWidth:18}}>{i+1}.</span>
              <input style={inp} value={s} onChange={e=>setNewCase(p=>({...p,steps:p.steps.map((x,j)=>j===i?e.target.value:x)}))} placeholder={"Step "+(i+1)}/>
              {newCase.steps.length>1&&<button onClick={()=>setNewCase(p=>({...p,steps:p.steps.filter((_,j)=>j!==i)}))} style={{padding:"4px 8px",borderRadius:6,border:"none",background:"var(--color-background-danger)",color:"var(--color-text-danger)",cursor:"pointer",fontSize:12}}>✕</button>}
            </div>)}
            <button onClick={()=>setNewCase(p=>({...p,steps:[...p.steps,""]}))} style={{marginBottom:10,padding:"4px 10px",borderRadius:6,border:"1px dashed var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>+ Add step</button>
            <div style={{marginBottom:12}}><Lbl>Expected result</Lbl><input style={inp} value={newCase.expected} onChange={e=>setNewCase(p=>({...p,expected:e.target.value}))} placeholder="e.g. Success message shown"/></div>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,marginBottom:14,cursor:"pointer"}}>
              <input type="checkbox" checked={newCase.automatable} onChange={e=>setNewCase(p=>({...p,automatable:e.target.checked}))}/> Automatable
            </label>
            <div style={{display:"flex",gap:8}}><Btn v="primary" onClick={addManualCase}>Add case</Btn><button onClick={()=>setShowAddCase(false)} style={ghostBtn}>Cancel</button></div>
          </div>}
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {cases.filter(c=>c.status==="pending").length>0
              ?<Btn v="primary" onClick={()=>{setCases(cs=>cs.map(c=>c.status==="pending"?{...c,status:"approved"}:c));setPhase("jira");}}>✓ Approve {cases.filter(c=>c.status==="pending").length} Remaining & Continue</Btn>
              :<Btn v="primary" onClick={()=>setPhase("jira")}>Continue →</Btn>}
          </div>
        </div>}

        {!loading&&phase==="jira"&&<div>
          <div style={{...card,padding:"16px 20px"}}>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:14}}>Story <b>{sid}</b> · <b>{approved.length}</b> approved cases · <Tag c={platform==="mobile"?"amber":"blue"}>{platform}</Tag></div>
            <div style={{display:"flex",gap:10}}>
              <Btn v="primary" onClick={()=>{exportCSV(cases,sid);setAppUrl("");setPhase("urlPrompt");}}>⬇ Export AIO CSV</Btn>
              <button onClick={()=>{setAppUrl("");setPhase("urlPrompt");}} style={ghostBtn}>Skip</button>
            </div>
          </div>
        </div>}

        {!loading&&phase==="urlPrompt"&&<div>
          <div style={card}>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}><span style={{fontSize:20}}>🔗</span><span style={{fontWeight:500,fontSize:16}}>Application URL</span></div>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16,lineHeight:1.6}}>Enter the URL of the application under test. This will be used as the base URL when generating your automation scripts.</div>
            <Lbl>Application URL <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input
              autoFocus
              style={{...inp,marginBottom:16,fontSize:14}}
              value={appUrl}
              onChange={e=>setAppUrl(e.target.value)}
              placeholder="https://example.com"
              onKeyDown={e=>e.key==="Enter"&&appUrl.trim()&&setPhase("scriptSelect")}
            />
            <div style={{display:"flex",gap:10}}>
              <Btn v="primary" onClick={()=>appUrl.trim()&&setPhase("scriptSelect")} disabled={!appUrl.trim()}>Continue to Script Generation →</Btn>
            </div>
          </div>
        </div>}

        {!loading&&phase==="scriptSelect"&&<div>
          <Banner icon="🤖" title="Select cases to automate" sub={autoable.length+" automatable cases available · "+manOnly.length+" manual-only (excluded)"} color="info"/>
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <H2>Choose cases for script generation</H2>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setSelectedForScripts(autoable.map(c=>c.id))} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>Select all</button>
                <button onClick={()=>setSelectedForScripts([])} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>Clear</button>
              </div>
            </div>
            {autoable.map(c=><label key={c.id} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer",alignItems:"center"}}>
              <input type="checkbox" checked={selectedForScripts.includes(c.id)} onChange={()=>setSelectedForScripts(p=>p.includes(c.id)?p.filter(x=>x!==c.id):[...p,c.id])}/>
              <Tag c="blue">{c.id}</Tag><Tag c={tcol(c.type)}>{c.type}</Tag><span style={{fontSize:14,flex:1}}>{c.title}</span>
            </label>)}
            {autoable.length===0&&<div style={{color:"var(--color-text-tertiary)",fontSize:14}}>No automatable cases.</div>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn v="primary" onClick={()=>selectedForScripts.length>0&&doScripts()} disabled={selectedForScripts.length===0}>Generate Scripts ({selectedForScripts.length} cases)</Btn>
          </div>
        </div>}

        {!loading&&phase==="autoReady"&&<div>
          {fixed&&<Banner icon="🔧" title="Scripts fixed" sub="Failures addressed." color="info"/>}
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}><div style={{fontWeight:500}}>Automation scripts</div><Tag c={platform==="mobile"?"amber":"blue"}>{fwName(platform)}</Tag></div>
            {platform==="mobile"?<Tabs tabs={[{id:"ios",label:"iOS (Appium)"},{id:"android",label:"Android (Appium)"}]} active={tab} onChange={setTab}/>:<Tabs tabs={[{id:"web",label:"Web automation script"}]} active={tab} onChange={setTab}/>}
            <pre style={{background:"var(--color-background-tertiary)",borderRadius:8,padding:16,fontSize:12,fontFamily:"monospace",lineHeight:1.6,overflow:"auto",maxHeight:360,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0,marginBottom:12}}>{curScript||"No script yet."}</pre>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button onClick={()=>navigator.clipboard?.writeText(curScript)} style={ghostBtn}>📋 Copy</button><button onClick={()=>dlFile(curScript,tab==="web"?sid+".spec.js":sid+"_"+tab+".test.js","text/javascript")} style={ghostBtn}>⬇ Download</button></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn v="primary" onClick={()=>setPhase("runAsk")}>▶ Run Tests</Btn>
          </div>
        </div>}

        {!loading&&phase==="runAsk"&&<Confirm icon="▶️" title="Start test execution?" desc={"Live terminal output for "+selectedForScripts.length+" selected scripts."} onYes={doRun} yesLabel="Yes, run scripts"/>}
        {phase==="running"&&<div style={card}><div style={{fontWeight:500,marginBottom:12}}>▶ Running tests…</div><Terminal lines={execLines}/></div>}

        {phase==="result"&&result&&<div>

          <div>

const CREDS_KEY="qa_remember_creds";
function LoginPage({onLogin}) {
  const saved=React.useMemo(()=>{try{return JSON.parse(localStorage.getItem(CREDS_KEY))||null;}catch{return null;}},[]);
  const [mode,setMode]=useState(saved?.mode||"admin");
  const [email,setEmail]=useState(saved?.email||"");
  const [pass,setPass]=useState(saved?.pass||"");
  const [err,setErr]=useState("");
  const [remember,setRemember]=useState(!!saved);
  const login=()=>{
    if(mode==="admin"){
      if(email==="admin"&&pass==="admin"){
        if(remember){localStorage.setItem(CREDS_KEY,JSON.stringify({mode,email,pass}));}
        else{localStorage.removeItem(CREDS_KEY);}
        onLogin({role:"admin",id:"admin"},remember);return;
      }
      setErr("Use admin / admin");return;
    }
    const m=DB.members.find(x=>x.email===email&&x.password===pass);
    if(m){
      if(remember){localStorage.setItem(CREDS_KEY,JSON.stringify({mode,email,pass}));}
      else{localStorage.removeItem(CREDS_KEY);}
      onLogin({role:"member",member:m,id:m.id},remember);return;
    }
    setErr("Invalid credentials");
  };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-background-tertiary)"}}>
    <div style={{...card,width:380,padding:36}}>
      <div style={{fontSize:22,fontWeight:500,marginBottom:2}}>QA AI Platform</div>
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:24}}>AI-powered QA workflow management</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {["admin","member"].map(r=><button key={r} onClick={()=>{setMode(r);setErr("");setEmail(saved?.mode===r?saved.email:"");setPass(saved?.mode===r?saved.pass:"");}} style={{flex:1,padding:"8px 0",borderRadius:8,border:r===mode?"none":"1px solid var(--color-border-secondary)",background:r===mode?"var(--color-text-info)":"transparent",color:r===mode?"#fff":"var(--color-text-secondary)",cursor:"pointer",fontSize:14,fontWeight:500}}>{r==="admin"?"QA Lead":"Team Member"}</button>)}
      </div>
      <Lbl>{mode==="admin"?"Username":"Email"}</Lbl>
      <input style={{...inp,marginBottom:12}} value={email} onChange={e=>setEmail(e.target.value)} placeholder={mode==="admin"?"admin":"jane@company.com"}/>
      <Lbl>Password</Lbl>
      <input type="password" style={{...inp,marginBottom:12}} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"var(--color-text-secondary)",marginBottom:16,cursor:"pointer"}}>
        <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/> Remember me
      </label>
      {err&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:12}}>{err}</div>}
      <button onClick={login} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"none",background:"var(--color-text-info)",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:500}}>Sign in</button>
      {mode==="admin"&&<div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:10,textAlign:"center"}}>Demo: admin / admin</div>}
    </div>
  </div>;
}

/* ─── Root App ────────────────────────────────────────────────────────────── */
const SESSION_KEY="qa_session";
function loadSession(){
  try{
    // localStorage = Remember Me checked (persists after browser close)
    const persisted=localStorage.getItem(SESSION_KEY);
    if(persisted){
      const s=JSON.parse(persisted);
      if(s?.remember===true){
        if(s.role==="admin")return s;
        if(s.role==="member"){const m=DB.members.find(x=>x.id===s.id);return m?{role:"member",member:m,id:m.id}:null;}
      }
      localStorage.removeItem(SESSION_KEY); // stale/old entry without remember=true — clear it
    }
    // sessionStorage = Remember Me NOT checked (expires when browser closes)
    const session=sessionStorage.getItem(SESSION_KEY);
    if(session){
      const s=JSON.parse(session);
      if(s?.role==="admin")return s;
      if(s?.role==="member"){const m=DB.members.find(x=>x.id===s.id);return m?{role:"member",member:m,id:m.id}:null;}
    }
    return null;
  }catch{return null;}
}

              {renamingId===s.id
                ?<div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                    <input autoFocus style={{flex:1,fontSize:12,padding:"3px 7px",borderRadius:5,border:"1px solid var(--color-border-primary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none"}} value={renameVal} onChange={e=>setRenameVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")renameSnap(s.id,renameVal||s.sid);if(e.key==="Escape")setRenamingId(null);}}/>
                    <button onClick={()=>renameSnap(s.id,renameVal||s.sid)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-success)",fontSize:14,padding:"0 2px"}}>✓</button>
                  </div>
                :<div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:500,color:"var(--color-text-primary)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                      <div style={{display:"flex",gap:1,marginLeft:4,flexShrink:0,opacity:0.7}} onClick={e=>e.stopPropagation()}>
                        <button title="Rename" onClick={()=>{setRenamingId(s.id);setRenameVal(s.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:11,padding:"2px 3px",borderRadius:3}}>✎</button>
                        <button title="Delete" onClick={()=>deleteSnap(s.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:11,padding:"2px 3px",borderRadius:3}}>✕</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                      <Tag c="blue">{s.sid}</Tag>
                      {(s.cases?.filter(c=>c.status==="approved")?.length||0)>0&&<Tag c="green">{s.cases.filter(c=>c.status==="approved").length} TC</Tag>}
                      {s.coverageText&&<Tag c="green">✓</Tag>}
                    </div>
                  </div>}
            </div>);
          const cats=DB.categories;
          const grouped=cats.map(c=>({cat:c,stories:savedStories.filter(s=>s.categoryId===c.id)})).filter(g=>g.stories.length>0);
          const uncategorized=savedStories.filter(s=>!s.categoryId);
          return <div style={{padding:"6px 12px 12px"}}>
            <div style={{fontSize:11,fontWeight:500,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.07em",padding:"10px 8px 6px"}}>Saved Stories</div>
            {grouped.map(({cat,stories})=>(
              <div key={cat.id} style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",padding:"2px 4px 5px",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10}}>📁</span>
                  {renamingCatId===cat.id
                    ?<input autoFocus style={{flex:1,fontSize:11,padding:"1px 5px",borderRadius:4,border:"1px solid var(--color-border-primary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none",fontWeight:600}} value={renameCatVal} onChange={e=>setRenameCatVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")renameCat(cat.id,renameCatVal);if(e.key==="Escape")setRenamingCatId(null);}} onBlur={()=>renameCat(cat.id,renameCatVal||cat.name)}/>
                    :<span style={{flex:1}}>{cat.name}</span>}
                  <span style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:400}}>{stories.length}</span>
                  {renamingCatId!==cat.id&&<button title="Rename sprint" onClick={()=>{setRenamingCatId(cat.id);setRenameCatVal(cat.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:10,padding:"1px 3px",borderRadius:3,lineHeight:1}}>✎</button>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:8,borderLeft:"2px solid var(--color-border-tertiary)"}}>
                  {stories.map(s=><StoryCard key={s.id} s={s}/>)}
                </div>
              </div>))}
            {uncategorized.length>0&&<div style={{marginBottom:6}}>
              {grouped.length>0&&<div style={{fontSize:11,fontWeight:600,color:"var(--color-text-tertiary)",padding:"4px 4px 5px"}}>No sprint</div>}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {uncategorized.map(s=><StoryCard key={s.id} s={s}/>)}
              </div>
            </div>}
          </div>;
        })()}
      </div>
      <div style={{padding:"12px 20px",borderTop:"1px solid var(--color-border-tertiary)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div><div style={{fontSize:13,fontWeight:500}}>{user.role==="admin"?"Admin":user.member?.name}</div><div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{user.role==="admin"?"QA Lead":user.member?.role}</div></div>
          <NotifBell userId={user.role==="admin"?"admin":user.id}/>
        </div>
        <button onClick={handleLogout} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>Sign out</button>
      </div>
    </div>
    <div style={{flex:1,padding:28,overflow:"auto"}}>
      {user.role==="admin"&&page==="dashboard"&&<DashboardPage/>}
      {user.role==="admin"&&page==="members"&&<MembersPage/>}
      {user.role==="admin"&&page==="projects"&&<ProjectsPage/>}
      {user.role==="admin"&&page==="assign"&&<AssignmentsPage/>}
      {user.role==="admin"&&page==="bugs"&&<BugsPage/>}
      {user.role==="member"&&page==="workspace"&&<Workspace member={user.member} refreshSaved={refreshSaved} restoreTarget={restoreTarget} clearRestore={()=>setRestoreTarget(null)}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
