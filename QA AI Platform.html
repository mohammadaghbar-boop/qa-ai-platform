<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── DB ─────────────────────────────────────────────────────────────────── */
const DB = { members:[], projects:[], assignments:[], sessions:[], bugs:[], notifs:[], savedStories:[], categories:[] };
const STORAGE_KEY = "qa_platform_db";
function loadDB() {
  try { const s=localStorage.getItem(STORAGE_KEY); if(s){ const p=JSON.parse(s); Object.keys(p).forEach(k=>{ if(Array.isArray(p[k])&&k in DB) DB[k]=p[k]; }); } } catch(e){}
  // Strip any cached passwords or legacy credentials — now stored server-side
  DB.members=DB.members.map(({password,...m})=>m);
}
function saveDB() {
  try { localStorage.setItem(STORAGE_KEY,JSON.stringify(DB)); } catch(e){}
}
// One-time migration: purge any legacy credential data from localStorage
(function purgeLegacyCredentials(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const p=JSON.parse(raw);
    if(p.memberSettings){delete p.memberSettings;localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}
  }catch(e){}
})();
loadDB();
const uid = () => Math.random().toString(36).slice(2,8);
const tod = () => new Date().toLocaleDateString();
const ts  = () => new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const platDetect = t => /mobile|ios|android|\bapp\b|swipe/i.test(t) ? "mobile" : "web";
const tcol = t => t==="happy"?"green":t==="edge"?"amber":"blue";
const fwName = p => p==="mobile" ? "Appium" : "Playwright";
const pushNotif = (to,msg) => { DB.notifs.push({id:uid(),to,msg,read:false,ts:ts(),at:Date.now()}); saveDB(); };

/* ─── Deployment helpers ─────────────────────────────────────────────────── */
// When opened as a local file use the local server; when served by server.js use relative paths.
const API_BASE = window.location.protocol === "file:" ? "http://localhost:3456" : "";
let _currentMemberId = ""; // set by App on login / page-load

/* ─── Session management ─────────────────────────────────────────────────── */
const SESSION_TOKEN_KEY = "qa_api_session_token";
const ADMIN_TOKEN_KEY   = "qa_admin_token";
const MEMBER_TOKEN_KEY  = "qa_member_token";

async function _refreshSession() {
  const mt = sessionStorage.getItem(MEMBER_TOKEN_KEY);
  if (!mt) return null;
  try {
    const r = await fetch(API_BASE + "/api/members/session/refresh", {
      method: "POST",
      headers: { "X-Member-Token": mt }
    });
    if (!r.ok) return null;
    const d = await r.json();
    if (d.sessionToken) { sessionStorage.setItem(SESSION_TOKEN_KEY, d.sessionToken); return d.sessionToken; }
  } catch (e) { console.warn("Session refresh failed:", e.message); }
  return null;
}

/* ─── Session helpers ────────────────────────────────────────────────────── */
async function _ensureSession() {
  let token = sessionStorage.getItem(SESSION_TOKEN_KEY);
  if (!token) token = await _refreshSession();
  return token || null;
}

/* ─── Claude API ─────────────────────────────────────────────────────────── */
async function callAI(messages, sys="", max=4000, _legacy="") {
  const doCall = (token) => fetch(API_BASE + "/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session-Token": token || "" },
    body: JSON.stringify({ messages, system: sys })
  });
  try {
    let token = await _ensureSession();
    let r = await doCall(token);
    // Session stale (server restarted) — refresh once and retry
    if (r.status === 500 || r.status === 401) {
      const fresh = await _refreshSession();
      if (fresh) r = await doCall(fresh);
    }
    if (r.ok) {
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      return d.text || "";
    } else {
      const d = await r.json().catch(()=>({}));
      throw new Error(d.error || "Server error " + r.status);
    }
  } catch(proxyErr) {
    if (!proxyErr.message.includes("fetch")) throw proxyErr;
    throw new Error("AI server is not running. Please start it with: node server.js");
  }
}

/* ─── Jira API ───────────────────────────────────────────────────────────── */
async function callJira(proj, method, path, body=null) {
  let token = await _ensureSession();
  if (!token) throw new Error("No active session. Please log out and log back in.");
  const doCall = (t) => fetch(API_BASE + "/api/jira", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session-Token": t },
    body: JSON.stringify({ path, method, body })
  });
  let r = await doCall(token);
  // Session stale (server restarted) — refresh once and retry
  if (r.status === 500 || r.status === 401) {
    const fresh = await _refreshSession();
    if (fresh) r = await doCall(fresh);
  }
  if (!r.ok) {
    const d = await r.json().catch(()=>({}));
    throw new Error(d.error || "Server error " + r.status);
  }
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

/* ─── Admin sync (best-effort, never blocks UI) ─────────────────────────── */
async function syncToServer(type, payload) {
  try {
    const token = sessionStorage.getItem(SESSION_TOKEN_KEY);
    await fetch(API_BASE + "/api/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Session-Token": token || "" },
      body: JSON.stringify({ type, ...payload })
    });
  } catch {}
}

/* ─── Member helpers ─────────────────────────────────────────────────────── */
async function loadMembersFromServer() {
  try {
    const adminToken=sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
    const r=await fetch(API_BASE+"/api/members",{headers:{"X-Admin-Token":adminToken}});
    if(r.ok){ const list=await r.json(); DB.members=list; saveDB(); }
  } catch {}
}

/* ─── File helpers ───────────────────────────────────────────────────────── */
function dlFile(content, name, mime="text/plain") {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content],{type:mime}));
  a.download = name; a.click();
}
function exportCSV(cases, sid) {
  const h = ["ID","Title","Type","Preconditions","Steps","Expected","Platform","Automatable"];
  const rows = cases.filter(c=>c.status==="approved").map(c=>[
    c.id,c.title,c.type,c.preconditions||"",(c.steps||[]).join(" | "),c.expected||"",c.platform||"web",c.automatable===false?"No":"Yes"
  ]);
  const csv = [h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  dlFile("\uFEFF"+csv,"AIO_"+sid+".csv","text/csv;charset=utf-8");
}
function exportExcel(cases, sid) {
  const approved = cases.filter(c => c.status === "approved");
  const header = ["ID","Title","Description","Pre-condition","Test Data","Type","Priority","Test Steps","Expected Result"];
  const rows = [header];
  approved.forEach(c => {
    const steps = c.steps || [];
    const stepResults = c.stepResults || [];
    const priority = c.priority || "Medium";
    if (steps.length === 0) {
      rows.push([c.id, c.title, c.description||"", c.preconditions||"", c.testData||"", c.type||"", priority, "", c.expected||""]);
      return;
    }
    steps.forEach((step, i) => {
      const expected = stepResults[i] || (i === steps.length - 1 ? c.expected || "" : "");
      rows.push([
        i === 0 ? c.id : "",
        i === 0 ? c.title : "",
        i === 0 ? (c.description || "") : "",
        i === 0 ? (c.preconditions || "") : "",
        i === 0 ? (c.testData || "") : "",
        i === 0 ? (c.type || "") : "",
        i === 0 ? priority : "",
        step,
        expected
      ]);
    });
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  // Column widths
  ws["!cols"] = [
    {wch:10},{wch:40},{wch:40},{wch:30},{wch:25},{wch:15},{wch:10},{wch:50},{wch:50}
  ];
  // Header row style (bold)
  const range = XLSX.utils.decode_range(ws["!ref"]);
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({r:0, c})];
    if (cell) cell.s = {font:{bold:true}, fill:{fgColor:{rgb:"D9E1F2"}}, alignment:{wrapText:true,vertical:"center"}};
  }
  XLSX.utils.book_append_sheet(wb, ws, "Test Cases");
  XLSX.writeFile(wb, "AIO_TestCases_" + sid + ".xlsx");
}

/* ─── CSV user-data parser ───────────────────────────────────────────────── */
function parseCSVUsers(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { error: "CSV must have a header row and at least one data row." };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, '').toLowerCase());
  const uIdx = headers.findIndex(h => /^(username|user|email|login|name)$/.test(h));
  const pIdx = headers.findIndex(h => /^(password|pass|pwd|secret)$/.test(h));
  if (uIdx === -1) return { error: "Column not found. Add a column named 'username', 'user', 'email', or 'login'." };
  if (pIdx === -1) return { error: "Column not found. Add a column named 'password', 'pass', or 'pwd'." };
  const users = lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));
    return { username: cols[uIdx] || '', password: cols[pIdx] || '' };
  }).filter(u => u.username);
  if (users.length === 0) return { error: "No valid rows found in the CSV." };
  return { users };
}

/* ─── Styles ─────────────────────────────────────────────────────────────── */
const card = { background:"var(--color-background-secondary)", border:"1px solid var(--color-border-tertiary)", borderRadius:12, padding:20, marginBottom:16 };
const inp  = { width:"100%", padding:"8px 12px", borderRadius:8, border:"1px solid var(--color-border-secondary)", background:"var(--color-background-primary)", color:"var(--color-text-primary)", fontSize:14, boxSizing:"border-box" };
const sel  = { ...inp };
const ta   = { ...inp, resize:"vertical" };

function Btn({v="primary",onClick,disabled,full,children}) {
  const bg = v==="primary"?"var(--color-text-info)":v==="danger"?"var(--color-text-danger)":v==="success"?"var(--color-text-success)":"transparent";
  const col = v==="ghost"?"var(--color-text-secondary)":"#fff";
  const bdr = v==="ghost"?"1px solid var(--color-border-secondary)":"none";
  return <button disabled={disabled} onClick={onClick} style={{padding:"8px 18px",borderRadius:8,border:bdr,cursor:disabled?"not-allowed":"pointer",fontSize:14,fontWeight:500,display:"inline-flex",alignItems:"center",gap:6,width:full?"100%":"auto",justifyContent:full?"center":"flex-start",opacity:disabled?0.5:1,background:bg,color:col}}>{children}</button>;
}
function Tag({c="blue",children}) {
  const bg = c==="blue"?"var(--color-background-info)":c==="green"?"var(--color-background-success)":c==="amber"?"var(--color-background-warning)":c==="red"?"var(--color-background-danger)":"var(--color-background-tertiary)";
  const tx = c==="blue"?"var(--color-text-info)":c==="green"?"var(--color-text-success)":c==="amber"?"var(--color-text-warning)":c==="red"?"var(--color-text-danger)":"var(--color-text-secondary)";
  return <span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:12,fontWeight:500,background:bg,color:tx}}>{children}</span>;
}
const Lbl = ({children}) => <label style={{fontSize:13,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:4,display:"block"}}>{children}</label>;
const H1 = ({children}) => <div style={{fontSize:20,fontWeight:500,marginBottom:16}}>{children}</div>;
const H2 = ({children}) => <div style={{fontSize:16,fontWeight:500,marginBottom:12}}>{children}</div>;

function Loader({msg,sub}) {
  return <div style={{...card,textAlign:"center",padding:48}}>
    <div style={{width:40,height:40,border:"4px solid var(--color-border-tertiary)",borderTop:"4px solid var(--color-text-info)",borderRadius:"50%",animation:"qa-spin .85s linear infinite",margin:"0 auto 20px"}}/>

}
function Confirm({icon,title,desc,onYes,onNo,yesLabel="Yes",noLabel="No, skip",danger,noDanger}) {
  return <div style={{...card,borderLeft:"3px solid var(--color-text-info)"}}>

function Banner({icon,title,sub,color="success",children}) {
  const bgs={success:"var(--color-background-success)",danger:"var(--color-background-danger)",info:"var(--color-background-info)",warning:"var(--color-background-warning)"};
  return <div style={{...card,background:bgs[color]}}>

      {icon&&<div style={{fontSize:22}}>{icon}</div>}

    </div>
  </div>;
}
function StepBar({steps,cur,onStepClick}) {
  const [hov,setHov]=React.useState(null);
  return <div style={{display:"flex",alignItems:"center",marginBottom:22,flexWrap:"wrap",rowGap:6}}>
    {steps.map((s,i)=>{
      const done=i<cur,active=i===cur,clickable=done&&!!onStepClick;
      const isHov=hov===i&&clickable;
      return <div key={i} style={{display:"flex",alignItems:"center"}}>
        <div
          onClick={clickable?()=>onStepClick(i):undefined}
          onMouseEnter={()=>setHov(i)}
          onMouseLeave={()=>setHov(null)}
          title={clickable?"Go back to "+s:undefined}
          style={{padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:5,
            cursor:clickable?"pointer":"default",
            opacity:isHov?0.75:1,
            textDecoration:isHov?"underline":"none",
            background:done?"var(--color-background-success)":active?"var(--color-background-info)":"var(--color-background-tertiary)",
            color:done?"var(--color-text-success)":active?"var(--color-text-info)":"var(--color-text-tertiary)",
            transition:"opacity 0.15s"
          }}
        >{done?"↩":i+1} {s}</div>
        {i<steps.length-1&&<div style={{width:14,height:1,background:"var(--color-border-secondary)"}}/>}
      </div>;
    })}
  </div>;
}
function Tabs({tabs,active,onChange}) {
  return <div style={{display:"flex",borderBottom:"1px solid var(--color-border-tertiary)",marginBottom:14}}>
    {tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{padding:"8px 16px",border:"none",background:"transparent",cursor:"pointer",fontSize:13,fontWeight:active===t.id?500:400,borderBottom:`2px solid ${active===t.id?"var(--color-text-info)":"transparent"}`,color:active===t.id?"var(--color-text-info)":"var(--color-text-secondary)"}}>{t.label}</button>)}
  </div>;
}
function Terminal({lines}) {
  const ref = useRef(null);
  useEffect(()=>{ if(ref.current) ref.current.scrollTop=ref.current.scrollHeight; },[lines]);
  const col = l => l.startsWith("✓")||l.startsWith("PASS")?"#3fb950":l.startsWith("✗")||l.startsWith("FAIL")||l.includes("Error:")?"#f85149":l.startsWith("  ")?"#8b949e":l.startsWith("▶")||l.startsWith("Running")?"#58a6ff":"#e6edf3";
  return <div ref={ref} style={{background:"#0d1117",borderRadius:8,padding:16,maxHeight:300,overflow:"auto",fontFamily:"monospace",fontSize:12,lineHeight:1.7}}>
    {lines.map((l,i)=><div key={i} style={{color:col(l)}}>{l||"\u00a0"}</div>)}
  </div>;
}
const NOTIF_PAGE=3;
const ONE_WEEK=7*24*60*60*1000;
function NotifBell({userId}) {
  const [open,setOpen]=useState(false);
  const [,tick]=useState(0);
  const [pos,setPos]=useState({bottom:0,left:0});
  const [shown,setShown]=useState(NOTIF_PAGE);
  const btnRef=useRef(null);
  const now=Date.now();
  const unread=DB.notifs.filter(n=>n.to===userId&&!n.read);
  // Only show notifications from the last 7 days; fall back for legacy entries without `at`
  const withinWeek=DB.notifs.filter(n=>n.to===userId&&(n.at?now-n.at<ONE_WEEK:true)).slice().reverse();
  const visible=withinWeek.slice(0,shown);
  const hasMore=withinWeek.length>shown;
  const toggle=()=>{
    if(btnRef.current){const r=btnRef.current.getBoundingClientRect();const panelW=300;const left=Math.min(r.right+8,window.innerWidth-panelW-8);setPos({bottom:window.innerHeight-r.bottom+4,left});}
    if(!open) setShown(NOTIF_PAGE);
    setOpen(o=>!o);tick(x=>x+1);
  };
  return <div style={{position:"relative"}}>
    <button ref={btnRef} onClick={toggle} style={{padding:"6px 10px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",position:"relative",color:"var(--color-text-secondary)",fontSize:14}}>
      🔔{unread.length>0&&<span style={{position:"absolute",top:-6,right:-6,background:"var(--color-text-danger)",color:"#fff",borderRadius:20,padding:"0 5px",fontSize:10,minWidth:16,textAlign:"center"}}>{unread.length}</span>}
    </button>
    {open&&<div style={{position:"fixed",left:pos.left,bottom:pos.bottom,width:300,background:"var(--color-background-secondary)",border:"1px solid var(--color-border-secondary)",borderRadius:12,zIndex:9999,boxShadow:"0 8px 24px rgba(0,0,0,.14)"}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid var(--color-border-tertiary)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:500,fontSize:14}}>Notifications <span style={{fontSize:11,fontWeight:400,color:"var(--color-text-tertiary)"}}>· last 7 days</span></div>
        {unread.length>0&&<button onClick={()=>{unread.forEach(n=>n.read=true);tick(x=>x+1);}} style={{padding:"3px 8px",borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>Mark all read</button>}
      </div>
      <div style={{maxHeight:340,overflowY:"auto"}}>
        {withinWeek.length===0
          ?<div style={{padding:16,fontSize:13,color:"var(--color-text-tertiary)"}}>No notifications in the past 7 days.</div>
          :visible.map(n=><div key={n.id} onClick={()=>{n.read=true;tick(x=>x+1);}} style={{padding:"10px 16px",borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer",background:n.read?"transparent":"var(--color-background-info)"}}>
            <div style={{fontSize:13,fontWeight:n.read?400:500}}>{n.msg}</div>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>
              {n.at?new Date(n.at).toLocaleDateString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):n.ts}
            </div>
          </div>)
        }
        {hasMore&&<div style={{padding:"10px 16px",textAlign:"center"}}>
          <button onClick={()=>setShown(s=>s+NOTIF_PAGE)} style={{padding:"5px 16px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-info)",fontWeight:500}}>
            Show more ({withinWeek.length-shown} remaining)
          </button>
        </div>}
      </div>
    </div>}
  </div>;
}

/* ─── Markdown renderer for chat ─────────────────────────────────────────── */
function renderMd(text){
  const lines=text.split("\n");
  const out=[];let i=0;
  while(i<lines.length){
    const l=lines[i];
    // heading
    if(/^###\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:13,marginTop:10,marginBottom:2}}>{l.replace(/^###\s/,"")}</div>);i++;continue;}
    if(/^##\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:14,marginTop:12,marginBottom:3}}>{l.replace(/^##\s/,"")}</div>);i++;continue;}
    if(/^#\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:15,marginTop:14,marginBottom:4}}>{l.replace(/^#\s/,"")}</div>);i++;continue;}
    // bullet list
    if(/^[-*]\s/.test(l)){
      const items=[];
      while(i<lines.length&&/^[-*]\s/.test(lines[i])){items.push(lines[i].replace(/^[-*]\s/,""));i++;}
      out.push(<ul key={i} style={{margin:"4px 0 4px 18px",padding:0}}>{items.map((it,j)=><li key={j} style={{marginBottom:2}}>{inlineMd(it)}</li>)}</ul>);
      continue;
    }
    // numbered list
    if(/^\d+\.\s/.test(l)){
      const items=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s/,""));i++;}
      out.push(<ol key={i} style={{margin:"4px 0 4px 18px",padding:0}}>{items.map((it,j)=><li key={j} style={{marginBottom:2}}>{inlineMd(it)}</li>)}</ol>);
      continue;
    }
    // horizontal rule
    if(/^---+$/.test(l.trim())){out.push(<hr key={i} style={{border:"none",borderTop:"1px solid var(--color-border-tertiary)",margin:"8px 0"}}/>);i++;continue;}
    // blank line
    if(l.trim()===""){out.push(<div key={i} style={{height:6}}/>);i++;continue;}
    // paragraph
    out.push(<div key={i} style={{marginBottom:2}}>{inlineMd(l)}</div>);i++;
  }
  return out;
}
function inlineMd(text){
  // split on bold, italic, inline code
  const parts=[];let rest=text;let k=0;
  const re=/(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;let m;let last=0;
  while((m=re.exec(rest))!==null){
    if(m.index>last)parts.push(<span key={k++}>{rest.slice(last,m.index)}</span>);
    if(m[2])parts.push(<strong key={k++}>{m[2]}</strong>);
    else if(m[3])parts.push(<em key={k++}>{m[3]}</em>);
    else if(m[4])parts.push(<code key={k++} style={{background:"var(--color-background-secondary)",borderRadius:3,padding:"1px 5px",fontSize:12,fontFamily:"monospace"}}>{m[4]}</code>);
    last=m.index+m[0].length;
  }
  if(last<rest.length)parts.push(<span key={k++}>{rest.slice(last)}</span>);
  return parts.length>0?parts:text;
}

/* ─── AI Chat ─────────────────────────────────────────────────────────────── */
function AIChat({proj,sid,sdata,cases=[],gapText="",result=null,sessionBugs=[],coverageText="",platform=""}) {
  const [msgs,setMsgs]=useState([{role:"assistant",text:"Hi! I can see your full story, test cases, execution results and bugs. Ask me anything!"}]);
  const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const [jiraCtx,setJiraCtx]=useState("");
  const msgsRef=useRef(null);
  useEffect(()=>{if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);

  // Pre-fetch story Jira context on open
  useEffect(()=>{
    if(!proj?.jiraProjKey||!sid)return;
    (async()=>{
      try{
        const issue=await callJira(proj,"GET","/issue/"+sid+"?fields=summary,status,assignee,priority,description,issuetype,comment");
        const comments=(issue.fields?.comment?.comments||[]).slice(-3).map(c=>`  [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}"`).join("\n");
        const ctx=`Current Jira story:\n  Key: ${issue.key}\n  Summary: ${issue.fields?.summary}\n  Status: ${issue.fields?.status?.name}\n  Priority: ${issue.fields?.priority?.name}\n  Assignee: ${issue.fields?.assignee?.displayName||"Unassigned"}\n  Type: ${issue.fields?.issuetype?.name}${comments?"\n  Recent comments:\n"+comments:""}`;
        setJiraCtx(ctx);
      }catch{setJiraCtx("");}
    })();
  },[sid]);

  const isJiraQuery=t=>/bug|issue|ticket|jira|open|status|assign|sprint|backlog|comment|story|task|priority|close|resolve|report|list|show|fetch|get|[A-Z]+-\d+/i.test(t);

  const fetchJiraData=async(q)=>{
    if(!proj?.jiraProjKey)return"";
    const parts=[];
    try{
      // fetch specific issue keys mentioned in query e.g. JF-10, PROJ-5
      const keyMatches=[...new Set((q.match(/[A-Za-z]+-\d+/g)||[]).map(k=>k.toUpperCase()))];
      for(const key of keyMatches){
        try{
          const issue=await callJira(proj,"GET",`/issue/${key}?fields=summary,status,assignee,priority,description,issuetype,comment`);
          const descText=issue.fields?.description?.content?.[0]?.content?.[0]?.text||"";
          const comments=(issue.fields?.comment?.comments||[]).slice(-3).map(c=>`    [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}`).join("\n");
          parts.push(`Issue ${issue.key}:\n  Summary: ${issue.fields?.summary}\n  Type: ${issue.fields?.issuetype?.name}\n  Status: ${issue.fields?.status?.name}\n  Priority: ${issue.fields?.priority?.name}\n  Assignee: ${issue.fields?.assignee?.displayName||"Unassigned"}${descText?"\n  Description: "+descText:""}${comments?"\n  Recent comments:\n"+comments:""}`);
        }catch{}
      }
      // fetch active sprint tickets
      if(/sprint/i.test(q)){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND sprint in openSprints() ORDER BY priority ASC`,maxResults:20,fields:["summary","status","issuetype","assignee","priority"]});
          const items=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.issuetype?.name}/${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name} (${i.fields?.assignee?.displayName||"Unassigned"})`).join("\n");
          parts.push(items?`Active sprint tickets in ${proj.jiraProjKey} (${r.issues?.length||0}):\n${items}`:`No active sprint found in ${proj.jiraProjKey}.`);
        }catch(e){parts.push(`Could not fetch sprint data: ${e.message}`);}
      }
      // fetch open bugs for project
      if(/bug/i.test(q)){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND issuetype=Bug AND status!=Done ORDER BY created DESC`,maxResults:10,fields:["summary","status","priority","assignee"]});
          const bugs=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name} (${i.fields?.assignee?.displayName||"Unassigned"})`).join("\n");
          parts.push(bugs?`Open bugs in ${proj.jiraProjKey}:\n${bugs}`:`No open bugs found.`);
        }catch(e){parts.push(`Could not fetch bugs: ${e.message}`);}
      }
      // fetch recent issues
      if(/issue|ticket|task|list|show|fetch|open/i.test(q)&&!/bug|sprint/i.test(q)&&keyMatches.length===0){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND status!=Done ORDER BY updated DESC`,maxResults:10,fields:["summary","status","issuetype","assignee","priority"]});
          const issues=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.issuetype?.name}/${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name}`).join("\n");
          parts.push(issues?`Recent open issues in ${proj.jiraProjKey}:\n${issues}`:`No open issues found.`);
        }catch(e){parts.push(`Could not fetch issues: ${e.message}`);}
      }
      // fetch comments on current story
      if(sid&&/comment/i.test(q)&&keyMatches.length===0){
        try{
          const r=await callJira(proj,"GET","/issue/"+sid+"/comment?maxResults=5");
          const comments=(r.comments||[]).map(c=>`  [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}`).join("\n");
          if(comments)parts.push(`Comments on ${sid}:\n${comments}`);
        }catch{}
      }
    }catch{}
    return parts.join("\n\n");
  };

  const send=async()=>{
    if(!msg.trim()||busy)return;
    const u=msg.trim(); setMsg(""); setMsgs(m=>[...m,{role:"user",text:u}]); setBusy(true);
    const hist=msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    try{
      let liveCtx="";
      if(isJiraQuery(u))liveCtx=await fetchJiraData(u);
      const jiraSection=[jiraCtx,liveCtx].filter(Boolean).join("\n\n");

      // Build workspace context from current session data
      const storySection=sdata?`USER STORY:\n  ID: ${sid}\n  Summary: ${sdata.summary||""}\n  Description: ${sdata.description||sdata.rawText||""}\n  Platform: ${platform}`:sid?`Story ID: ${sid}`:"No story loaded yet.";
      const gapSection=gapText?`GAP ANALYSIS:\n${gapText}`:"";
      const casesSection=cases.length>0?`TEST CASES (${cases.length} total):\n${cases.map(c=>`  [${c.status?.toUpperCase()||"PENDING"}] ${c.id} (${c.type}): ${c.title}${c.steps?.length?"\n    Steps: "+c.steps.join(" → "):""}`).join("\n")}`:"No test cases yet.";
      const resultSection=result?`EXECUTION RESULTS:\n  Total: ${result.total} | Passed: ${result.pass?.length||0} | Failed: ${result.fail?.length||0}\n  Passed: ${(result.pass||[]).join(", ")||"none"}\n  Failed: ${(result.fail||[]).join(", ")||"none"}`:"No execution results yet.";
      const bugsSection=sessionBugs.length>0?`BUGS FILED (${sessionBugs.length}):\n${sessionBugs.map(b=>`  ${b.bid} [${b.sev}]: ${b.summary}${b.jKey?" → "+b.jKey:""}`).join("\n")}`:"No bugs filed yet.";
      const coverageSection=coverageText?`COVERAGE REPORT:\n${coverageText}`:"";

      const workspaceCtx=[storySection,gapSection,casesSection,resultSection,bugsSection,coverageSection].filter(Boolean).join("\n\n");
      const sys=`You are a QA expert assistant embedded in the QA AI Platform. CRITICAL RULES:\n1. You have ZERO tools and ZERO external access. You cannot call any APIs.\n2. NEVER mention permissions, tool access, approvals, or ask the user to do anything to grant access.\n3. All Jira data you will ever receive has already been fetched by the app and is shown below under "JIRA DATA". If it is empty, say "No data was returned from Jira for this query" and stop.\n4. Answer only from the context provided below and your QA expertise.\n\nProject: ${proj?.name||"—"} (Jira key: ${proj?.jiraProjKey||"—"})\n\n=== CURRENT SESSION ===\n${workspaceCtx}\n${jiraSection?`\n=== JIRA DATA (already fetched by the app) ===\n${jiraSection}`:"\n=== JIRA DATA ===\n(No Jira data was fetched for this query.)"}\n\nBe concise. Reference IDs and keys by name when relevant.`;
      const r=await callAI([...hist,{role:"user",content:u}],sys,2000,proj?.anthropicKey||"");
      setMsgs(m=>[...m,{role:"assistant",text:r}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"Error: "+e.message}]);}
    setBusy(false);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {jiraCtx&&<div style={{fontSize:11,color:"var(--color-text-tertiary)",padding:"4px 0 8px",display:"flex",alignItems:"center",gap:5}}>
      <span style={{width:7,height:7,borderRadius:"50%",background:"#36B37E",display:"inline-block"}}/>Connected to Jira · {proj?.jiraProjKey}{sid?" · "+sid:""}
    </div>}
    <div ref={msgsRef} style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,fontSize:13,lineHeight:1.65,background:m.role==="user"?"var(--color-text-info)":"var(--color-background-primary)",color:m.role==="user"?"#fff":"var(--color-text-primary)",border:m.role==="assistant"?"1px solid var(--color-border-tertiary)":"none"}}>
          {m.role==="assistant"?renderMd(m.text):<span style={{whiteSpace:"pre-wrap"}}>{m.text}</span>}
        </div>
      </div>)}
      {busy&&<div style={{alignSelf:"flex-start",padding:"10px 14px",borderRadius:12,background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",fontSize:13,color:"var(--color-text-tertiary)"}}>Thinking…</div>}
    </div>
    <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1px solid var(--color-border-tertiary)"}}>
      <input style={{...inp,flex:1,fontSize:13}} value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask about this story, open bugs, Jira issues…"/>
      <Btn v="primary" onClick={send} disabled={busy}>Send</Btn>
    </div>
  </div>;
}

function AssignmentsPage() {
  const [list,setList]=useState([...DB.assignments]);
  const [mId,setMId]=useState("");
  const [selProjs,setSelProjs]=useState([]);
  const [editing,setEditing]=useState(null); // memberId being edited
  const [editProjs,setEditProjs]=useState([]);
  const toggleProj=(id,arr,set)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);
  const assign=()=>{
    if(!mId||selProjs.length===0) return;
    selProjs.forEach(pid=>{
      if(!DB.assignments.some(a=>a.memberId===mId&&a.projectId===pid)) DB.assignments.push({memberId:mId,projectId:pid});
    });
    const m=DB.members.find(x=>x.id===mId);
    const names=selProjs.map(pid=>DB.projects.find(p=>p.id===pid)?.name).filter(Boolean).join(", ");
    if(m&&names) pushNotif(mId,"Assigned to: "+names);
    saveDB(); setList([...DB.assignments]); setMId(""); setSelProjs([]);
  };
  const startEdit=memberId=>{
    setEditing(memberId);
    setEditProjs(DB.assignments.filter(a=>a.memberId===memberId).map(a=>a.projectId));
  };
  const cancelEdit=()=>setEditing(null);
  const saveEdit=()=>{
    DB.assignments=DB.assignments.filter(a=>a.memberId!==editing);
    editProjs.forEach(pid=>DB.assignments.push({memberId:editing,projectId:pid}));
    saveDB(); setList([...DB.assignments]); setEditing(null);
  };
  const delMember=memberId=>{ DB.assignments=DB.assignments.filter(a=>a.memberId!==memberId); saveDB(); setList([...DB.assignments]); };
  // Group by member
  const grouped=DB.members.map(m=>({m,projects:DB.projects.filter(p=>list.some(a=>a.memberId===m.id&&a.projectId===p.id))})).filter(x=>x.projects.length>0);
  const chkStyle={display:"flex",alignItems:"center",gap:6,padding:"4px 0",fontSize:13,cursor:"pointer"};
  const th={textAlign:"left",padding:"8px 12px",borderBottom:"1px solid var(--color-border-tertiary)",fontSize:12,fontWeight:500,color:"var(--color-text-secondary)"};
  const td={padding:"10px 12px",borderBottom:"1px solid var(--color-border-tertiary)"};
  return <div>
    <H1>Assignments</H1>
    {!editing&&<div style={card}><H2>Assign member</H2>
      <div style={{marginBottom:12}}>
        <Lbl>Member</Lbl>
        <select style={sel} value={mId} onChange={e=>setMId(e.target.value)}><option value="">Select…</option>{DB.members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select>
      </div>
      {mId&&<div style={{marginBottom:12}}>
        <Lbl>Projects</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
          {DB.projects.map(p=><label key={p.id} style={chkStyle}>
            <input type="checkbox" checked={selProjs.includes(p.id)} onChange={()=>toggleProj(p.id,selProjs,setSelProjs)}/>
            {p.name}
          </label>)}
        </div>
      </div>}
      <Btn v="primary" onClick={assign} disabled={!mId||selProjs.length===0}>Assign</Btn>
    </div>}
    {editing&&(()=>{const m=DB.members.find(x=>x.id===editing);return(<div style={{...card,border:"2px solid var(--color-border-focus)",marginBottom:16}}><H2>Edit projects for {m?.name}</H2>
      <div style={{marginBottom:12}}>
        <Lbl>Projects</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
          {DB.projects.map(p=><label key={p.id} style={chkStyle}>
            <input type="checkbox" checked={editProjs.includes(p.id)} onChange={()=>toggleProj(p.id,editProjs,setEditProjs)}/>
            {p.name}
          </label>)}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}><Btn v="primary" onClick={saveEdit}>Save changes</Btn><button onClick={cancelEdit} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Cancel</button></div>
    </div>);})()}
    <div style={card}>{grouped.length===0?<div style={{color:"var(--color-text-tertiary)",fontSize:14}}>No assignments.</div>:
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
        <thead><tr><th style={th}>Member</th><th style={th}>Projects</th><th style={th}></th></tr></thead>
        <tbody>{grouped.map(({m,projects})=>
          <tr key={m.id} style={editing===m.id?{background:"var(--color-background-subtle)"}:{}}>
            <td style={td}><b>{m.name}</b><div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{m.role}</div></td>
            <td style={td}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{projects.map(p=><Tag key={p.id} c="green">{p.name}</Tag>)}</div></td>
            <td style={td}><div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={()=>startEdit(m.id)}>Edit</Btn><Btn v="danger" onClick={()=>delMember(m.id)}>Remove</Btn></div></td>
          </tr>
        )}</tbody>
      </table>}
    </div>
  </div>;
}

function DashboardPage() {
  const [sd,setSd]=useState(null);
  const [tab,setTab]=useState("sessions");
  const [loading,setLoading]=useState(true);
  const [sessProjFilter,setSessProjFilter]=useState("All");
  const [sessMemberFilter,setSessMemberFilter]=useState("All");
  const [bugProjFilter,setBugProjFilter]=useState("All");
  const [bugMemberFilter,setBugMemberFilter]=useState("All");
  const [perfProjFilter,setPerfProjFilter]=useState("All");
  const [perfMemberFilter,setPerfMemberFilter]=useState("All");
  const [covProjFilter,setCovProjFilter]=useState("All");
  const [covMemberFilter,setCovMemberFilter]=useState("All");
  const fetchData=()=>{
    setLoading(true);
    const adminToken=sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
    fetch(API_BASE+"/api/admin/data",{headers:{"X-Admin-Token":adminToken}})
      .then(r=>r.json()).then(d=>{
        setSd(d);
        if(d?.members){DB.members=d.members;saveDB();}
        if(d?.projects){DB.projects=d.projects;saveDB();}
        setLoading(false);
      })
      .catch(()=>setLoading(false));
  };
  useEffect(()=>{fetchData();},[]);
  const sessions=sd?.sessions||[]; const bugs=sd?.bugs||[]; const perfs=sd?.perfResults||[]; const cov=sd?.coverage||[];
  const projectsFromServer=sd?.projects||DB.projects;
  // Resolve current project name from projectId — falls back to stored name if project was deleted
  const projectNameOf=x=>{const p=projectsFromServer.find(p=>p.id===x.projectId);return p?p.name:(x.projectName||"");};
  // Filter dropdown only uses current project names — no duplicates from renamed projects
  const allProjects=["All",...projectsFromServer.map(p=>p.name)];

  const filteredBugs=bugs.filter(x=>(bugProjFilter==="All"||projectNameOf(x)===bugProjFilter)&&(bugMemberFilter==="All"||memberNameOf(x)===bugMemberFilter));
  const filteredPerfs=perfs.filter(x=>(perfProjFilter==="All"||projectNameOf(x)===perfProjFilter)&&(perfMemberFilter==="All"||memberNameOf(x)===perfMemberFilter));
  const filteredCov=cov.filter(x=>(covProjFilter==="All"||projectNameOf(x)===covProjFilter)&&(covMemberFilter==="All"||memberNameOf(x)===covMemberFilter));

    <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Member:</label>
    <select value={memberF} onChange={e=>setMember(e.target.value)} style={selStyle}>{allMembers.map(m=><option key={m} value={m}>{m}</option>)}</select>
    {(projF!=="All"||memberF!=="All")&&<button onClick={()=>{setProj("All");setMember("All");}} style={{padding:"4px 10px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>✕ Clear</button>}
  </div>;
  const tp=sessions.reduce((a,x)=>a+(x.passed||0),0), tf=sessions.reduce((a,x)=>a+(x.failed||0),0);
  const pr=tp+tf>0?Math.round(tp/(tp+tf)*100):0;

/* ─── ADF text extractor (recursive) ────────────────────────────────────── */
function adfToText(node) {
  if (!node) return '';
  if (typeof node === 'string') return node;
  if (node.type === 'text') {
    const link = (node.marks||[]).find(m=>m.type==='link');
    return link ? `${node.text||''} (${link.attrs?.href||''})` : (node.text||'');
  }
  // Inline nodes that store their text in attrs, not content
  if (node.type === 'mention') return node.attrs?.text || node.attrs?.displayName || '';
  if (node.type === 'emoji') return node.attrs?.text || node.attrs?.shortName || '';
  if (node.type === 'status') return `[${node.attrs?.text||''}]`;
  if (node.type === 'date') return node.attrs?.text || '';
  if (node.type === 'inlineCard' || node.type === 'blockCard' || node.type === 'embedCard') return node.attrs?.url||'';
  if (node.type === 'hardBreak' || node.type === 'rule') return '\n';
  const inner = (node.content||[]).map(adfToText).join('');
  const blockTypes = ['paragraph','heading','listItem','bulletList','orderedList','blockquote','panel','codeBlock','expand','nestedExpand','tableRow'];
  return blockTypes.includes(node.type) ? inner+'\n' : inner;
}
/* Strip HTML tags + decode entities (used as fallback when ADF yields nothing) */
function htmlToText(html) {
  return html
    .replace(/<br\s*\/?>/gi,'\n').replace(/<\/?(p|div|li|tr|td|th|h[1-6])[^>]*>/gi,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\n{3,}/g,'\n\n').trim();
}

/* ─── Coverage charts ────────────────────────────────────────────────────── */
function DonutChart({data,title,size=160}) {
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:size,color:"var(--color-text-tertiary)",fontSize:13}}><div style={{fontSize:28,marginBottom:6}}>—</div>No data</div>;
  const cx=size/2,cy=size/2,r=size*0.38,ir=size*0.22;
  if(data.length===1) return(
    <div><div style={{fontWeight:500,fontSize:13,marginBottom:10,textAlign:"center"}}>{title}</div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
          <circle cx={cx} cy={cy} r={r} fill={data[0].color}/>
          <circle cx={cx} cy={cy} r={ir} fill="#fff"/>
          <text x={cx} y={cy-5} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.12} fontWeight="700" fill="#1a1a18">{total}</text>
          <text x={cx} y={cy+11} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.075} fill="#888">total</text>
        </svg>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>
          <div style={{width:10,height:10,borderRadius:2,background:data[0].color,flexShrink:0}}/><span style={{flex:1,color:"var(--color-text-secondary)"}}>{data[0].label}</span><span style={{fontWeight:600}}>{data[0].value} <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>(100%)</span></span>
        </div></div>
      </div>
    </div>);
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const frac=d.value/total,a1=angle,a2=angle+frac*2*Math.PI-0.005;
    angle=a2+0.005;
    const [c1,s1,c2,s2]=[Math.cos(a1),Math.sin(a1),Math.cos(a2),Math.sin(a2)],lg=frac>0.5?1:0;
    return {d:`M ${cx+r*c1} ${cy+r*s1} A ${r} ${r} 0 ${lg} 1 ${cx+r*c2} ${cy+r*s2} L ${cx+ir*c2} ${cy+ir*s2} A ${ir} ${ir} 0 ${lg} 0 ${cx+ir*c1} ${cy+ir*s1} Z`,color:d.color,label:d.label,value:d.value,pct:Math.round(frac*100)};
  });
  return(
    <div><div style={{fontWeight:500,fontSize:13,marginBottom:10,textAlign:"center"}}>{title}</div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
          {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth={2}/>)}
          <circle cx={cx} cy={cy} r={ir} fill="#fff"/>
          <text x={cx} y={cy-5} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.12} fontWeight="700" fill="#1a1a18">{total}</text>
          <text x={cx} y={cy+11} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.075} fill="#888">total</text>
        </svg>
        <div style={{flex:1}}>{slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,marginBottom:6}}>
          <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/><span style={{flex:1,color:"var(--color-text-secondary)"}}>{s.label}</span><span style={{fontWeight:600}}>{s.value} <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>({s.pct}%)</span></span>
        </div>)}</div>
      </div>
    </div>);
}

              {/* Load Profile */}

                    <Lbl>{isStress?"Duration / Step":"Duration"}</Lbl>

                    <span style={{fontSize:12,fontWeight:500,textAlign:"right"}}>{row.val}</span>

                  🔥 Steps: {Math.ceil(perfForm.vus*.25)} → {Math.ceil(perfForm.vus*.5)} → {Math.ceil(perfForm.vus*.75)} → {perfForm.vus} VUs
                </div>}
              </div>
            </div>
          </div>;
        })()}

        {!loading&&!perfLoading&&phase==="perfResult"&&perfResult&&(()=>{

        {!loading&&phase==="mode"&&<div>

                {icon:"🔍",title:"Story review + GAP analysis",desc:gapText?"View saved GAP analysis (already done)":"Analyze ACs for gaps and missing scenarios.",fn:gapText?()=>setPhase("gap"):doGap,done:!!gapText},

            <div style={{fontSize:13,display:"flex",gap:12,alignItems:"center"}}>
              <span style={{color:"var(--color-text-success)"}}>✓ {cases.filter(c=>c.status==="approved").length}</span>

                <Lbl>Title</Lbl><input style={{...inp,marginBottom:8,fontWeight:500}} value={c.title} onChange={e=>editC(c.id,"title",e.target.value)} disabled={!editOn}/>

                <Lbl>Expected result</Lbl><input style={{...inp,marginBottom:8}} value={c.expected||""} onChange={e=>editC(c.id,"expected",e.target.value)} disabled={!editOn}/>

                </label>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,minWidth:96}}><Btn v="success" onClick={()=>approve(c.id)}>✓ Approve</Btn><Btn v="danger" onClick={()=>reject(c.id)}>✗ Reject</Btn></div>
            </div>
          </div>)}
          <div style={{marginBottom:16}}>

          </div>
          {showAddCase&&<div style={{...card,border:"2px dashed var(--color-border-secondary)",marginBottom:16}}>
            <div style={{fontWeight:500,marginBottom:12}}>New manual test case</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div style={{gridColumn:"1/-1"}}><Lbl>Title <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl><input style={{...inp,borderColor:newCaseErr&&!newCase.title.trim()?"var(--color-text-danger)":undefined}} value={newCase.title} onChange={e=>{setNewCase(p=>({...p,title:e.target.value}));if(newCaseErr)setNewCaseErr("");}} placeholder="e.g. Submit form with valid data"/></div>
              <div><Lbl>Type</Lbl><select style={sel} value={newCase.type} onChange={e=>setNewCase(p=>({...p,type:e.target.value}))}><option value="happy">Happy flow</option><option value="edge">Edge case</option><option value="negative">Negative</option></select></div>

                {codegenStatus==="launching"?"Launching…":"🎭 Record with Playwright Codegen"}

          </div>

        {phase==="codegenRecording"&&<div>

            {codegenStatus==="launching"&&<Loader msg="Launching browser…" sub="Opening Playwright Codegen for your application"/>}

                <button onClick={()=>setSelectedForScripts([])} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>Clear</button>
              </div>
            </div>
            {autoable.map(c=><label key={c.id} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer",alignItems:"center"}}>

          <div style={{display:"flex",gap:10}}>
            <Btn v="primary" onClick={()=>selectedForScripts.length>0&&doScripts()} disabled={selectedForScripts.length===0}>Generate Scripts ({selectedForScripts.length} cases)</Btn>
          </div>
        </div>}

        {!loading&&phase==="autoReady"&&<div>
          {fixed&&<Banner icon="🔧" title="Scripts fixed" sub="Failures addressed." color="info"/>}
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}><div style={{fontWeight:500}}>Automation scripts</div><Tag c={platform==="mobile"?"amber":"blue"}>{fwName(platform)}</Tag></div>
            {platform==="mobile"?<Tabs tabs={[{id:"ios",label:"iOS (Appium)"},{id:"android",label:"Android (Appium)"}]} active={tab} onChange={setTab}/>:<Tabs tabs={[{id:"web",label:"Web automation script"}]} active={tab} onChange={setTab}/>}
            <pre style={{background:"var(--color-background-tertiary)",borderRadius:8,padding:16,fontSize:12,fontFamily:"monospace",lineHeight:1.6,overflow:"auto",maxHeight:360,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0,marginBottom:12}}>{curScript||"No script yet."}</pre>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button onClick={()=>navigator.clipboard?.writeText(curScript)} style={ghostBtn}>📋 Copy</button><button onClick={()=>dlFile(curScript,tab==="web"?sid+".spec.js":sid+"_"+tab+".test.js","text/javascript")} style={ghostBtn}>⬇ Download</button></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn v="primary" onClick={()=>setPhase("runAsk")}>▶ Run Tests</Btn>
          </div>
        </div>}

        {!loading&&phase==="runAsk"&&<Confirm icon="▶️" title="Start test execution?" desc={"Live terminal output for "+selectedForScripts.length+" selected scripts."} onYes={doRun} yesLabel="Yes, run scripts"/>}
        {phase==="running"&&<div style={card}><div style={{fontWeight:500,marginBottom:12}}>▶ Running tests…</div><Terminal lines={execLines}/></div>}

        {phase==="result"&&result&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
            {[{l:"Total",v:result.total,c:"info"},{l:"Passed",v:result.pass.length,c:"success"},{l:"Failed",v:result.fail.length,c:result.fail.length>0?"danger":"success"}].map(x=><div key={x.l} style={{...card,marginBottom:0,textAlign:"center",padding:20}}><div style={{fontSize:30,fontWeight:500,color:`var(--color-text-${x.c})`}}>{x.v}</div><div style={{fontSize:13,color:"var(--color-text-secondary)",marginTop:2}}>{x.l}</div></div>)}
          </div>
          <div style={card}><div style={{fontWeight:500,marginBottom:10}}>Execution log</div><Terminal lines={execLines}/></div>
          {result.fail.length>0&&<Btn v="primary" onClick={doFix}>🔧 Fix scripts</Btn>}
          <div style={{display:"flex",gap:10,marginTop:12}}>
            {result.fail.length>0
              ?<Btn v="primary" onClick={()=>setPhase("bugReport")}>Bug Report →</Btn>
              :<Btn v="primary" onClick={()=>{setCoverageText(t=>t||"1");setPhase("coverage");syncToServer("coverage",{memberId:member.id,memberName:member.name,projectId:proj?.id||"",projectName:proj?.name||"",sid,summary:sdata?.summary||sid,platform,approvedCases:approved.length,passed:result?.pass?.length||0,failed:result?.fail?.length||0,bugs:sessionBugs.length});}}>Coverage Report →</Btn>}
          </div>
        </div>}

        {!loading&&phase==="bugReport"&&<div>
          <div style={{...card,padding:"12px 20px",display:"flex",alignItems:"center",gap:16,marginBottom:4}}>
            <div style={{flex:1,fontSize:14}}>Story: <b>{sid}</b> · {result?<><Tag c={result.fail.length>0?"red":"green"}>{result.pass.length} passed</Tag> <Tag c={result.fail.length>0?"red":"green"}>{result.fail.length} failed</Tag></>:<Tag>No execution</Tag>}</div>
          </div>
          {result?.fail?.filter(c=>!sessionBugs.some(b=>b.tcId===c.id)).length>0&&<div style={card}>
            <H2>Failed cases</H2>
            {result.fail.filter(c=>!sessionBugs.some(b=>b.tcId===c.id)).map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--color-border-tertiary)"}}>
              <Tag c="red">{c.id}</Tag><span style={{flex:1,fontSize:13}}>{c.title}</span>
              <button onClick={()=>{setBf({tcId:c.id,summary:c.title+" is not working as expected",sev:"High",steps:(c.steps||[]).length>0?[...c.steps]:["Reproduce the issue"],expected:c.expected||"The feature works as designed",actual:c._pwError||"Test execution failed",testData:c.testData||"",attachments:[],_err:false});setShowBugForm(true);}} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>🐛 File Bug</button>
            </div>)}
          </div>}
          <div style={card}>
            <H2>File a bug report</H2>
            <Lbl>Summary <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input style={{...inp,marginBottom:10,borderColor:bf._err&&!bf.summary.trim()?"var(--color-text-danger)":undefined}} value={bf.summary} onChange={e=>setBf(p=>({...p,summary:e.target.value,_err:false}))} placeholder="e.g. Login button unresponsive after entering valid credentials"/>
            <Lbl>Severity</Lbl>
            <select style={{...sel,marginBottom:10}} value={bf.sev} onChange={e=>setBf(p=>({...p,sev:e.target.value}))}>{["Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}</select>
            <Lbl>Test Data</Lbl>
            <textarea style={{...ta,marginBottom:10}} rows={2} value={bf.testData||""} onChange={e=>setBf(p=>({...p,testData:e.target.value}))} placeholder="e.g. username: admin / password: Test@123"/>
            <Lbl>Steps to Reproduce <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            {(bf.steps||[""]).map((step,si)=><div key={si} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--color-text-tertiary)",minWidth:18}}>{si+1}.</span>
              <input style={{...inp,flex:1,borderColor:bf._err&&si===0&&!(bf.steps||[""])[0]?.trim()?"var(--color-text-danger)":undefined}} value={step} onChange={e=>{const s=[...(bf.steps||[""])];s[si]=e.target.value;setBf(p=>({...p,steps:s,_err:false}));}} placeholder={si===0?"Navigate to the feature":si===1?"Perform the action":"Observe the result"}/>
              {(bf.steps||[""]).length>1&&<button onClick={()=>{const s=[...(bf.steps||[""])];s.splice(si,1);setBf(p=>({...p,steps:s}));}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"0 4px",lineHeight:1,flexShrink:0}}>✕</button>}
            </div>)}
            <button onClick={()=>setBf(p=>({...p,steps:[...(p.steps||[""]),""]})) } style={{...ghostBtn,fontSize:12,padding:"3px 10px",marginBottom:10}}>+ Add step</button>
            <Lbl>Expected Result <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input style={{...inp,marginBottom:10,borderColor:bf._err&&!bf.expected.trim()?"var(--color-text-danger)":undefined}} value={bf.expected} onChange={e=>setBf(p=>({...p,expected:e.target.value,_err:false}))} placeholder="e.g. User is redirected to the dashboard"/>
            <Lbl>Actual Result <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input style={{...inp,marginBottom:10,borderColor:bf._err&&!bf.actual.trim()?"var(--color-text-danger)":undefined}} value={bf.actual} onChange={e=>setBf(p=>({...p,actual:e.target.value,_err:false}))} placeholder="e.g. Page shows a 500 error / Spinner never stops / Element not clickable"/>
            <Lbl>Attachments — images &amp; videos (optional)</Lbl>
            <div style={{marginBottom:12}}>
              {(bf.attachments||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
                {(bf.attachments||[]).map((a,i)=><div key={i} style={{position:"relative"}}>
                  {a.type.startsWith("image/")
                    ?<img src={a.dataUrl} alt={a.name} style={{width:90,height:65,objectFit:"cover",borderRadius:6,border:"1px solid var(--color-border-secondary)",display:"block"}}/>
                    :<div style={{width:90,height:65,borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"var(--color-background-tertiary)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3}}>
                        <span style={{fontSize:20}}>🎬</span>
                        <span style={{fontSize:10,color:"var(--color-text-secondary)",textAlign:"center",padding:"0 4px",maxWidth:82,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                      </div>}
                  <button onClick={()=>setBf(p=>({...p,attachments:p.attachments.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:-6,right:-6,background:"var(--color-text-danger)",color:"#fff",border:"none",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                </div>)}
              </div>}
              <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"12px 16px",borderRadius:8,border:"2px dashed var(--color-border-secondary)",background:"var(--color-background-secondary)"}}>

            <Btn v="danger" onClick={async()=>{
              const stepLines=(bf.steps||[]).filter(s=>s.trim());

              const adfDesc={type:"doc",version:1,content:[
