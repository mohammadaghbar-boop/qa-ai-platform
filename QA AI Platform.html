                      </div>
                    </div>}
                  </div>}
                  {["POST","PUT","PATCH"].includes(perfForm.method)&&<div><Lbl>Request Body (JSON)</Lbl><textarea style={{...inp,height:76,fontFamily:"monospace",resize:"vertical"}} value={perfForm.requestBody} onChange={e=>s_({requestBody:e.target.value})} placeholder='{"key":"value"}'/></div>}
                </div>
              </div>

              {/* Load Profile */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>Load Profile</H2>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <div><Lbl>{isStress?"Max Virtual Users":"Virtual Users"}</Lbl><input style={inpN} type="number" min="1" max="1000" value={perfForm.vus} onChange={e=>s_({vus:parseInt(e.target.value)||1})}/></div>
                  <div>
                    <Lbl>{isStress?"Duration / Step":"Duration"}</Lbl>
                    <select style={{...inp}} value={perfForm.duration} onChange={e=>s_({duration:e.target.value})}>
                      <option value="30s">30 seconds</option><option value="60s">1 minute</option><option value="2m">2 minutes</option><option value="5m">5 minutes</option>
                    </select>
                  </div>
                  {!isStress&&<div>
                    <Lbl>Ramp Up/Down</Lbl>
                    <select style={{...inp}} value={perfForm.ramp} onChange={e=>s_({ramp:e.target.value})}>
                      <option value="5s">5 seconds</option><option value="10s">10 seconds</option><option value="30s">30 seconds</option>
                    </select>
                  </div>}
                </div>
              </div>

              {/* Thresholds */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>Thresholds</H2>
                <div style={{maxWidth:260}}>
                  <Lbl>p95 Response Time (ms)</Lbl>
                  <input style={inpN} type="number" value={perfForm.p95Threshold} onChange={e=>s_({p95Threshold:parseInt(e.target.value)||2000})}/>
                  <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:4}}>Test fails if 95% of requests exceed this limit. Industry standard ≤ 2000 ms.</div>
                </div>
              </div>

              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <Btn v="primary" onClick={doRunPerfTest} disabled={!perfForm.testName.trim()||!perfForm.apiUrl.trim()||(perfForm.authType==="csv"&&(!perfForm.csvUsers||perfForm.csvUsers.length===0))}>▶ Start Test</Btn>
                <button onClick={()=>setPhase("testType")} style={{...ghostBtn,fontSize:13}}>← Back</button>
              </div>
            </div>

            {/* ── RIGHT: live summary ── */}
            <div style={{width:230,flexShrink:0}}>
              <div style={{...card,position:"sticky",top:0}}>
                <H2 style={{marginBottom:12}}>Test Summary</H2>
                {[
                  {label:"Type",val:<Tag c={isStress?"red":"blue"}>{isStress?"Stress":"Load"}</Tag>},
                  {label:"Name",val:perfForm.testName||"—"},
                  {label:"Method",val:<Tag c="blue">{perfForm.method}</Tag>},
                  {label:"URL",val:<span style={{fontSize:11,wordBreak:"break-all"}}>{perfForm.apiUrl||"—"}</span>},
                  {label:"Auth",val:perfForm.authType==="bearer"?"🔑 Bearer":perfForm.authType==="basic"?"👤 Basic":perfForm.authType==="csv"?("🔄 Dynamic ("+(perfForm.csvUsers?.length||0)+" users)"):"🔓 None"},
                  null,
                  {label:"Virtual Users",val:isStress?perfForm.vus+" (max)":String(perfForm.vus)},
                  {label:"Duration",val:isStress?(durLabels[perfForm.duration]+" / step"):(durLabels[perfForm.duration]||perfForm.duration)},
                  {label:"Est. Total",val:`~${Math.floor(totalSec/60)}m ${totalSec%60}s`},
                  {label:"p95 Threshold",val:perfForm.p95Threshold+" ms"},
                ].map((row,i)=>row===null
                  ?<div key={i} style={{borderTop:"1px solid var(--color-border-tertiary)",margin:"8px 0"}}/>
                  :<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,gap:8}}>
                    <span style={{fontSize:12,color:"var(--color-text-tertiary)",flexShrink:0}}>{row.label}</span>
                    <span style={{fontSize:12,fontWeight:500,textAlign:"right"}}>{row.val}</span>
                  </div>
                )}
                {isStress&&<div style={{marginTop:8,fontSize:12,color:"var(--color-text-secondary)",background:"var(--color-background-warning)",padding:"8px 10px",borderRadius:8}}>
                  🔥 Steps: {Math.ceil(perfForm.vus*.25)} → {Math.ceil(perfForm.vus*.5)} → {Math.ceil(perfForm.vus*.75)} → {perfForm.vus} VUs
                </div>}
              </div>
            </div>
          </div>;
        })()}

        {!loading&&!perfLoading&&phase==="perfResult"&&perfResult&&(()=>{
          const pass=perfResult.passed;
          const m=perfResult.metrics||{};
          const over=m.p95>perfResult.p95Threshold;
          return <div>
            {/* Banner */}
            <div style={{...card,background:pass?"var(--color-background-success)":"var(--color-background-danger)",border:"1px solid "+(pass?"var(--color-text-success)":"var(--color-text-danger)"),marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:32}}>{pass?"✅":"❌"}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:16}}>{pass?"All thresholds passed":"Test failed — thresholds exceeded"}</div>
                  <div style={{fontSize:13,color:"var(--color-text-secondary)",marginTop:2}}>{perfResult.testName} · {perfResult.testType==="stress"?"Stress":"Load"} Test · {perfResult.vus} VUs</div>
                </div>
              </div>
            </div>
            {/* Metrics grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12,marginBottom:16}}>
              {[
                {icon:"📊",label:"Total Requests",val:(m.totalRequests||0).toLocaleString()},
                {icon:"⚡",label:"Requests / sec",val:m.rps},
                {icon:"⏱",label:"p95 Latency",val:`${m.p95} ms`,warn:over},
                {icon:"⚠️",label:"Error Rate",val:`${m.errorRate}%`,warn:m.errorRate>5},
                {icon:"📈",label:"Avg Latency",val:`${m.avgDuration} ms`},
                {icon:"📈",label:"Max Latency",val:`${m.maxDuration} ms`},
              ].map((x,i)=><div key={i} style={{...card,marginBottom:0,textAlign:"center",border:x.warn?"1px solid var(--color-text-danger)":"1px solid var(--color-border-tertiary)"}}>
                <div style={{fontSize:18,marginBottom:4}}>{x.icon}</div>
                <div style={{fontSize:20,fontWeight:700,color:x.warn?"var(--color-text-danger)":undefined}}>{x.val}</div>
                <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>{x.label}</div>
              </div>)}
            </div>
            {/* Latency breakdown */}
            <div style={card}>
              <H2 style={{marginBottom:12}}>Response Time Breakdown</H2>
              <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
                {[["Min",m.minDuration],["Avg",m.avgDuration],["p50",m.p50],["p90",m.p90],["p95",m.p95],["p99",m.p99],["Max",m.maxDuration]].map(([lbl,val])=>(
                  <div key={lbl} style={{textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:600,color:lbl==="p95"&&over?"var(--color-text-danger)":undefined}}>{val} ms</div>
                    <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>
            {/* Actions */}
            <div style={{display:"flex",gap:12,marginTop:4}}>
              <Btn v="primary" onClick={()=>setPhase("perfTest")}>↩ Run Again</Btn>
              <Btn onClick={()=>setPhase("testType")}>← Change Test Type</Btn>
            </div>
          </div>;
        })()}

        {!loading&&phase==="mode"&&<div>
          {sdata&&!sdata.sim&&<div style={{...card,background:"var(--color-background-success)",marginBottom:12}}>
            <div style={{fontWeight:500,marginBottom:6}}>{sdata.summary}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:13,color:"var(--color-text-secondary)",alignItems:"center"}}>
              <Tag c="blue">{sdata.type}</Tag><Tag c="amber">{sdata.status}</Tag><span>{sdata.assignee}</span><Tag c={sdata.priority==="High"?"red":"blue"}>{sdata.priority}</Tag>
              {(sdata.labels||[]).map((l,i)=><Tag key={i}>{l}</Tag>)}
            </div>
            {sdata.description
              ?<div>
                <div style={{fontSize:13,marginTop:6,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                  {showFullStory?sdata.description:(sdata.description.slice(0,300)+(sdata.description.length>300?"…":""))}
                </div>
                {sdata.description.length>300&&<button onClick={()=>setShowFullStory(x=>!x)} style={{marginTop:8,padding:"4px 12px",borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-info)",fontWeight:500}}>
                  {showFullStory?"▲ Hide":"▼ Show Full Story"}
                </button>}
              </div>
              :<div style={{fontSize:12,marginTop:6,color:"var(--color-text-warning)"}}>⚠ No description found in Jira — add one to improve GAP analysis and test case quality.</div>}
          </div>}
          {proj.platform==="both"&&<div style={{...card,marginBottom:12}}><H2>Select platform for this story</H2><div style={{display:"flex",gap:12,marginTop:12}}>{[{v:"web",icon:"🌐",label:"Web",sub:"Playwright"},{v:"mobile",icon:"📱",label:"Mobile",sub:"Appium"}].map(o=><button key={o.v} onClick={()=>setPlatform(o.v)} style={{flex:1,padding:16,borderRadius:12,border:"2px solid "+(platform===o.v?"var(--color-text-info)":"var(--color-border-secondary)"),background:platform===o.v?"var(--color-background-info)":"var(--color-background-primary)",cursor:"pointer",textAlign:"left"}}><div style={{fontSize:22,marginBottom:4}}>{o.icon}</div><div style={{fontWeight:500,fontSize:14}}>{o.label}</div><div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{o.sub}</div></button>)}</div></div>}
          <div style={card}><div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}}>Story: <b>{sid}</b></div><H2>What would you like to do?</H2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                {icon:"🔍",title:"Story review + GAP analysis",desc:gapText?"View saved GAP analysis (already done)":"Analyze ACs for gaps and missing scenarios.",fn:gapText?()=>setPhase("gap"):doGap,done:!!gapText},
                {icon:"📝",title:"Write test cases",desc:cases.length>0?`Resume — ${cases.length} test cases already generated`:"Generate structured manual test cases.",fn:()=>cases.length>0?setPhase("review"):setPhase("ctype"),done:cases.length>0}
              ].map(o=><button key={o.title} onClick={o.fn} style={{padding:20,borderRadius:12,border:"1px solid "+(o.done?"var(--color-text-success)":"var(--color-border-secondary)"),background:o.done?"var(--color-background-success)":"var(--color-background-primary)",cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:24,marginBottom:8}}>{o.icon}{o.done&&<span style={{fontSize:14,marginLeft:6,color:"var(--color-text-success)"}}>✓</span>}</div><div style={{fontWeight:500,fontSize:15,marginBottom:4}}>{o.title}</div><div style={{fontSize:13,color:o.done?"var(--color-text-success)":"var(--color-text-secondary)",lineHeight:1.5}}>{o.desc}</div>
              </button>)}
            </div>
          </div>
        </div>}

        {!loading&&phase==="gap"&&<div>
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}><Tag c="blue">{sid}</Tag><span style={{fontWeight:500}}>GAP Analysis</span></div>
              <button onClick={doGap} style={{...ghostBtn,fontSize:12,padding:"4px 10px"}}>🔄 Regenerate</button>
            </div>
            <div style={{fontSize:14,lineHeight:1.85}}>
              {gapText.split("\n").map((line,i)=>{
                const isTitle=/^[A-Z][A-Z\s&]+:/.test(line.trim());
                return <div key={i} style={{whiteSpace:"pre-wrap",fontWeight:isTitle?700:400,marginTop:isTitle?14:0,color:isTitle?"var(--color-text-primary)":"inherit"}}>{line||" "}</div>;
              })}
            </div>
          </div>
          <Confirm icon="📝" title="Would you like to write test cases?" onYes={()=>{const et=[...new Set(cases.map(c=>c.type))];if(et.length>0)setCtypes(et);setPhase("ctype");}} yesLabel="Yes, write test cases"/>
        </div>}

        {!loading&&phase==="ctype"&&<div style={card}>
          <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}}>Story: <b>{sid}</b></div><H2>Which test case types?</H2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {(()=>{const ect=[...new Set(cases.map(c=>c.type))];return [{k:"happy",l:"Happy flow",d:"Core successful journeys"},{k:"edge",l:"Edge cases",d:"Unusual but valid states"},{k:"boundary",l:"Boundary cases",d:"At/near documented limits"},{k:"negative",l:"Negative cases",d:"Error & auth handling"},{k:"regression",l:"Regression cases",d:"Existing behavior still works"},{k:"all",l:"All of the above",d:"Full coverage (all layers)"}].map(o=>{const hasCases=o.k==="all"?false:ect.includes(o.k);const isDisabled=ctypes.includes("all")&&o.k!=="all";const count=hasCases?cases.filter(c=>c.type===o.k).length:0;const isChecked=ctypes.includes(o.k);return <label key={o.k} style={{display:"flex",gap:10,padding:14,borderRadius:10,border:"1px solid "+(hasCases&&isChecked?"var(--color-text-success)":isChecked?"var(--color-text-info)":"var(--color-border-secondary)"),background:hasCases&&isChecked?"var(--color-background-success)":isChecked?"var(--color-background-info)":isDisabled?"var(--color-background-tertiary)":"var(--color-background-primary)",cursor:isDisabled?"not-allowed":"pointer",opacity:isDisabled?0.45:1}}>
              <input type="checkbox" checked={isChecked} disabled={isDisabled} onChange={()=>{if(o.k==="all"){setCtypes(p=>p.includes("all")?[]:["all"]);}else{setCtypes(p=>{const w=p.filter(x=>x!=="all"&&x!==o.k);return p.includes(o.k)?w:[...w,o.k];});}}} style={{marginTop:2}}/>
              <div><div style={{fontWeight:500,display:"flex",alignItems:"center",gap:6}}>{o.l}{hasCases&&<span style={{fontSize:11,color:"var(--color-text-success)",fontWeight:400}}>✓ {count} cases</span>}</div><div style={{fontSize:12,color:hasCases&&isChecked?"var(--color-text-success)":"var(--color-text-secondary)",marginTop:2}}>{hasCases&&isChecked?"Will be kept — uncheck to remove":hasCases&&!isChecked?"Will be removed":o.d}</div></div>
            </label>;});})()}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <Lbl>Generation model</Lbl>
            <select style={{...sel,width:"auto",minWidth:200}} value={genModel} onChange={e=>setGenModel(e.target.value)}>
              <option value="claude-sonnet-5">Sonnet 5 — balanced (recommended)</option>
              <option value="claude-opus-4-7">Opus 4.7 — max quality (slower)</option>
              <option value="claude-haiku-4-5">Haiku 4.5 — fastest draft</option>
            </select>
          </div>
          {(()=>{const ect=[...new Set(cases.map(c=>c.type))];const sel=ctypes.includes("all")?["happy","edge","negative","boundary","regression"]:ctypes;const hasNew=sel.some(t=>!ect.includes(t));return <Btn v="primary" onClick={()=>(ctypes.length>0||ect.length>0)&&doGen()} disabled={ctypes.length===0&&ect.length===0}>{hasNew?"Generate test cases →":"View generated cases →"}</Btn>;})()}
        </div>}

        {!loading&&phase==="ready"&&<div>
          <Banner icon="✅" title={cases.length+" test cases generated"} sub={"Platform: "+platform+" · "+cases.filter(c=>c.automatable!==false).length+" automatable · "+cases.filter(c=>c.automatable===false).length+" manual-only"} color="success"/>
          <div style={{...card,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Filter by type:</span>
            <select style={{...sel,width:"auto",minWidth:160}} value={readyFilter} onChange={e=>setReadyFilter(e.target.value)}>
              <option value="all">All types ({cases.length})</option>
              {[...new Set(cases.map(c=>c.type))].map(t=><option key={t} value={t}>{t[0].toUpperCase()+t.slice(1)} flow ({cases.filter(c=>c.type===t).length})</option>)}
            </select>
            <button onClick={()=>{const et=[...new Set(cases.map(c=>c.type))];setCtypes(et.length>0?et:[]);setPhase("ctype");}} style={{...ghostBtn,fontSize:13,marginLeft:"auto"}}>← Add more types</button>
          </div>

            </div>
          </div>)}
          <div style={{marginBottom:16}}>
            <button onClick={()=>setShowAddCase(o=>!o)} style={{...ghostBtn,borderStyle:"dashed"}}>+ Add test case manually</button>

              <div><Lbl>Layer</Lbl><select style={sel} value={newCase.layer||"Functional"} onChange={e=>setNewCase(p=>({...p,layer:e.target.value}))}><option value="Functional">Functional</option><option value="UI">UI</option><option value="API">API</option><option value="Database">Database</option><option value="Security">Security</option></select></div>

            </div>
          </div>
        </div>}

        {!loading&&phase==="urlPrompt"&&<div>
          <div style={card}>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}><span style={{fontSize:20}}>🔗</span><span style={{fontWeight:500,fontSize:16}}>Application URL</span></div>

            <input autoFocus style={{...inp,marginBottom:16,fontSize:14}} value={appUrl} onChange={e=>setAppUrl(e.target.value)} placeholder="https://example.com" onKeyDown={e=>e.key==="Enter"&&appUrl.trim()&&setPhase("scriptSelect")}/>
            {codegenScript&&<div style={{...card,marginBottom:16,background:"var(--color-background-success)",border:"1px solid var(--color-text-success)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-success)"}}>✅ Codegen recording ready — locators will be used in script generation</div>
                <button onClick={()=>{setCodegenScript("");setCodegenStatus("idle");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--color-text-tertiary)"}}>✕ Clear</button>
              </div>
            </div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <Btn v="primary" onClick={()=>appUrl.trim()&&setPhase("scriptSelect")} disabled={!appUrl.trim()}>
                {codegenScript?"Generate Scripts with Recorded Locators →":"Continue to Script Generation →"}
              </Btn>
              {platform!=="mobile"&&<button onClick={()=>appUrl.trim()&&startCodegen()} disabled={!appUrl.trim()||codegenStatus==="launching"} style={{padding:"8px 18px",borderRadius:8,border:"1px solid #0052CC",background:appUrl.trim()?"#0052CC":"var(--color-background-tertiary)",color:appUrl.trim()?"#fff":"var(--color-text-tertiary)",cursor:appUrl.trim()?"pointer":"not-allowed",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",gap:8}}>
                {codegenStatus==="launching"?"Launching…":"🎭 Record with Playwright Codegen"}
              </button>}
            </div>
            {platform!=="mobile"&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:8,background:"var(--color-background-tertiary)",fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.6}}>
              <b>💡 Playwright Codegen</b> opens a live browser at your URL. Perform your test actions manually — clicks, form fills, navigation — and the platform captures the exact locators to use in the generated scripts. Close the browser when done.
            </div>}
          </div>
        </div>}

        {phase==="codegenRecording"&&<div>
          <div style={card}>
            <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}><span style={{fontSize:24}}>🎭</span><div><div style={{fontWeight:600,fontSize:16}}>Playwright Codegen — Live Recording</div><div style={{fontSize:13,color:"var(--color-text-secondary)",marginTop:2}}>{appUrl}</div></div></div>
            {codegenStatus==="launching"&&<Loader msg="Launching browser…" sub="Opening Playwright Codegen for your application"/>}
            {codegenStatus==="running"&&<div>
              <div style={{...card,background:"var(--color-background-danger)",border:"1px solid var(--color-text-danger)",marginBottom:16}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:"var(--color-text-danger)",display:"inline-block",animation:"qa-pulse 1.2s ease-in-out infinite",flexShrink:0}}/>

                {["Click elements and buttons","Fill in form fields","Navigate between pages"].map((tip,i)=><div key={i} style={{padding:"10px 12px",borderRadius:8,background:"var(--color-background-tertiary)",fontSize:12,color:"var(--color-text-secondary)"}}><span style={{marginRight:6}}>{"🖱️✏️🔗"[i]}</span>{tip}</div>)}
              </div>
              <button onClick={cancelCodegen} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>✕ Cancel Recording</button>
            </div>}
            {codegenStatus==="done"&&<div>

              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:6}}>Recorded script preview:</div>
                <pre style={{background:"var(--color-background-tertiary)",borderRadius:8,padding:14,fontSize:11,fontFamily:"monospace",lineHeight:1.6,overflow:"auto",maxHeight:280,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0}}>{codegenScript}</pre>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <Btn v="primary" onClick={()=>setPhase("scriptSelect")}>Use Recorded Locators →</Btn>
                <button onClick={startCodegen} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>🔄 Record Again</button>
                <button onClick={()=>{setCodegenScript("");setCodegenStatus("idle");setPhase("scriptSelect");}} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Skip Recording</button>
              </div>
            </div>}

              <Tag c="blue">{c.id}</Tag><Tag c={tcol(c.type)}>{c.type}</Tag>{(c.layer||c.category)&&<Tag c={ccol(c.layer||c.category)}>{c.layer||c.category}</Tag>}<span style={{fontSize:14,flex:1}}>{c.title}</span>
            </label>)}

          </div>

        {!loading&&phase==="autoReady"&&<div>

            {platform==="mobile"?<Tabs tabs={[{id:"ios",label:"iOS (Appium)"},{id:"android",label:"Android (Appium)"}]} active={tab} onChange={setTab}/>:<Tabs tabs={[{id:"web",label:"Web automation script"}]} active={tab} onChange={setTab}/>}
            <pre style={{background:"var(--color-background-tertiary)",borderRadius:8,padding:16,fontSize:12,fontFamily:"monospace",lineHeight:1.6,overflow:"auto",maxHeight:360,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0,marginBottom:12}}>{curScript||"No script yet."}</pre>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button onClick={()=>navigator.clipboard?.writeText(curScript)} style={ghostBtn}>📋 Copy</button><button onClick={()=>dlFile(curScript,tab==="web"?sid+".spec.js":sid+"_"+tab+".test.js","text/javascript")} style={ghostBtn}>⬇ Download</button></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn v="primary" onClick={()=>setPhase("runAsk")}>▶ Run Tests</Btn>
          </div>
        </div>}

        {!loading&&phase==="runAsk"&&<Confirm icon="▶️" title="Start test execution?" desc={"Live terminal output for "+selectedForScripts.length+" selected scripts."} onYes={doRun} yesLabel="Yes, run scripts"/>}
        {phase==="running"&&<div style={card}><div style={{fontWeight:500,marginBottom:12}}>▶ Running tests…</div><Terminal lines={execLines}/></div>}

          <div style={card}><div style={{fontWeight:500,marginBottom:10}}>Execution log</div><Terminal lines={execLines}/></div>

        {!loading&&phase==="bugReport"&&<div>

            <H2>Failed cases</H2>
            {result.fail.filter(c=>!sessionBugs.some(b=>b.tcId===c.id)).map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--color-border-tertiary)"}}>
              <Tag c="red">{c.id}</Tag><span style={{flex:1,fontSize:13}}>{c.title}</span>
              <button onClick={()=>{setBf({tcId:c.id,summary:c.title+" is not working as expected",sev:"High",steps:(c.steps||[]).length>0?[...c.steps]:["Reproduce the issue"],expected:c.expected||"The feature works as designed",actual:c._pwError||"Test execution failed",testData:c.testData||"",attachments:[],_err:false});setShowBugForm(true);}} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>🐛 File Bug</button>
            </div>)}
          </div>}
          <div style={card}>
            <H2>File a bug report</H2>
            <Lbl>Summary <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input style={{...inp,marginBottom:10,borderColor:bf._err&&!bf.summary.trim()?"var(--color-text-danger)":undefined}} value={bf.summary} onChange={e=>setBf(p=>({...p,summary:e.target.value,_err:false}))} placeholder="e.g. Login button unresponsive after entering valid credentials"/>
            <Lbl>Severity</Lbl>
            <select style={{...sel,marginBottom:10}} value={bf.sev} onChange={e=>setBf(p=>({...p,sev:e.target.value}))}>{["Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}</select>
            <Lbl>Test Data</Lbl>
            <textarea style={{...ta,marginBottom:10}} rows={2} value={bf.testData||""} onChange={e=>setBf(p=>({...p,testData:e.target.value}))} placeholder="e.g. username: admin / password: Test@123"/>
            <Lbl>Steps to Reproduce <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            {(bf.steps||[""]).map((step,si)=><div key={si} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--color-text-tertiary)",minWidth:18}}>{si+1}.</span>
              <input style={{...inp,flex:1,borderColor:bf._err&&si===0&&!(bf.steps||[""])[0]?.trim()?"var(--color-text-danger)":undefined}} value={step} onChange={e=>{const s=[...(bf.steps||[""])];s[si]=e.target.value;setBf(p=>({...p,steps:s,_err:false}));}} placeholder={si===0?"Navigate to the feature":si===1?"Perform the action":"Observe the result"}/>
              {(bf.steps||[""]).length>1&&<button onClick={()=>{const s=[...(bf.steps||[""])];s.splice(si,1);setBf(p=>({...p,steps:s}));}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"0 4px",lineHeight:1,flexShrink:0}}>✕</button>}
            </div>)}
            <button onClick={()=>setBf(p=>({...p,steps:[...(p.steps||[""]),""]})) } style={{...ghostBtn,fontSize:12,padding:"3px 10px",marginBottom:10}}>+ Add step</button>
            <Lbl>Expected Result <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input style={{...inp,marginBottom:10,borderColor:bf._err&&!bf.expected.trim()?"var(--color-text-danger)":undefined}} value={bf.expected} onChange={e=>setBf(p=>({...p,expected:e.target.value,_err:false}))} placeholder="e.g. User is redirected to the dashboard"/>
            <Lbl>Actual Result <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input style={{...inp,marginBottom:10,borderColor:bf._err&&!bf.actual.trim()?"var(--color-text-danger)":undefined}} value={bf.actual} onChange={e=>setBf(p=>({...p,actual:e.target.value,_err:false}))} placeholder="e.g. Page shows a 500 error / Spinner never stops / Element not clickable"/>
            <Lbl>Attachments — images &amp; videos (optional)</Lbl>
            <div style={{marginBottom:12}}>
              {(bf.attachments||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
                {(bf.attachments||[]).map((a,i)=><div key={i} style={{position:"relative"}}>
                  {a.type.startsWith("image/")
                    ?<img src={a.dataUrl} alt={a.name} style={{width:90,height:65,objectFit:"cover",borderRadius:6,border:"1px solid var(--color-border-secondary)",display:"block"}}/>
                    :<div style={{width:90,height:65,borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"var(--color-background-tertiary)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3}}>
                        <span style={{fontSize:20}}>🎬</span>
                        <span style={{fontSize:10,color:"var(--color-text-secondary)",textAlign:"center",padding:"0 4px",maxWidth:82,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                      </div>}
                  <button onClick={()=>setBf(p=>({...p,attachments:p.attachments.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:-6,right:-6,background:"var(--color-text-danger)",color:"#fff",border:"none",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                </div>)}
              </div>}
              <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"12px 16px",borderRadius:8,border:"2px dashed var(--color-border-secondary)",background:"var(--color-background-secondary)"}}>
                <span style={{fontSize:22}}>📎</span>
                <div><div style={{fontSize:13,fontWeight:500,color:"var(--color-text-secondary)"}}>Click to add images or videos</div><div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:2}}>PNG, JPG, GIF, MP4, MOV · Multiple files · Max 10 MB each</div></div>
                <input type="file" accept="image/*,video/*" multiple style={{display:"none"}} onChange={e=>{
                  Array.from(e.target.files||[]).forEach(file=>{
                    if(file.size>10*1024*1024){alert(file.name+" exceeds 10 MB and was skipped.");return;}
                    const reader=new FileReader();
                    reader.onload=ev=>setBf(p=>({...p,attachments:[...(p.attachments||[]),{name:file.name,dataUrl:ev.target.result,type:file.type}]}));
                    reader.readAsDataURL(file);
                  });
                  e.target.value="";
                }}/>
              </label>
            </div>
            {bf._err&&<div style={{color:"var(--color-text-danger)",fontSize:12,marginBottom:10}}>Please fill in all required fields (*) before submitting.</div>}
            <Btn v="danger" onClick={async()=>{
              const stepLines=(bf.steps||[]).filter(s=>s.trim());
              if(!bf.summary.trim()||stepLines.length===0||!bf.expected.trim()||!bf.actual.trim()){setBf(p=>({...p,_err:true}));return;}
              setLoading(true);setLmsg("Filing bug…");
              const adfDesc={type:"doc",version:1,content:[
                {type:"heading",attrs:{level:3},content:[{type:"text",text:"Steps to Reproduce"}]},
                {type:"orderedList",content:stepLines.length>0?stepLines.map(s=>({type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:s.replace(/^\d+\.\s*/,"")}]}]})):[{type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:"See summary"}]}]}]},
                {type:"heading",attrs:{level:3},content:[{type:"text",text:"Expected Result"}]},
                {type:"paragraph",content:[{type:"text",text:bf.expected||"—"}]},
                {type:"heading",attrs:{level:3},content:[{type:"text",text:"Actual Result"}]},
                {type:"paragraph",content:[{type:"text",text:bf.actual||"—"}]},
                {type:"heading",attrs:{level:3},content:[{type:"text",text:"Story"}]},
                {type:"paragraph",content:[{type:"text",text:sid+" · Filed by "+member.name}]},
              ]};
              const bug={bid:"BUG-"+uid().toUpperCase(),sid,summary:bf.summary||"Bug in "+sid,sev:bf.sev,who:member.name,jKey:null,status:"Open",steps:stepLines,expected:bf.expected,actual:bf.actual,attachments:bf.attachments||[],tcId:bf.tcId||null};
              DB.bugs.push(bug);saveDB();pushNotif("admin","🐛 "+bug.bid+" filed for "+sid);
              // Create Jira issue then attach files
              let jiraKey=null;
              try{
                const res=await callJira(proj,"POST","/issue",{fields:{project:{key:proj.jiraProjKey},summary:bug.summary,description:adfDesc,issuetype:{name:"Bug"},priority:{name:bug.sev}}});
                jiraKey=res.key;
                bug.jKey=jiraKey;
                DB.bugs=DB.bugs.map(x=>x.bid===bug.bid?{...x,jKey:jiraKey}:x); saveDB();
                await callJira(proj,"POST","/issueLink",{type:{name:"Relates"},inwardIssue:{key:jiraKey},outwardIssue:{key:sid}}).catch(()=>
                  callJira(proj,"POST","/issueLink",{type:{name:"relates to"},inwardIssue:{key:jiraKey},outwardIssue:{key:sid}}).catch(()=>{})
                );
                if((bug.attachments||[]).length>0){
                  try{
                    const token=await _ensureSession();
                    await fetch(API_BASE+"/api/jira/attach",{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":token||""},body:JSON.stringify({issueKey:jiraKey,files:bug.attachments.map(a=>({name:a.name,dataUrl:a.dataUrl}))})});
                  }catch{}
                }
              }catch{}
              const bugCase={id:bug.bid,title:bf.summary||"Bug in "+sid,type:"negative",platform,preconditions:"",steps:stepLines.length>0?stepLines:["Reproduce the bug"],expected:bf.expected||"Bug is fixed",automatable:false,status:"approved",fromBug:true,sev:bf.sev};
              setCases(cs=>[...cs,bugCase]);
              setSessionBugs(p=>[...p,bug]);setBf({summary:"",sev:"High",steps:[""],expected:"",actual:"",attachments:[],_err:false});setLoading(false);
            }}>Submit Bug</Btn>
          </div>
          {sessionBugs.length>0&&<div style={card}>
            <H2>Bugs filed this session</H2>
            {sessionBugs.map(b=><div key={b.bid} style={{borderBottom:"1px solid var(--color-border-tertiary)",padding:"8px 0"}}>
              {editingBugId===b.bid
                ?<div style={{display:"flex",flexDirection:"column",gap:8,paddingTop:4}}>
                    <input style={{...inp,marginBottom:0}} value={editBugForm.summary} onChange={e=>setEditBugForm(p=>({...p,summary:e.target.value}))} placeholder="Summary"/>
                    <select style={{...sel,marginBottom:0}} value={editBugForm.sev} onChange={e=>setEditBugForm(p=>({...p,sev:e.target.value}))}>{["Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}</select>
                    <textarea style={{...ta,marginBottom:0}} rows={2} value={editBugForm.desc||""} onChange={e=>setEditBugForm(p=>({...p,desc:e.target.value}))} placeholder="Description"/>
                    <div style={{display:"flex",gap:8}}>
                      <Btn v="primary" onClick={()=>{
                        const updated={...b,...editBugForm};
                        setSessionBugs(p=>p.map(x=>x.bid===b.bid?updated:x));
                        DB.bugs=DB.bugs.map(x=>x.bid===b.bid?{...x,...editBugForm}:x); saveDB();
                        setCases(cs=>cs.map(c=>c.id===b.bid?{...c,title:editBugForm.summary,sev:editBugForm.sev,steps:editBugForm.desc?editBugForm.desc.split("\n").filter(Boolean):c.steps}:c));
                        setEditingBugId(null);
                      }}>Save</Btn>
                      <button onClick={()=>setEditingBugId(null)} style={ghostBtn}>Cancel</button>
                    </div>
                  </div>
                :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <Tag c="red">{b.bid}</Tag>
                      <span style={{flex:1,fontSize:13,fontWeight:500}}>{b.summary}</span>
                      <Tag c={b.sev==="Critical"||b.sev==="High"?"red":"amber"}>{b.sev}</Tag>
                      {b.jKey&&<Tag c="green">{b.jKey}</Tag>}
                      <Tag c="blue">TC</Tag>
                      <button title="Edit" onClick={()=>{setEditingBugId(b.bid);setEditBugForm({summary:b.summary,sev:b.sev,desc:b.desc||""});}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:14,padding:"2px 5px"}}>✎</button>
                      <button title="Delete" onClick={()=>{
                        setSessionBugs(p=>p.filter(x=>x.bid!==b.bid));
                        DB.bugs=DB.bugs.filter(x=>x.bid!==b.bid); saveDB();
                        setCases(cs=>cs.filter(c=>c.id!==b.bid));
                      }} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"2px 5px"}}>✕</button>
                    </div>
                    {b.actual&&<div style={{fontSize:12,color:"var(--color-text-secondary)",paddingLeft:4}}>Actual: {b.actual}</div>}
                    {((b.attachments||[]).length>0||(b.screenshot&&!b.attachments?.length))&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
                      {(b.attachments||[]).map((a,i)=>a.type?.startsWith("image/")
                        ?<img key={i} src={a.dataUrl} alt={a.name} title="Click to view" onClick={()=>window.open(a.dataUrl)} style={{maxWidth:120,maxHeight:80,borderRadius:6,border:"1px solid var(--color-border-secondary)",cursor:"pointer"}}/>
                        :<span key={i} style={{fontSize:12,color:"var(--color-text-info)",cursor:"pointer",display:"flex",alignItems:"center",gap:3}} onClick={()=>window.open(a.dataUrl)}>🎬 {a.name}</span>)}
                      {b.screenshot&&!b.attachments?.length&&<img src={b.screenshot} alt="Screenshot" title="Click to view" onClick={()=>window.open(b.screenshot)} style={{maxWidth:120,maxHeight:80,borderRadius:6,border:"1px solid var(--color-border-secondary)",cursor:"pointer"}}/>}
                    </div>}
                  </div>}
            </div>)}
          </div>}
          {sessionBugs.length>0&&proj?.jiraToken&&(()=>{
            const unlinked=sessionBugs.filter(b=>!b.jKey);
            return <div style={{...card,background:unlinked.length===0?"var(--color-background-success)":"var(--color-background-info)",border:"1px solid "+(unlinked.length===0?"var(--color-text-success)":"var(--color-text-info)")}}>
              {unlinked.length===0
                ?<div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>✅</span>
                    <div>
                      <div style={{fontWeight:500,fontSize:14,color:"var(--color-text-success)"}}>All bugs linked to Jira</div>
                      <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{sessionBugs.length} bug{sessionBugs.length!==1?"s":""} created and linked to story <b>{sid}</b> in {proj.jiraProjKey}</div>
                    </div>
                    <div style={{marginLeft:"auto",display:"flex",gap:6,flexWrap:"wrap"}}>{sessionBugs.map(b=>b.jKey&&<Tag key={b.bid} c="green">{b.jKey}</Tag>)}</div>
                  </div>
                :<div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:500,fontSize:14,color:"var(--color-text-info)"}}>Link bugs to Jira</div>
                      <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{unlinked.length} bug{unlinked.length!==1?"s":""} ready to be created in <b>{proj.jiraProjKey}</b> and linked to story <b>{sid}</b></div>
                    </div>
                    <button onClick={async()=>{
                      setLoading(true);setLmsg("Creating bugs in Jira and linking to "+sid+"…");
                      const updated=[...sessionBugs];
                      let failCount=0;
                      for(const b of updated.filter(x=>!x.jKey)){
                        try{
                          const stepLines=(b.steps||[]);
                          const adfDesc={type:"doc",version:1,content:[
                            {type:"heading",attrs:{level:3},content:[{type:"text",text:"Steps to Reproduce"}]},
                            {type:"orderedList",content:stepLines.length>0?stepLines.map(s=>({type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:s.replace(/^\d+\.\s*/,"")}]}]})):[{type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:"See summary"}]}]}]},
                            {type:"heading",attrs:{level:3},content:[{type:"text",text:"Expected Result"}]},
                            {type:"paragraph",content:[{type:"text",text:b.expected||"—"}]},
                            {type:"heading",attrs:{level:3},content:[{type:"text",text:"Actual Result"}]},
                            {type:"paragraph",content:[{type:"text",text:b.actual||"—"}]},
                            {type:"heading",attrs:{level:3},content:[{type:"text",text:"Related Story"}]},
                            {type:"paragraph",content:[{type:"text",text:sid+" · Filed by "+member.name}]},
                          ]};
                          const res=await callJira(proj,"POST","/issue",{fields:{project:{key:proj.jiraProjKey},summary:b.summary,description:adfDesc,issuetype:{name:"Bug"},priority:{name:b.sev}}});
                          b.jKey=res.key;
                          DB.bugs=DB.bugs.map(x=>x.bid===b.bid?{...x,jKey:b.jKey}:x);
                          await callJira(proj,"POST","/issueLink",{type:{name:"Relates"},inwardIssue:{key:res.key},outwardIssue:{key:sid}}).catch(()=>
                            callJira(proj,"POST","/issueLink",{type:{name:"relates to"},inwardIssue:{key:res.key},outwardIssue:{key:sid}}).catch(()=>{})
                          );
                          if((b.attachments||[]).length>0){
                            try{
                              const token=await _ensureSession();
                              await fetch(API_BASE+"/api/jira/attach",{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":token||""},body:JSON.stringify({issueKey:res.key,files:b.attachments.map(a=>({name:a.name,dataUrl:a.dataUrl}))})});
                            }catch{}
                          }
                        }catch(e){failCount++;}
                      }
                      saveDB();setSessionBugs([...updated]);setLoading(false);
                      if(failCount>0) alert(failCount+" bug(s) could not be created in Jira. Check your Jira configuration (URL, token, project key).");
                      else showToast("Bugs created in Jira and linked to "+sid);
                    }} style={{padding:"10px 20px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:14,background:"#0052CC",color:"#fff",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>🔗 Link {unlinked.length} bug{unlinked.length!==1?"s":""} to Jira</button>
                  </div>}
            </div>;
          })()}
          <div style={{display:"flex",gap:10,marginTop:12}}>
            <Btn v="primary" onClick={()=>{setCoverageText(t=>t||"1");setPhase("coverage");syncToServer("coverage",{memberId:member.id,memberName:member.name,projectId:proj?.id||"",projectName:proj?.name||"",sid,summary:sdata?.summary||sid,platform,approvedCases:approved.length,passed:result?.pass?.length||0,failed:result?.fail?.length||0,bugs:sessionBugs.length});}}>Coverage Report →</Btn>
          </div>
        </div>}

        {!loading&&phase==="coverage"&&(()=>{
          const byType=[
            {label:"Happy flow",value:approved.filter(c=>c.type==="happy").length,color:"#4caf50"},
            {label:"Edge cases",value:approved.filter(c=>c.type==="edge").length,color:"#f59e0b"},
            {label:"Negative",value:approved.filter(c=>c.type==="negative").length,color:"#3b82f6"},
          ].filter(d=>d.value>0);
          const execData=result?[
            {label:"Passed",value:result.pass.length,color:"#4caf50"},
            {label:"Failed",value:result.fail.length,color:"#ef4444"},
          ].filter(d=>d.value>0):[];
          const autoData=[
            {label:"Automatable",value:autoable.length,color:"#6366f1"},
            {label:"Manual only",value:manOnly.length,color:"#9ca3af"},
          ].filter(d=>d.value>0);
          const stlc=[
            {label:"Requirements Analysis",value:sdata?100:0,color:"#4caf50"},
            {label:"Test Design",value:cases.length>0?100:0,color:"#3b82f6"},
            {label:"Test Review",value:cases.length>0?Math.round(approved.length/cases.length*100):0,color:"#f59e0b"},
            {label:"Test Execution",value:result?100:0,color:"#8b5cf6"},
            {label:"Defect Management",value:(sessionBugs.length>0||(result&&result.fail.length===0))?100:0,color:"#ef4444"},
          ];
          const overall=Math.round(stlc.reduce((s,p)=>s+p.value,0)/stlc.length);
          const scoreColor=overall>=80?"var(--color-text-success)":overall>=60?"var(--color-text-warning)":"var(--color-text-danger)";
          const scoreBarColor=overall>=80?"#4caf50":overall>=60?"#f59e0b":"#ef4444";
          return <div id="coverage-print-area">
            <div style={{...card,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><Tag c="blue">{sid}</Tag><span style={{fontWeight:600,fontSize:15}}>Coverage Report</span><Tag c={platform==="mobile"?"amber":"blue"}>{platform}</Tag></div>
                <div className="no-pdf" style={{display:"flex",gap:8}}>
                  <button onClick={()=>{const el=document.getElementById("coverage-print-area");const btns=el.querySelectorAll(".no-pdf");btns.forEach(b=>b.style.display="none");html2pdf().set({margin:10,filename:`Coverage_${sid}.pdf`,html2canvas:{scale:2,useCORS:true},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}}).from(el).save().then(()=>btns.forEach(b=>b.style.display=""));}} style={ghostBtn}>⬇ Download PDF</button>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:16,marginTop:14,padding:"14px 16px",borderRadius:10,background:"var(--color-background-secondary)"}}>
                <div style={{textAlign:"center",minWidth:72}}>
                  <div style={{fontSize:38,fontWeight:700,color:scoreColor,lineHeight:1}}>{overall}%</div>
                  <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:4}}>Overall Score</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{height:12,background:"var(--color-border-tertiary)",borderRadius:6,overflow:"hidden",marginBottom:8}}>
                    <div style={{height:"100%",width:overall+"%",background:scoreBarColor,borderRadius:6}}/>
                  </div>
                  <div style={{fontSize:12,color:"var(--color-text-secondary)",display:"flex",gap:16,flexWrap:"wrap"}}>
                    <span><b>{approved.length}</b> approved cases</span>
                    {result?<span><b>{result.pass.length}</b> passed · <b>{result.fail.length}</b> failed</span>:<span>No execution</span>}
                    <span><b>{sessionBugs.length}</b> bug{sessionBugs.length!==1?"s":""} filed</span>
                  </div>
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={card}><DonutChart title="Test Cases by Type" data={byType} size={150}/></div>
              <div style={card}>
                {execData.length>0
                  ?<DonutChart title="Execution Results" data={execData} size={150}/>
                  :<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:190,color:"var(--color-text-tertiary)",fontSize:13,textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}}>⏭</div>No execution performed</div>}
              </div>
              <div style={card}><DonutChart title="Automation Coverage" data={autoData} size={150}/></div>
              <div style={card}><BarChart title="STLC Phase Coverage" data={stlc}/></div>
            </div>
          </div>;
        })()}
      </div>

      {phase!=="input"&&chat&&testKind==="functional"&&<div style={{width:290,flexShrink:0,display:"flex",flexDirection:"column",height:"calc(100vh - 120px)",position:"sticky",top:0}}>
        <div style={{...card,flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:16}}>
          <div style={{fontWeight:500,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>🤖 QA Assistant <Tag c="blue">{sid}</Tag></div>
          <div style={{flex:1,overflow:"auto"}}><AIChat proj={proj} sid={sid} sdata={sdata} cases={cases} gapText={gapText} result={result} sessionBugs={sessionBugs} coverageText={coverageText} platform={platform}/></div>
        </div>
      </div>}

const CREDS_KEY="qa_remember_creds";
function LoginPage({onLogin}) {
  const saved=React.useMemo(()=>{try{return JSON.parse(localStorage.getItem(CREDS_KEY))||null;}catch{return null;}},[]);
  const [mode,setMode]=useState(saved?.mode||"admin");
  const [email,setEmail]=useState(saved?.email||"");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [remember,setRemember]=useState(!!saved);
  const [busy,setBusy]=useState(false);
  const login=async()=>{
    if(mode==="admin"){
      if(email!=="admin"){setErr("Username must be 'admin'");return;}
      setBusy(true);
      try{
        const r=await fetch(API_BASE+"/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})});
        const d=await r.json();
        if(!r.ok){setErr(d.error||"Invalid password");setBusy(false);return;}
        sessionStorage.setItem(ADMIN_TOKEN_KEY,d.token);
        if(remember){localStorage.setItem(CREDS_KEY,JSON.stringify({mode,email}));}
        else{localStorage.removeItem(CREDS_KEY);}
        onLogin({role:"admin",id:"admin",forceChangePwd:!!d.isDefaultPassword},remember);
      }catch{setErr("Cannot reach server. Make sure node server.js is running.");}
      setBusy(false);return;
    }
    setBusy(true);
    try{
      const r=await fetch(API_BASE+"/api/members/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pass})});
      const d=await r.json();
      if(!r.ok){setErr(d.error||"Invalid credentials");setBusy(false);return;}
      if(remember){localStorage.setItem(CREDS_KEY,JSON.stringify({mode,email}));}
      else{localStorage.removeItem(CREDS_KEY);}
      sessionStorage.setItem(MEMBER_TOKEN_KEY,d.token);
      if(d.sessionToken)sessionStorage.setItem(SESSION_TOKEN_KEY,d.sessionToken);
      onLogin({role:"member",member:d.member,id:d.member.id,hasSession:!!d.sessionToken},remember);
    }catch{setErr("Cannot reach server. Make sure node server.js is running.");}
    setBusy(false); return;
  };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-background-tertiary)"}}>
    <div style={{...card,width:380,padding:36}}>
      <div style={{fontSize:22,fontWeight:500,marginBottom:2}}>QA AI Platform</div>
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:24}}>AI-powered QA workflow management</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {["admin","member"].map(r=><button key={r} onClick={()=>{setMode(r);setErr("");setEmail(saved?.mode===r?saved.email:"");setPass(saved?.mode===r?saved.pass:"");}} style={{flex:1,padding:"8px 0",borderRadius:8,border:r===mode?"none":"1px solid var(--color-border-secondary)",background:r===mode?"var(--color-text-info)":"transparent",color:r===mode?"#fff":"var(--color-text-secondary)",cursor:"pointer",fontSize:14,fontWeight:500}}>{r==="admin"?"QA Lead":"Team Member"}</button>)}
      </div>
      <Lbl>{mode==="admin"?"Username":"Email"}</Lbl>
      <input style={{...inp,marginBottom:12}} value={email} onChange={e=>setEmail(e.target.value)} placeholder={mode==="admin"?"admin":"jane@company.com"}/>
      <Lbl>Password</Lbl>
      <input type="password" style={{...inp,marginBottom:12}} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"var(--color-text-secondary)",marginBottom:16,cursor:"pointer"}}>
        <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/> Remember me
      </label>
      {err&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:12}}>{err}</div>}
      <button onClick={login} disabled={busy} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"none",background:"var(--color-text-info)",color:"#fff",cursor:busy?"not-allowed":"pointer",fontSize:14,fontWeight:500,opacity:busy?0.7:1}}>{busy?"Signing in…":"Sign in"}</button>
    </div>
  </div>;
}

function AdminChangePasswordModal({onClose,forced}) {
  const [f,setF]=useState({current:"",next:"",confirm:""});
  const [err,setErr]=useState(""); const [ok,setOk]=useState(false); const [busy,setBusy]=useState(false);
  const submit=async()=>{
    if(!f.current||!f.next||!f.confirm){setErr("All fields are required.");return;}
    if(f.next!==f.confirm){setErr("New passwords do not match.");return;}
    if(f.next.length<8){setErr("New password must be at least 8 characters.");return;}
    setBusy(true); setErr("");
    try{
      const adminToken=sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
      const r=await fetch(API_BASE+"/api/admin/change-password",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":adminToken},body:JSON.stringify({currentPassword:f.current,newPassword:f.next})});
      const d=await r.json();
      if(!r.ok){setErr(d.error||"Failed to change password.");setBusy(false);return;}
      setOk(true);
    }catch{setErr("Cannot reach server.");}
    setBusy(false);
  };
  const ov={position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"};
  const bx={background:"var(--color-background-primary)",borderRadius:14,padding:28,width:400,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.22)"};
  const ghostBtn={padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,fontWeight:500,color:"var(--color-text-secondary)"};
  return <div style={ov} onClick={forced?undefined:onClose}>
    <div style={bx} onClick={e=>e.stopPropagation()}>
      {forced&&<div style={{background:"var(--color-background-warning)",border:"1px solid var(--color-border-warning)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"var(--color-text-warning)"}}>
        ⚠ You are using the default password. You must set a new password before continuing.
      </div>}
      <div style={{fontWeight:600,fontSize:16,marginBottom:16}}>🔒 {forced?"Set New Admin Password":"Change Admin Password"}</div>
      {ok?<div>
        <div style={{color:"var(--color-text-success)",fontSize:14,marginBottom:16}}>✓ Password changed successfully. Use the new password next time you log in.</div>
        <Btn v="primary" onClick={onClose}>Continue to Dashboard</Btn>
      </div>:<div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div><Lbl>Current Password</Lbl><input type="password" style={inp} value={f.current} onChange={e=>setF(p=>({...p,current:e.target.value}))} placeholder={forced?"Enter: admin":"Current password"}/></div>
        <div><Lbl>New Password</Lbl><input type="password" style={inp} value={f.next} onChange={e=>setF(p=>({...p,next:e.target.value}))} placeholder="Min. 8 characters"/></div>
        <div><Lbl>Confirm New Password</Lbl><input type="password" style={inp} value={f.confirm} onChange={e=>setF(p=>({...p,confirm:e.target.value}))} placeholder="Repeat new password"/></div>
        {err&&<div style={{color:"var(--color-text-danger)",fontSize:13}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
          {!forced&&<button onClick={onClose} style={ghostBtn}>Cancel</button>}
          <Btn v="primary" onClick={submit} disabled={busy}>{busy?"Saving…":"Change Password"}</Btn>
        </div>
      </div>}
    </div>
  </div>;
}

const SESSION_KEY="qa_session";
function loadSession(){
  try{
    // localStorage = Remember Me checked (persists after browser close)
    const persisted=localStorage.getItem(SESSION_KEY);
    if(persisted){
      const s=JSON.parse(persisted);
      if(s?.remember===true){
        if(s.role==="admin")return s;
        if(s.role==="member"&&s.member)return s;
      }
      localStorage.removeItem(SESSION_KEY); // stale/old entry — clear it
    }
    // sessionStorage = Remember Me NOT checked (expires when browser closes)
    const session=sessionStorage.getItem(SESSION_KEY);
    if(session){
      const s=JSON.parse(session);
      if(s?.role==="admin")return s;
      if(s?.role==="member"&&s.member)return s;
    }
    return null;
  }catch{return null;}
}

                      <span style={{fontSize:12,fontWeight:500,color:"var(--color-text-primary)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                      <div style={{display:"flex",gap:1,marginLeft:4,flexShrink:0,opacity:0.7}} onClick={e=>e.stopPropagation()}>
                        <button title="Rename" onClick={()=>{setRenamingId(s.id);setRenameVal(s.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:11,padding:"2px 3px",borderRadius:3}}>✎</button>
                        <button title="Delete" onClick={()=>setDeleteConfirmId(s.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:11,padding:"2px 3px",borderRadius:3}}>✕</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                      <Tag c="blue">{s.sid}</Tag>
                      {(s.cases?.filter(c=>c.status==="approved")?.length||0)>0&&<Tag c="green">{s.cases.filter(c=>c.status==="approved").length} TC</Tag>}
                      {s.coverageText&&<Tag c="green">✓</Tag>}
                    </div>
                  </div>}
            </div>);
          const cats=DB.categories;
          const grouped=cats.map(c=>({cat:c,stories:visibleStories.filter(s=>s.categoryId===c.id)})).filter(g=>g.stories.length>0);
          const uncategorized=visibleStories.filter(s=>!s.categoryId);
          return <div style={{padding:"6px 12px 12px"}}>
            <div style={{fontSize:11,fontWeight:500,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.07em",padding:"10px 8px 6px"}}>Saved Stories</div>
            {grouped.map(({cat,stories})=>(
              <div key={cat.id} style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",padding:"2px 4px 5px",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10}}>📁</span>
                  {renamingCatId===cat.id
                    ?<input autoFocus style={{flex:1,fontSize:11,padding:"1px 5px",borderRadius:4,border:"1px solid var(--color-border-primary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none",fontWeight:600}} value={renameCatVal} onChange={e=>setRenameCatVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")renameCat(cat.id,renameCatVal);if(e.key==="Escape")setRenamingCatId(null);}} onBlur={()=>renameCat(cat.id,renameCatVal||cat.name)}/>
                    :<span style={{flex:1}}>{cat.name}</span>}
                  <span style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:400}}>{stories.length}</span>
                  {renamingCatId!==cat.id&&<button title="Rename sprint" onClick={()=>{setRenamingCatId(cat.id);setRenameCatVal(cat.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:10,padding:"1px 3px",borderRadius:3,lineHeight:1}}>✎</button>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:8,borderLeft:"2px solid var(--color-border-tertiary)"}}>
                  {stories.map(s=><StoryCard key={s.id} s={s}/>)}
                </div>
              </div>))}
            {uncategorized.length>0&&<div style={{marginBottom:6}}>
              {grouped.length>0&&<div style={{fontSize:11,fontWeight:600,color:"var(--color-text-tertiary)",padding:"4px 4px 5px"}}>No sprint</div>}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {uncategorized.map(s=><StoryCard key={s.id} s={s}/>)}
              </div>
            </div>}
            {deleteConfirmId&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setDeleteConfirmId(null)}>
              <div style={{background:"var(--color-background-primary)",border:"1px solid var(--color-border-secondary)",borderRadius:12,padding:24,maxWidth:380,width:"90%",boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}} onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:15,fontWeight:600,marginBottom:10,color:"var(--color-text-primary)"}}>Delete Session?</div>
                <div style={{fontSize:13,color:"var(--color-text-secondary)",lineHeight:1.6,marginBottom:20}}>Are you sure you want to delete this session? The session will be permanently removed. If the same story ID is entered again, the member will start from the beginning.</div>
                <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                  <button onClick={()=>setDeleteConfirmId(null)} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>Cancel</button>
                  <button onClick={()=>{deleteSnap(deleteConfirmId);setDeleteConfirmId(null);}} style={{padding:"8px 18px",borderRadius:8,border:"none",background:"var(--color-danger,#e53e3e)",cursor:"pointer",fontSize:13,color:"#fff",fontWeight:500}}>Delete Session</button>
                </div>
              </div>
            </div>}
          </div>;
        })()}
      </div>
      <div style={{padding:"12px 20px",borderTop:"1px solid var(--color-border-tertiary)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div><div style={{fontSize:13,fontWeight:500}}>{user.role==="admin"?"Admin":user.member?.name}</div><div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{user.role==="admin"?"QA Lead":user.member?.role}</div></div>
          <NotifBell userId={user.role==="admin"?"admin":user.id}/>
        </div>
        {user.role==="member"&&<button onClick={()=>setShowConfig(true)} style={{width:"100%",padding:"7px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {sessionStorage.getItem(SESSION_TOKEN_KEY)?<><span style={{color:"var(--color-text-success)"}}>●</span> Settings</>:<><span style={{color:"var(--color-text-warning)"}}>●</span> Settings</>}
        </button>}
        {user.role==="admin"&&<button onClick={()=>setShowChangePwd(true)} style={{width:"100%",padding:"7px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)",marginBottom:8}}>🔒 Change Password</button>}
        <button onClick={handleLogout} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>Sign out</button>
      </div>
    </div>
    <div style={{flex:1,padding:28,overflow:"auto"}}>
      {user.role==="admin"&&page==="dashboard"&&<DashboardPage/>}
      {user.role==="admin"&&page==="members"&&<MembersPage/>}
      {user.role==="admin"&&page==="projects"&&<ProjectsPage/>}
      {user.role==="admin"&&page==="assign"&&<AssignmentsPage/>}
      {user.role==="member"&&page==="workspace"&&<Workspace member={user.member} refreshSaved={refreshSaved} restoreTarget={restoreTarget} clearRestore={()=>setRestoreTarget(null)} onActiveSid={setActiveSid} onProjChange={setActiveProj} resetTrigger={resetTrigger}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
