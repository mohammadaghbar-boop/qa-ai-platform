/* ─── Login ───────────────────────────────────────────────────────────────── */
const CREDS_KEY="qa_remember_creds";
function LoginPage({onLogin}) {
  const saved=React.useMemo(()=>{try{return JSON.parse(localStorage.getItem(CREDS_KEY))||null;}catch{return null;}},[]);
  const [mode,setMode]=useState(saved?.mode||"admin");
  const [email,setEmail]=useState(saved?.email||"");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [remember,setRemember]=useState(!!saved);
  const [busy,setBusy]=useState(false);
  const login=async()=>{
    if(mode==="admin"){
      if(email!=="admin"){setErr("Username must be 'admin'");return;}
      setBusy(true);
      try{
        const r=await fetch(API_BASE+"/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})});
        const d=await r.json();
        if(!r.ok){setErr(d.error||"Invalid password");setBusy(false);return;}
        sessionStorage.setItem(ADMIN_TOKEN_KEY,d.token);
        if(remember){localStorage.setItem(CREDS_KEY,JSON.stringify({mode,email}));}
        else{localStorage.removeItem(CREDS_KEY);}
        onLogin({role:"admin",id:"admin",forceChangePwd:!!d.isDefaultPassword},remember);
      }catch{setErr("Cannot reach server. Make sure node server.js is running.");}
      setBusy(false);return;
    }
    setBusy(true);
    try{
      const r=await fetch(API_BASE+"/api/members/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pass})});
      const d=await r.json();
      if(!r.ok){setErr(d.error||"Invalid credentials");setBusy(false);return;}
      if(remember){localStorage.setItem(CREDS_KEY,JSON.stringify({mode,email}));}
      else{localStorage.removeItem(CREDS_KEY);}
      sessionStorage.setItem(MEMBER_TOKEN_KEY,d.token);
      if(d.sessionToken)sessionStorage.setItem(SESSION_TOKEN_KEY,d.sessionToken);
      onLogin({role:"member",member:d.member,id:d.member.id,hasSession:!!d.sessionToken},remember);
    }catch{setErr("Cannot reach server. Make sure node server.js is running.");}
    setBusy(false); return;
  };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-background-tertiary)"}}>
    <div style={{...card,width:380,padding:36}}>
      <div style={{fontSize:22,fontWeight:500,marginBottom:2}}>QA AI Platform</div>
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:24}}>AI-powered QA workflow management</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {["admin","member"].map(r=><button key={r} onClick={()=>{setMode(r);setErr("");setEmail(saved?.mode===r?saved.email:"");setPass(saved?.mode===r?saved.pass:"");}} style={{flex:1,padding:"8px 0",borderRadius:8,border:r===mode?"none":"1px solid var(--color-border-secondary)",background:r===mode?"var(--color-text-info)":"transparent",color:r===mode?"#fff":"var(--color-text-secondary)",cursor:"pointer",fontSize:14,fontWeight:500}}>{r==="admin"?"QA Lead":"Team Member"}</button>)}
      </div>
      <Lbl>{mode==="admin"?"Username":"Email"}</Lbl>
      <input style={{...inp,marginBottom:12}} value={email} onChange={e=>setEmail(e.target.value)} placeholder={mode==="admin"?"admin":"jane@company.com"}/>
      <Lbl>Password</Lbl>
      <input type="password" style={{...inp,marginBottom:12}} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"var(--color-text-secondary)",marginBottom:16,cursor:"pointer"}}>
        <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/> Remember me
      </label>
      {err&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:12}}>{err}</div>}
      <button onClick={login} disabled={busy} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"none",background:"var(--color-text-info)",color:"#fff",cursor:busy?"not-allowed":"pointer",fontSize:14,fontWeight:500,opacity:busy?0.7:1}}>{busy?"Signing in…":"Sign in"}</button>
    </div>
  </div>;
}

/* ─── Admin Change Password Modal ────────────────────────────────────────── */
function AdminChangePasswordModal({onClose,forced}) {
  const [f,setF]=useState({current:"",next:"",confirm:""});
  const [err,setErr]=useState(""); const [ok,setOk]=useState(false); const [busy,setBusy]=useState(false);
  const submit=async()=>{
    if(!f.current||!f.next||!f.confirm){setErr("All fields are required.");return;}
    if(f.next!==f.confirm){setErr("New passwords do not match.");return;}
    if(f.next.length<8){setErr("New password must be at least 8 characters.");return;}
    setBusy(true); setErr("");
    try{
      const adminToken=sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
      const r=await fetch(API_BASE+"/api/admin/change-password",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":adminToken},body:JSON.stringify({currentPassword:f.current,newPassword:f.next})});
      const d=await r.json();
      if(!r.ok){setErr(d.error||"Failed to change password.");setBusy(false);return;}
      setOk(true);
    }catch{setErr("Cannot reach server.");}
    setBusy(false);
  };
  const ov={position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"};
  const bx={background:"var(--color-background-primary)",borderRadius:14,padding:28,width:400,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.22)"};
  const ghostBtn={padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,fontWeight:500,color:"var(--color-text-secondary)"};
  return <div style={ov} onClick={forced?undefined:onClose}>
    <div style={bx} onClick={e=>e.stopPropagation()}>
      {forced&&<div style={{background:"var(--color-background-warning)",border:"1px solid var(--color-border-warning)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"var(--color-text-warning)"}}>
        ⚠ You are using the default password. You must set a new password before continuing.
      </div>}
      <div style={{fontWeight:600,fontSize:16,marginBottom:16}}>🔒 {forced?"Set New Admin Password":"Change Admin Password"}</div>
      {ok?<div>
        <div style={{color:"var(--color-text-success)",fontSize:14,marginBottom:16}}>✓ Password changed successfully. Use the new password next time you log in.</div>
        <Btn v="primary" onClick={onClose}>Continue to Dashboard</Btn>
      </div>:<div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div><Lbl>Current Password</Lbl><input type="password" style={inp} value={f.current} onChange={e=>setF(p=>({...p,current:e.target.value}))} placeholder={forced?"Enter: admin":"Current password"}/></div>
        <div><Lbl>New Password</Lbl><input type="password" style={inp} value={f.next} onChange={e=>setF(p=>({...p,next:e.target.value}))} placeholder="Min. 8 characters"/></div>
        <div><Lbl>Confirm New Password</Lbl><input type="password" style={inp} value={f.confirm} onChange={e=>setF(p=>({...p,confirm:e.target.value}))} placeholder="Repeat new password"/></div>
        {err&&<div style={{color:"var(--color-text-danger)",fontSize:13}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
          {!forced&&<button onClick={onClose} style={ghostBtn}>Cancel</button>}
          <Btn v="primary" onClick={submit} disabled={busy}>{busy?"Saving…":"Change Password"}</Btn>
        </div>
      </div>}
    </div>
  </div>;
}

/* ─── Root App ────────────────────────────────────────────────────────────── */
/* ─── Member Config Dialog ────────────────────────────────────────────────── */
function MemberConfigDialog({memberId, onClose}) {
  const [f,setF]=useState({jiraUrl:"",jiraEmail:"",jiraToken:""});
  const [testing,setTesting]=useState(false);
  const [testMsg,setTestMsg]=useState("");
  const [saving,setSaving]=useState(false);
  const [saveErr,setSaveErr]=useState("");
  const sf=v=>setF(p=>({...p,...v}));

  const testJira=async()=>{
    if(!f.jiraUrl||!f.jiraToken||!f.jiraEmail){setTestMsg("Fill in all three fields first.");return;}
    setTesting(true);setTestMsg("");
    try{
      const mt=sessionStorage.getItem(MEMBER_TOKEN_KEY)||"";
      const st=sessionStorage.getItem(SESSION_TOKEN_KEY)||"";
      const cleanUrl=(()=>{try{return new URL(f.jiraUrl.trim()).origin;}catch{return f.jiraUrl.trim();}})();
      const sr=await fetch(API_BASE+"/api/auth/session",{method:"POST",headers:{"Content-Type":"application/json","X-Member-Token":mt,"X-Session-Token":st},body:JSON.stringify({memberId,jiraUrl:cleanUrl,jiraEmail:f.jiraEmail,jiraToken:f.jiraToken})});
      const sd=await sr.json();
      if(!sd.sessionToken)throw new Error("Could not create test session");
      const r=await fetch(API_BASE+"/api/jira",{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":sd.sessionToken},body:JSON.stringify({path:"/myself",method:"GET"})});
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setTestMsg("✓ Connected as "+d.displayName);
    }catch(e){setTestMsg("✗ "+e.message.slice(0,80));}
    setTesting(false);
  };

  const save=async()=>{
    setSaving(true);setSaveErr("");
    try{
      const mt=sessionStorage.getItem(MEMBER_TOKEN_KEY);
      const r=await fetch(API_BASE+"/api/members/"+memberId+"/credentials",{
        method:"POST",
        headers:{"Content-Type":"application/json","X-Member-Token":mt||""},
        body:JSON.stringify({jiraUrl:(()=>{try{return new URL(f.jiraUrl.trim()).origin;}catch{return f.jiraUrl.trim();}})(),jiraEmail:f.jiraEmail.trim(),jiraToken:f.jiraToken.trim()})
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Save failed");
      if(d.sessionToken)sessionStorage.setItem(SESSION_TOKEN_KEY,d.sessionToken);
      onClose();
    }catch(e){setSaveErr(e.message);}
    setSaving(false);
  };

  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center"};
  const box={background:"var(--color-background-primary)",borderRadius:16,padding:32,width:480,maxWidth:"90vw",boxShadow:"0 16px 48px rgba(0,0,0,0.22)"};

  return <div style={overlay}>
    <div style={box}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontWeight:600,fontSize:17,marginBottom:2}}>🔗 Jira Configuration</div>
          <div style={{fontSize:12,color:"var(--color-text-tertiary)"}}>Jira credentials are stored encrypted on the server. Skip if you don't use Jira.</div>
        </div>
        {sessionStorage.getItem(SESSION_TOKEN_KEY)&&<button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:20,padding:"0 4px",lineHeight:1}}>✕</button>}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:2}}>Connect to your Jira instance to fetch user stories and link bugs. AI features run via Claude CLI — no API key needed.</div>
        <div>
          <Lbl>Jira URL <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>— base URL only, e.g. https://yourorg.atlassian.net</span></Lbl>
          <input style={inp} value={f.jiraUrl} onChange={e=>sf({jiraUrl:e.target.value})} placeholder="https://yourorg.atlassian.net"/>
          {f.jiraUrl&&(()=>{try{const o=new URL(f.jiraUrl).origin;return o!==f.jiraUrl.trim().replace(/\/+$/,'')&&<div style={{fontSize:11,color:"var(--color-text-warning)",marginTop:3}}>⚠ Path detected — only the base URL is used: <b>{o}</b></div>}catch{return null;}})()}
        </div>
        <div><Lbl>Email</Lbl><input style={inp} value={f.jiraEmail} onChange={e=>sf({jiraEmail:e.target.value})} placeholder="you@company.com"/></div>
        <div><Lbl>API Token</Lbl><input type="password" style={inp} value={f.jiraToken} onChange={e=>sf({jiraToken:e.target.value})} placeholder="••••••"/><div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:3}}>Get yours at id.atlassian.com → Security → API Tokens</div></div>
        {f.jiraUrl&&f.jiraEmail&&f.jiraToken&&<div>
          <button onClick={testJira} disabled={testing} style={{padding:"6px 16px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>
            {testing?"Testing…":"Test Connection"}
          </button>
          {testMsg&&<div style={{marginTop:6,fontSize:12,color:testMsg.startsWith("✓")?"var(--color-text-success)":"var(--color-text-danger)"}}>{testMsg}</div>}
        </div>}
        <div style={{display:"flex",gap:10,marginTop:4,alignItems:"center"}}>
          <Btn v="primary" onClick={save} disabled={saving}>{saving?"Saving…":"Save & Continue"}</Btn>
          <button onClick={onClose} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Skip</button>
          {saveErr&&<div style={{fontSize:12,color:"var(--color-text-danger)"}}>{saveErr}</div>}
        </div>
      </div>
    </div>
  </div>;
}

const SESSION_KEY="qa_session";
function loadSession(){
  try{
    // localStorage = Remember Me checked (persists after browser close)
    const persisted=localStorage.getItem(SESSION_KEY);
    if(persisted){
      const s=JSON.parse(persisted);
      if(s?.remember===true){
        if(s.role==="admin")return s;
        if(s.role==="member"&&s.member)return s;
      }
      localStorage.removeItem(SESSION_KEY); // stale/old entry — clear it
    }
    // sessionStorage = Remember Me NOT checked (expires when browser closes)
    const session=sessionStorage.getItem(SESSION_KEY);
    if(session){
      const s=JSON.parse(session);
      if(s?.role==="admin")return s;
      if(s?.role==="member"&&s.member)return s;
    }
    return null;
  }catch{return null;}
}
function App() {
  const [user,setUser]=useState(()=>{const u=loadSession();if(u?.role==="member")_currentMemberId=u.id;return u;}); const [page,setPage]=useState(()=>{const u=loadSession();return u?.role==="admin"?"dashboard":"workspace";}); const [,tick]=useState(0);
  const [showConfig,setShowConfig]=useState(()=>{const u=loadSession();return !!(u?.role==="member"&&!sessionStorage.getItem(SESSION_TOKEN_KEY));});
  const [showChangePwd,setShowChangePwd]=useState(false);
  const [savedStories,setSavedStories]=useState(()=>[...DB.savedStories]);
  const [restoreTarget,setRestoreTarget]=useState(null);
  const [activeSid,setActiveSid]=useState(""); const [activeProj,setActiveProj]=useState(null);
  const [renamingId,setRenamingId]=useState(null); const [renameVal,setRenameVal]=useState("");
  const [renamingCatId,setRenamingCatId]=useState(null); const [renameCatVal,setRenameCatVal]=useState("");
  const renameCat=(id,name)=>{if(!name.trim())return;DB.categories=DB.categories.map(c=>c.id===id?{...c,name:name.trim()}:c);saveDB();refreshSaved();setRenamingCatId(null);};
  const [,forceUpdate]=useState(0);
  const [resetTrigger,setResetTrigger]=useState(0);
  const refreshSaved=()=>{
    DB.categories=DB.categories.filter(c=>DB.savedStories.some(s=>s.categoryId===c.id));
    setSavedStories([...DB.savedStories]);forceUpdate(x=>x+1);
  };
  const deleteSnap=id=>{
    const story=DB.savedStories.find(s=>s.id===id);
    DB.savedStories=DB.savedStories.filter(s=>s.id!==id);
    DB.categories=DB.categories.filter(c=>DB.savedStories.some(s=>s.categoryId===c.id));
    saveDB();refreshSaved();
    if(story&&story.sid===activeSid){
      localStorage.removeItem(`qa_ws_${user.id}`);
      setResetTrigger(x=>x+1);
    }
  };
  const renameSnap=(id,name)=>{DB.savedStories=DB.savedStories.map(s=>s.id===id?{...s,name}:s);saveDB();refreshSaved();setRenamingId(null);};
  const handleLogin=(u,remember)=>{
    const data=u.role==="admin"
      ?{role:"admin",id:"admin",remember,forceChangePwd:u.forceChangePwd}
      :{role:"member",id:u.id,member:u.member,remember};
    localStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(SESSION_KEY);
    if(remember){localStorage.setItem(SESSION_KEY,JSON.stringify(data));}
    else{sessionStorage.setItem(SESSION_KEY,JSON.stringify(data));}
    if(u.role==="member"){_currentMemberId=u.id;}else{_currentMemberId="";}
    setUser(u); setPage(u.role==="admin"?"dashboard":"workspace");
    if(u.role==="admin"&&u.forceChangePwd){setShowChangePwd(true);}
    if(u.role==="admin"){loadMembersFromServer();}
    if(u.role==="member"){
      if(!u.hasSession){setShowConfig(true);}
    }
  };
  const handleLogout=()=>{_currentMemberId="";localStorage.removeItem(SESSION_KEY);sessionStorage.removeItem(SESSION_KEY);sessionStorage.removeItem(SESSION_TOKEN_KEY);sessionStorage.removeItem(ADMIN_TOKEN_KEY);sessionStorage.removeItem(MEMBER_TOKEN_KEY);setUser(null);setPage("workspace");setShowConfig(false);setShowChangePwd(false);};
  if(!user) return <LoginPage onLogin={handleLogin}/>;
  const adminNav=[{sec:"Overview",items:[{id:"dashboard",label:"Dashboard",icon:"📊"}]},{sec:"Manage",items:[{id:"members",label:"Members",icon:"👥"},{id:"projects",label:"Projects",icon:"📁"},{id:"assign",label:"Assignments",icon:"🔗"}]}];
  const memberNav=[{sec:"Work",items:[{id:"workspace",label:"Workspace",icon:"🖥"}]}];
  const nav=user.role==="admin"?adminNav:memberNav;
  return <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"var(--color-text-primary)",minHeight:"100vh",background:"var(--color-background-tertiary)",display:"flex"}}>
    {showConfig&&user?.role==="member"&&<MemberConfigDialog memberId={user.id} onClose={()=>setShowConfig(false)}/>}
    {showChangePwd&&user?.role==="admin"&&<AdminChangePasswordModal forced={!!user.forceChangePwd} onClose={()=>{setShowChangePwd(false);setUser(u=>({...u,forceChangePwd:false}));}}/>}
    <div style={{width:220,minHeight:"100vh",background:"var(--color-background-secondary)",borderRight:"1px solid var(--color-border-tertiary)",display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"16px 20px 12px",borderBottom:"1px solid var(--color-border-tertiary)"}}>
        <div style={{fontWeight:500,fontSize:15}}>QA AI Platform</div>
        <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>{user.role==="admin"?"QA Lead · Admin":(user.member?.name+" · "+user.member?.role)}</div>
      </div>
      <div style={{flex:1,paddingTop:6,overflowY:"auto"}}>
        {nav.map(g=><div key={g.sec}>
          <div style={{padding:"14px 20px 4px",fontSize:11,fontWeight:500,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.07em"}}>{g.sec}</div>
          {g.items.map(n=>{const ob=n.id==="bugs"?DB.bugs.filter(b=>b.status==="Open").length:0;
            return <div key={n.id} onClick={()=>{setPage(n.id);tick(x=>x+1);}} style={{padding:"9px 20px",cursor:"pointer",fontSize:14,fontWeight:page===n.id?500:400,background:page===n.id?"var(--color-background-info)":"transparent",color:page===n.id?"var(--color-text-info)":"var(--color-text-secondary)",borderLeft:page===n.id?"3px solid var(--color-text-info)":"3px solid transparent",display:"flex",alignItems:"center",gap:8}}>
              <span>{n.icon}</span>{n.label}{ob>0&&<span style={{marginLeft:"auto",background:"var(--color-text-danger)",color:"#fff",borderRadius:20,padding:"0 6px",fontSize:11}}>{ob}</span>}
            </div>;})}
        </div>)}
        {user.role==="member"&&savedStories.length>0&&(()=>{
          const visibleStories=activeProj?.jiraProjKey?savedStories.filter(s=>s.sid&&s.sid.startsWith(activeProj.jiraProjKey+"-")):savedStories;
          if(visibleStories.length===0)return null;
          const isActive=s=>s.sid===activeSid&&page==="workspace";
          const StoryCard=({s})=>(
            <div key={s.id} style={{borderRadius:7,padding:"8px 9px",background:isActive(s)?"var(--color-background-info)":"var(--color-background-primary)",border:isActive(s)?"1px solid var(--color-text-info)":"1px solid var(--color-border-tertiary)",cursor:renamingId===s.id?"default":"pointer",transition:"border-color 0.15s",borderLeft:isActive(s)?"3px solid var(--color-text-info)":"1px solid var(--color-border-tertiary)"}}
              onMouseEnter={e=>{if(renamingId!==s.id&&!isActive(s))e.currentTarget.style.borderColor="var(--color-border-primary)";}}
              onMouseLeave={e=>{if(!isActive(s))e.currentTarget.style.borderColor="var(--color-border-tertiary)";}}
              onClick={()=>{if(renamingId!==s.id){setRestoreTarget(s);setPage("workspace");}}}>
              {renamingId===s.id
                ?<div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                    <input autoFocus style={{flex:1,fontSize:12,padding:"3px 7px",borderRadius:5,border:"1px solid var(--color-border-primary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none"}} value={renameVal} onChange={e=>setRenameVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")renameSnap(s.id,renameVal||s.sid);if(e.key==="Escape")setRenamingId(null);}}/>
                    <button onClick={()=>renameSnap(s.id,renameVal||s.sid)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-success)",fontSize:14,padding:"0 2px"}}>✓</button>
                  </div>
                :<div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:500,color:"var(--color-text-primary)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                      <div style={{display:"flex",gap:1,marginLeft:4,flexShrink:0,opacity:0.7}} onClick={e=>e.stopPropagation()}>
                        <button title="Rename" onClick={()=>{setRenamingId(s.id);setRenameVal(s.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:11,padding:"2px 3px",borderRadius:3}}>✎</button>
                        <button title="Delete" onClick={()=>deleteSnap(s.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:11,padding:"2px 3px",borderRadius:3}}>✕</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                      <Tag c="blue">{s.sid}</Tag>
                      {(s.cases?.filter(c=>c.status==="approved")?.length||0)>0&&<Tag c="green">{s.cases.filter(c=>c.status==="approved").length} TC</Tag>}
                      {s.coverageText&&<Tag c="green">✓</Tag>}
                    </div>
                  </div>}
            </div>);
          const cats=DB.categories;
          const grouped=cats.map(c=>({cat:c,stories:visibleStories.filter(s=>s.categoryId===c.id)})).filter(g=>g.stories.length>0);
          const uncategorized=visibleStories.filter(s=>!s.categoryId);
          return <div style={{padding:"6px 12px 12px"}}>
            <div style={{fontSize:11,fontWeight:500,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.07em",padding:"10px 8px 6px"}}>Saved Stories</div>
            {grouped.map(({cat,stories})=>(
              <div key={cat.id} style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",padding:"2px 4px 5px",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10}}>📁</span>
                  {renamingCatId===cat.id
                    ?<input autoFocus style={{flex:1,fontSize:11,padding:"1px 5px",borderRadius:4,border:"1px solid var(--color-border-primary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none",fontWeight:600}} value={renameCatVal} onChange={e=>setRenameCatVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")renameCat(cat.id,renameCatVal);if(e.key==="Escape")setRenamingCatId(null);}} onBlur={()=>renameCat(cat.id,renameCatVal||cat.name)}/>
                    :<span style={{flex:1}}>{cat.name}</span>}
                  <span style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:400}}>{stories.length}</span>
                  {renamingCatId!==cat.id&&<button title="Rename sprint" onClick={()=>{setRenamingCatId(cat.id);setRenameCatVal(cat.name);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:10,padding:"1px 3px",borderRadius:3,lineHeight:1}}>✎</button>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:8,borderLeft:"2px solid var(--color-border-tertiary)"}}>
                  {stories.map(s=><StoryCard key={s.id} s={s}/>)}
                </div>
              </div>))}
            {uncategorized.length>0&&<div style={{marginBottom:6}}>
              {grouped.length>0&&<div style={{fontSize:11,fontWeight:600,color:"var(--color-text-tertiary)",padding:"4px 4px 5px"}}>No sprint</div>}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {uncategorized.map(s=><StoryCard key={s.id} s={s}/>)}
              </div>
            </div>}
          </div>;
        })()}
      </div>
      <div style={{padding:"12px 20px",borderTop:"1px solid var(--color-border-tertiary)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div><div style={{fontSize:13,fontWeight:500}}>{user.role==="admin"?"Admin":user.member?.name}</div><div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{user.role==="admin"?"QA Lead":user.member?.role}</div></div>
          <NotifBell userId={user.role==="admin"?"admin":user.id}/>
        </div>
        {user.role==="member"&&<button onClick={()=>setShowConfig(true)} style={{width:"100%",padding:"7px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {sessionStorage.getItem(SESSION_TOKEN_KEY)?<><span style={{color:"var(--color-text-success)"}}>●</span> Settings</>:<><span style={{color:"var(--color-text-warning)"}}>●</span> Settings</>}
        </button>}
        {user.role==="admin"&&<button onClick={()=>setShowChangePwd(true)} style={{width:"100%",padding:"7px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)",marginBottom:8}}>🔒 Change Password</button>}
        <button onClick={handleLogout} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>Sign out</button>
      </div>
    </div>
    <div style={{flex:1,padding:28,overflow:"auto"}}>
      {user.role==="admin"&&page==="dashboard"&&<DashboardPage/>}
      {user.role==="admin"&&page==="members"&&<MembersPage/>}
      {user.role==="admin"&&page==="projects"&&<ProjectsPage/>}
      {user.role==="admin"&&page==="assign"&&<AssignmentsPage/>}
      {user.role==="member"&&page==="workspace"&&<Workspace member={user.member} refreshSaved={refreshSaved} restoreTarget={restoreTarget} clearRestore={()=>setRestoreTarget(null)} onActiveSid={setActiveSid} onProjChange={setActiveProj} resetTrigger={resetTrigger}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
