  // Shared by doGen and doFindGaps — apply before finalizing any generated test case list.
  const dedupRules=`\nDEDUPLICATION RULES — apply before finalizing the list:\n1. SEMANTIC DEDUP, NOT JUST TEXT DEDUP. Before adding a case, check if it asserts the SAME underlying (trigger + expected outcome) pair as an existing/kept case, even if worded differently. "Verify X is visible only when status is Y", "Verify X is not available when status is not Y", and "Verify X cannot happen when status is Z (Z != Y)" are the SAME test — generate ONE case with the positive assertion. Only add a separate negative case if the negative path has a genuinely different mechanism (different error message, different response code, different UI treatment) — not just the logical inverse of the same check.\n2. ONE CANONICAL CASE PER RULE. For each AC/business rule/exception, generate exactly ONE case unless it has genuinely distinct sub-behaviors (3 different named error messages for 3 different triggers = 3 cases; 1 trigger and 1 outcome restated 4 ways = 1 case).\n3. Before adding a case, check it against every case already in the list (including the KEPT CASES below): does an existing case test the same (component, trigger, expected result)? If yes, does the new one exercise a genuinely distinct boundary/data variant/failure mode? If it only restates the same tuple with different phrasing or a trivial variation, DISCARD it.\n4. MERGE PARAMETERIZED CHECKS. If several candidates differ only in input value (min length, max length, special chars, empty, whitespace-only, etc. all testing the same field-rendering/validation behavior), do NOT generate separate cases — generate ONE case whose testData/steps describe the full set of input variants to try.\n5. FLAG, DON'T GUESS, undefined requirements. If a candidate case would assert behavior not explicitly stated in the story (list sort order, max attachment count, exact timing of a status change, etc.), do NOT generate it as a normal case — instead add it to needsClarification with the assumption it's making, so a human confirms the requirement exists first.\n6. Before finalizing, do an internal pass: group drafts by (component + trigger + expected-outcome-category) and collapse each group to its single best-worded canonical case.`;
  const doGen=async()=>{

      happy:"MAIN SUCCESS paths — valid inputs, correct credentials, expected user journeys, normal operations where everything works as designed.",

ost simple CRUD or single-entity UI stories trigger zero patterns — generating 0 cases here is correct and expected. Do NOT apply a pattern speculatively just because the technology could theoretically have that risk. A pattern that does apply produces ONE case under ONE type — never a copy per type.\n\nEXTERNAL DEPENDENCY: ONLY IF the story explicitly names a third-party service call AND describes what should happen when it fails — cover unavailability, rejection, and partial-success. Skip if the story only mentions the happy-path integration.\n\nMULTI-HOP WORKFLOWS: ONLY IF the story describes a sequence of calls across systems AND explicitly states what must happen on mid-flow failure.\n\nASYNCHRONOUS / EVENT-DRIVEN: ONLY IF the story explicitly mentions webhooks, background jobs, or queues.\n\nCONCURRENT OPERATIONS: ONLY IF the story explicitly states that concurrent access by multiple users is a concern.\n\nSERVER-SIDE VALIDATION: ONLY IF the story defines specific business rules with numeric or state constraints (amounts, thresholds, status gates).\n\nSTATE-CHANGING OPERATIONS: ONLY IF the story explicitly requires partial-failure handling or idempotency.\n\nDATA PERSISTENCE AND AUDIT: ONLY IF the story explicitly requires an audit trail, history record, or specific fields to be persisted.\n\nREGRESSION — STATE PROPAGATION: ONLY IF the story explicitly changes a shared field or status that other features consume.\n\nOther rules:\n- ATOMIC ASSERTIONS: each test case verifies ONE primary behavior so a failure pinpoints exactly what broke. Do not bundle UI visibility + DB persistence + status transition into one case — split them. A case may have multiple steps, but its expected outcome must be a single verifiable claim.\n- NO INVENTED IMPLEMENTATION DETAILS: never write concrete SQL, table names, column names, API paths, or config keys unless they appear verbatim in the story. Describe the verification intent instead (e.g. "query the wallet record bound to this client and confirm the identifier is persisted") — the executing tester maps it to the real schema.\n- SPECIFIED-VALUE ASSERTIONS: whenever the story specifies an EXACT value, template, format, or rendering rule — a Data Dictionary field value, a UI element table (e.g. Title = "X {placeholder}", amount shown without +/- sign), or a message template (MSG-*, SMS, error text with {placeholders}) — the covering test case must assert that exact content with correctly interpolated values, not merely that the element/message exists or was sent. "An SMS is sent" is INSUFFICIENT when the story defines the SMS body; assert the body and each interpolated placeholder value. Presence-only checks against specified values are coverage defects.\n- DISPLAYED-VALUE CORRECTNESS: when a field shows a system-derived value (creation date/time, amounts, reference numbers), assert it EQUALS the actual underlying value from the triggering action — not merely that the field is populated.\n- Every title must start with "Verify".\n- No duplicate test case titles.\n- Every AC must have at least one surviving test case — missing an AC is a defect, but a bloated near-duplicate list is also a defect.\n- type: MUST be one of [${typesNeedingAPI.map(t=>`"${t}"`).join(", ")}] — assign each case to its single most specific type.\n- automatable:false only for offline/camera/biometrics/hardware-dependent tests.\n- automationTarget: the preferred tool (e.g. "Playwright", "Appium", "k6", "SQL") when automatable=true; empty string when automatable=false.\n- priority: one of "Critical", "High", "Medium", "Low" based on risk and importance.\n- description: one sentence describing what this test case validates.\n- testData: specific values, credentials, inputs, or (for merged parameterized checks) the full list of input variants needed (empty string if none).\n- preconditions: system state required before executing (e.g. "User is logged in as admin").\n- steps: array of action strings (what the tester does).\n- stepResults: array of expected results — SAME LENGTH as steps, one per step describing what should happen after that step.\n- expected: the overall final expected outcome of the test case.\n\nWORKFLOW-FIRST DESIGN: Build test cases around complete business workflows rather than individual acceptance criteria or UI components. Do not create standalone validation-only test cases if the same validation can naturally be performed within an existing workflow without reducing failure isolation.\n\nReturn ONLY valid JSON with no markdown or explanation, in this exact shape:\n{"cases":[{"id":"TC-001","title":"Verify ...","description":"...","type":"happy","platform":"${platform}","priority":"High","preconditions":"...","testData":"...","steps":["Step 1","Step 2","Step 3"],"stepResults":["Expected after step 1","Expected after step 2","Expected after step 3"],"expected":"...","automatable":true,"automationTarget":"Playwright"}],"needsClarification":[{"item":"Short description of the untestable assumption","assumption":"What would have to be true for this to be testable"}]}`}],SYS,12000,proj.anthropicKey||"",genModel);
      const cleaned=r.replace(/```json|```/g,"").trim();
      const match=cleaned.match(/\{[\s\S]*\}/);

      const parsed=JSON.parse(match[0]);

  const doAioImport=async()=>{

d.\n- Do NOT repeat or restate any existing case — output only genuinely new ones.\n- Every title must start with "Verify".\n- automatable:false only for offline/camera/biometrics/hardware-dependent tests.\n- priority: one of "Critical","High","Medium","Low".\n- IDs must continue the existing sequence starting at TC-${String(nextIdNum).padStart(3,"0")}.\n\nReturn ONLY valid JSON with no markdown or explanation, in this exact shape:\n{"cases":[{"id":"TC-${String(nextIdNum).padStart(3,"0")}","title":"Verify ...","description":"...","type":"happy|edge|negative","platform":"${platform}","priority":"High","preconditions":"...","testData":"...","steps":["Step 1","Step 2"],"stepResults":["Expected after step 1","Expected after step 2"],"expected":"...","automatable":true}],"needsClarification":[{"item":"...","assumption":"...","type":"happy|edge|negative"}],"coverageSummary":"Brief note: which flows/ACs are now fully covered, and what still depends on clarification before it can be considered done."}`}],SYS,8000,proj.anthropicKey||"");

ng is page.getByText(/expected wording/i) with no other locator combined.\n11. If a submit/login button is expected to be disabled when required fields are empty, assert await expect(button).toBeDisabled() directly — do NOT click it and wait for an error message; clicking a disabled button hangs until timeout.\n12. Only test scenarios that use data or accounts explicitly given in the test case's preconditions/steps. If a scenario requires a specific fixture (an inactive account, a role-restricted user, a lockout state) that isn't provided, assert the reachable/verifiable part of the flow only — do not invent placeholder credentials like 'inactive.user@x.com' that are not known to exist.`;

                const sc=Math.min(size/Math.max(img.width||size,1),size/Math.max(img.height||size,1))*0.82;
                const w=(img.width||size)*sc,h=(img.height||size)*sc;
                ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h);
                URL.revokeObjectURL(url);
                resolve(canvas.toDataURL("image/png").split(",")[1]);
              };
              img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
              img.src=url;
            }catch{resolve(null);}
          });
          const handleSvgFolder=async files=>{
            const svgs=Array.from(files).filter(f=>f.name.toLowerCase().endsWith(".svg"));
            if(!svgs.length){alert("No SVG files found in the selected folder.");return;}
            setUidSvgLoading(true);
            const results=[];
            for(const file of svgs){
              try{
                const content=await file.text();
                const previewDataUrl="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(content);
                const pngBase64=await svgToPng(content);
                results.push({id:uid(),name:file.name,path:file.webkitRelativePath||file.name,size:file.size,content,previewDataUrl,pngBase64,selected:true});
              }catch{/* skip bad svg */}
            }
            setUidSvgFiles(prev=>{
              const existingNames=new Set(prev.map(f=>f.name));
              return [...prev,...results.filter(r=>!existingNames.has(r.name))];
            });
            setUidSvgLoading(false);
          };
          const svgSelected=uidSvgFiles.filter(f=>f.selected);
          const svgForAI=svgSelected.slice(0,8);
          return <div>
            <H2 style={{marginBottom:4}}>UI Design Test Setup</H2>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:20}}>Enter the live page URL and Figma design link. The platform will generate UI test cases and visually compare the design against the implementation.</div>
            <div style={card}>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div><Lbl>Live Page URL *</Lbl><input style={inp} value={uidForm.pageUrl} onChange={e=>uf({pageUrl:e.target.value})} placeholder="https://app.example.com/login"/></div>
                {/* Figma source: API or manual upload */}
                <div style={{border:"1px solid var(--color-border-secondary)",borderRadius:10,padding:14}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:"var(--color-text-primary)"}}>Figma Design Source</div>
                  {/* Tab toggle */}
                  <div style={{display:"flex",gap:6,marginBottom:14}}>
                    <button onClick={()=>setUidManualFigmaImg(null)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:!useManual?"var(--color-background-selected)":"transparent",fontWeight:!useManual?600:400,cursor:"pointer",fontSize:13,color:"var(--color-text-primary)"}}>API (Auto-fetch)</button>
                    <button onClick={()=>setUidManualFigmaImg("__pending__")} style={{flex:1,padding:"7px 0",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:useManual?"var(--color-background-selected)":"transparent",fontWeight:useManual?600:400,cursor:"pointer",fontSize:13,color:"var(--color-text-primary)"}}>Upload Image</button>
                  </div>
                  {!useManual
                    ?<div style={{display:"flex",flexDirection:"column",gap:12}}>
                        <div><Lbl>Figma Design Link *</Lbl><input style={inp} value={uidForm.figmaUrl} onChange={e=>uf({figmaUrl:e.target.value})} onBlur={e=>{const v=e.target.value.trim();if(v&&!v.startsWith('http'))uf({figmaUrl:'https://'+v});}} placeholder="https://www.figma.com/design/..."/></div>
                        <div><Lbl>Personal Access Token *</Lbl>
                          {savedFigmaToken&&!uidForm.figmaToken
                            ?<div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",borderRadius:10,border:"1px solid rgba(22,101,52,0.3)",background:"var(--color-background-success)",fontSize:13}}>
                                <span style={{color:"var(--color-text-success)",fontWeight:500}}>✓ Token saved in Settings</span>
                                <button onClick={()=>uf({figmaToken:" "})} style={{marginLeft:"auto",fontSize:12,padding:"2px 10px",borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",color:"var(--color-text-secondary)"}}>Change</button>
                              </div>
                            :<input style={inp} type="password" value={uidForm.figmaToken.trim()} onChange={e=>uf({figmaToken:e.target.value})} placeholder="figd_..."/>}
                          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:4}}>Set once in <b>Settings</b>. Get from Figma → Settings → Security → Personal access tokens (select <b>File content: Read</b> scope).</div>
                        </div>
                        {uidFigmaFrames.length>0&&<div><Lbl>Select Frame (optional)</Lbl>
                          <select style={{...inp,width:"100%"}} value={uidForm.selectedNodeId} onChange={e=>uf({selectedNodeId:e.target.value})}>
                            <option value="">Auto-select first frame</option>
                            {uidFigmaFrames.map(f=><option key={f.nodeId} value={f.nodeId}>{f.pageName} › {f.name}</option>)}
                          </select>
                        </div>}
                      </div>
                    :<div>
                        <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:10}}>Upload any image of the Figma design. If export is disabled, take a screenshot: <b>Win+Shift+S</b> (Windows Snipping Tool) → select the frame → save as PNG → upload here.</div>
                        {uidManualFigmaImg&&uidManualFigmaImg!=="__pending__"
                          ?<div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",borderRadius:10,border:"1px solid rgba(22,101,52,0.3)",background:"var(--color-background-success)",fontSize:13}}>
                              <span style={{color:"var(--color-text-success)",fontWeight:500}}>✓ Figma image loaded</span>
                              <button onClick={()=>setUidManualFigmaImg("__pending__")} style={{marginLeft:"auto",fontSize:12,padding:"2px 10px",borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",color:"var(--color-text-secondary)"}}>Change</button>
                            </div>
                          :<label style={{display:"block",padding:"28px 0",textAlign:"center",borderRadius:10,border:"2px dashed var(--color-border-secondary)",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>
                              Click to upload Figma PNG export
                              <input type="file" accept="image/png,image/jpeg,image/webp" style={{display:"none"}} onChange={async e=>{const f=e.target.files[0];if(!f)return;const b64=await readFileAsBase64(f);setUidManualFigmaImg(b64);}}/>
                            </label>}
                      </div>}
                </div>
              </div>

              {/* ── SVG Assets Folder ── */}
              <div style={{marginTop:16,border:"1px solid var(--color-border-secondary)",borderRadius:10,padding:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13,color:"var(--color-text-primary)"}}>SVG Assets / Icons Folder <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>(Optional)</span></div>
                    <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>Upload a folder of SVG icons — the AI will use them as visual reference when generating test cases.</div>
                  </div>
                  {uidSvgFiles.length>0&&<div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <Tag c="blue">{uidSvgFiles.length} SVG{uidSvgFiles.length!==1?"s":""}</Tag>
                    <Tag c="green">{svgSelected.length} selected · {svgForAI.length} sent to AI</Tag>
                    <button onClick={()=>setUidSvgFiles([])} style={{...ghostBtn,fontSize:11,padding:"2px 8px",color:"var(--color-text-danger)"}}>Clear all</button>
                  </div>}
                </div>

                {/* Upload button */}
                <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:8,border:"1px dashed var(--color-border-secondary)",background:"var(--color-background-secondary)",cursor:"pointer",fontSize:13,color:"var(--color-text-primary)",marginBottom:uidSvgFiles.length?12:0}}>
                  {uidSvgLoading?"⏳ Processing SVGs…":"📁 Select SVG Folder"}
                  <input
                    type="file"
                    multiple
                    accept=".svg"
                    style={{display:"none"}}
                    ref={el=>{if(el){el.setAttribute("webkitdirectory","");el.setAttribute("directory","");}}}
                    onChange={e=>{if(e.target.files?.length)handleSvgFolder(e.target.files);e.target.value="";}}
                    disabled={uidSvgLoading}
                  />
                </label>

                {/* SVG grid */}
                {uidSvgFiles.length>0&&<div>
                  <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
                    <button onClick={()=>setUidSvgFiles(fs=>fs.map(f=>({...f,selected:true})))} style={{...ghostBtn,fontSize:11,padding:"2px 8px"}}>Select All</button>
                    <button onClick={()=>setUidSvgFiles(fs=>fs.map(f=>({...f,selected:false})))} style={{...ghostBtn,fontSize:11,padding:"2px 8px"}}>Deselect All</button>
                    {uidSvgFiles.length>8&&<span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>First 8 selected will be sent to AI</span>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8,maxHeight:280,overflowY:"auto"}}>
                    {uidSvgFiles.map((f,i)=>(
                      <div key={f.id} style={{position:"relative",borderRadius:8,border:"2px solid "+(f.selected?"var(--color-border-accent)":"var(--color-border-secondary)"),background:f.selected?"rgba(37,99,235,0.04)":"var(--color-background-secondary)",overflow:"hidden",cursor:"pointer"}} onClick={()=>setUidSvgFiles(fs=>fs.map(x=>x.id===f.id?{...x,selected:!x.selected}:x))}>
                        {/* AI badge for first 8 selected */}
                        {f.selected&&svgForAI.find(s=>s.name===f.name)&&<div style={{position:"absolute",top:3,left:3,background:"var(--color-accent)",borderRadius:4,padding:"1px 5px",fontSize:9,color:"#fff",fontWeight:600,zIndex:1}}>AI</div>}
                        {/* Checkbox */}
                        <div style={{position:"absolute",top:3,right:3,width:16,height:16,borderRadius:"50%",background:f.selected?"var(--color-accent)":"rgba(0,0,0,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",zIndex:1}}>{f.selected?"✓":""}</div>
                        {/* SVG preview */}
                        <div style={{padding:"10px 8px 4px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:64}}>
                          <img src={f.previewDataUrl} alt={f.name} style={{maxWidth:60,maxHeight:56,objectFit:"contain"}} onError={e=>{e.target.style.display="none";}}/>
                        </div>
                        {/* File name */}
                        <div style={{fontSize:9,padding:"0 5px 5px",textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--color-text-secondary)"}} title={f.name}>{f.name.replace(".svg","")}</div>
                        {/* Remove */}
                        <button onClick={e=>{e.stopPropagation();setUidSvgFiles(fs=>fs.filter(x=>x.id!==f.id));}} style={{position:"absolute",bottom:2,right:2,background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:10,padding:"1px 3px",lineHeight:1}}>✕</button>
                      </div>
                    ))}
                  </div>
                  {svgSelected.length>0&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:6,background:"var(--color-background-info)",border:"1px solid rgba(29,78,216,0.1)",fontSize:12,color:"var(--color-text-info)"}}>
                    {svgForAI.length} SVG icon{svgForAI.length!==1?"s":""} will be converted to images and sent to the AI as visual reference. All {svgSelected.length} selected icon names will appear in the context for test case generation.
                  </div>}
                </div>}
              </div>

              <div style={{marginTop:20,display:"flex",gap:10,justifyContent:"space-between",alignItems:"center"}}>
                <button onClick={()=>setPhase("uidJiraTicket")} style={{...ghostBtn,fontSize:13}}>← Back to Jira Ticket</button>
                <Btn v="primary" disabled={!canProceed||(useManual&&uidManualFigmaImg==="__pending__")} onClick={doAnalyze}>Analyze Design & Generate Cases →</Btn>
              </div>
            </div>
          </div>;
        })()}

        {/* ── UI Design: Jira Ticket ── */}
        {!uidLoading&&phase==="uidJiraTicket"&&(()=>{
          const searchTickets=async()=>{
            if(!jiraConfigured){alert("Configure Jira credentials in Settings first.");return;}
            setUidTicketSearching(true);
            try{
              const q=uidJiraTicketKey.trim()||"";
              const jql=q?`project=${proj.jiraProjKey} AND (summary~"${q}" OR issueKey="${q}") ORDER BY updated DESC`:`project=${proj.jiraProjKey} AND status!=Done ORDER BY updated DESC`;
              const r=await callJira(proj,"POST","/search/jql",{jql,maxResults:10,fields:["summary","status","issuetype","priority"]});
              setUidTicketResults(r.issues||[]);
            }catch(e){alert("Search failed: "+e.message);}
            setUidTicketSearching(false);
          };
          const canProceedJira=uidJiraMode==="jira"?(uidJiraTicketKey.trim().length>0||true):true;
          const canProceedReq=uidJiraMode==="requirements"?uidStoryRequirements.trim().length>10:true;
          const optionCard=(key,icon,title,desc)=>(
            <div onClick={()=>setUidJiraMode(key)} style={{flex:1,minWidth:220,padding:"16px 18px",borderRadius:10,border:"2px solid "+(uidJiraMode===key?"var(--color-border-accent)":"var(--color-border-secondary)"),background:uidJiraMode===key?"var(--color-background-selected)":"var(--color-background-secondary)",cursor:"pointer",transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:22}}>{icon}</span>
                <span style={{fontWeight:600,fontSize:14,color:"var(--color-text-primary)"}}>{title}</span>
                {uidJiraMode===key&&<span style={{marginLeft:"auto",width:18,height:18,borderRadius:"50%",background:"var(--color-accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0}}>✓</span>}
              </div>
              <div style={{fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.5}}>{desc}</div>
            </div>
          );
          return <div>
            <H2 style={{marginBottom:4}}>Story Context</H2>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:20}}>Choose how to provide the story context for this UI test session.</div>

            {/* Option selector */}
            <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
              {optionCard("jira","🎫","Link Jira Ticket","Search or type a Jira ticket key. Test cases will be imported to AIOTest and bugs will be linked to the ticket.")}
              {optionCard("requirements","📋","Paste Story Requirements","Paste the user story, acceptance criteria, or feature requirements directly. No Jira connection needed.")}
            </div>

            {/* Jira ticket panel */}
            {uidJiraMode==="jira"&&<div style={card}>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div>
                  <Lbl>Jira Issue Key</Lbl>
                  <div style={{display:"flex",gap:8}}>
                    <input style={{...inp,flex:1}} value={uidJiraTicketKey} onChange={e=>setUidJiraTicketKey(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&jiraConfigured&&searchTickets()} placeholder={proj?.jiraProjKey?proj.jiraProjKey+"-123 or search keyword":"ticket key or keyword"}/>
                    {jiraConfigured&&<Btn v="secondary" onClick={searchTickets} disabled={uidTicketSearching}>{uidTicketSearching?"…":"Search"}</Btn>}
                  </div>
                  <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:4}}>Type the ticket key (e.g. {proj?.jiraProjKey||"PROJ"}-42) directly, or type a keyword and Search.</div>
                </div>
                {jiraConfigured&&uidTicketResults.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
                  {uidTicketResults.map(iss=><div key={iss.key} onClick={()=>setUidJiraTicketKey(iss.key)} style={{padding:"9px 12px",borderRadius:8,border:"1px solid "+(uidJiraTicketKey===iss.key?"var(--color-border-accent)":"var(--color-border-tertiary)"),background:uidJiraTicketKey===iss.key?"var(--color-background-selected)":"var(--color-background-secondary)",cursor:"pointer",display:"flex",gap:10,alignItems:"center"}}>
                    <Tag c="blue">{iss.key}</Tag>
                    <span style={{fontSize:13,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{iss.fields?.summary}</span>
                    <Tag>{iss.fields?.status?.name}</Tag>
                  </div>)}
                </div>}
                {!jiraConfigured&&<div style={{padding:"10px 14px",borderRadius:8,border:"1px solid rgba(180,130,0,0.3)",background:"var(--color-background-warning)",fontSize:13,color:"var(--color-text-warning)"}}>⚠ Jira not configured — configure in Settings to enable AIOTest import and bug linking. You can still proceed without a ticket key.</div>}
              </div>
            </div>}

            {/* Story requirements panel */}
            {uidJiraMode==="requirements"&&(()=>{
              const handleStoryFiles=files=>{
                Array.from(files).forEach(file=>{
                  const isImg=file.type.startsWith("image/");
                  const isTxt=file.type==="text/plain"||file.name.endsWith(".md")||file.name.endsWith(".csv")||file.name.endsWith(".txt");
                  if(!isImg&&!isTxt){alert(`"${file.name}" is not supported. Upload images (PNG/JPG/WebP) or text files (TXT/MD/CSV).`);return;}
                  const reader=new FileReader();
                  if(isImg){
                    reader.readAsDataURL(file);
                    reader.onload=()=>{
                      const base64=reader.result.split(",")[1];
                      setUidStoryFiles(prev=>[...prev,{id:uid(),name:file.name,size:file.size,type:file.type,base64,isImg:true,textContent:null,preview:reader.result}]);
                    };
                  }else{
                    reader.readAsText(file);
                    reader.onload=()=>{
                      setUidStoryFiles(prev=>[...prev,{id:uid(),name:file.name,size:file.size,type:file.type,base64:null,isImg:false,textContent:reader.result,preview:null}]);
                    };
                  }
                });
              };
              const fmtSize=b=>b>1048576?(b/1048576).toFixed(1)+"MB":b>1024?(b/1024).toFixed(0)+"KB":b+"B";
              const imgFiles=uidStoryFiles.filter(f=>f.isImg);
              const txtFiles=uidStoryFiles.filter(f=>!f.isImg);
              return <div style={card}>
                <Lbl>Story Requirements / Acceptance Criteria</Lbl>
                <textarea
                  style={{...ta,minHeight:180,fontFamily:"inherit",fontSize:13,lineHeight:1.6}}
                  value={uidStoryRequirements}
                  onChange={e=>setUidStoryRequirements(e.target.value)}
                  placeholder={"Paste the user story, acceptance criteria, or feature requirements here.\n\nExample:\nAs a user, I want to see a dashboard...\n\nAC-1: The page must display a header with...\nAC-2: The navigation must be RTL...\nAC-3: Color scheme must match brand guidelines (#1B8354)..."}
                />
                {uidStoryRequirements.trim().length>0&&<div style={{marginTop:6,display:"flex",gap:8,alignItems:"center"}}>
                  <Tag c="green">✓ {uidStoryRequirements.trim().split(/\n/).length} lines · {uidStoryRequirements.trim().length} chars</Tag>
                  <button onClick={()=>setUidStoryRequirements("")} style={{...ghostBtn,fontSize:11,padding:"2px 8px"}}>Clear</button>
                </div>}

                {/* File upload zone */}
                <div style={{marginTop:14}}>
                  <Lbl>Attach Reference Files (Optional)</Lbl>
                  <div
                    onDragOver={e=>{e.preventDefault();setUidStoryFileDrag(true);}}
                    onDragLeave={()=>setUidStoryFileDrag(false)}
                    onDrop={e=>{e.preventDefault();setUidStoryFileDrag(false);handleStoryFiles(e.dataTransfer.files);}}
                    onClick={()=>document.getElementById("uidStoryFileInput").click()}
                    style={{border:"2px dashed "+(uidStoryFileDrag?"var(--color-accent)":"var(--color-border-secondary)"),borderRadius:8,padding:"18px 16px",textAlign:"center",cursor:"pointer",background:uidStoryFileDrag?"rgba(37,99,235,0.04)":"var(--color-background-secondary)",transition:"all 0.15s",marginBottom:8}}>
                    <div style={{fontSize:22,marginBottom:6}}>📎</div>
                    <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>Click or drag & drop files here</div>
                    <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:4}}>Images (PNG, JPG, WebP, GIF) · Text files (TXT, MD, CSV)</div>
                    <input id="uidStoryFileInput" type="file" multiple accept="image/*,.txt,.md,.csv" style={{display:"none"}} onChange={e=>{handleStoryFiles(e.target.files);e.target.value="";}}/>
                  </div>

                  {/* Image previews */}
                  {imgFiles.length>0&&<div style={{marginBottom:10}}>
                    <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:6}}>Reference Images ({imgFiles.length})</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      {imgFiles.map(f=>(
                        <div key={f.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid var(--color-border-secondary)",flexShrink:0}}>
                          <img src={f.preview} alt={f.name} style={{width:100,height:80,objectFit:"cover",display:"block"}}/>
                          <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.55)",padding:"3px 6px",fontSize:10,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.name}</div>
                          <button onClick={()=>setUidStoryFiles(prev=>prev.filter(x=>x.id!==f.id))} style={{position:"absolute",top:3,right:3,width:18,height:18,borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",cursor:"pointer",color:"#fff",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                        </div>
                      ))}
                    </div>
                  </div>}

                  {/* Text file list */}
                  {txtFiles.length>0&&<div>
                    <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:6}}>Text Files ({txtFiles.length})</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {txtFiles.map(f=>(
                        <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",borderRadius:6,border:"1px solid var(--color-border-tertiary)",background:"var(--color-background-secondary)"}}>
                          <span style={{fontSize:16}}>📄</span>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                            <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{fmtSize(f.size)} · {f.textContent?.split("\n").length||0} lines</div>
                          </div>
                          <button onClick={()=>setUidStoryFiles(prev=>prev.filter(x=>x.id!==f.id))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:14,padding:"2px 6px"}}>✕</button>
                        </div>
                      ))}
                    </div>
                  </div>}

                  {uidStoryFiles.length>0&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:6,background:"var(--color-background-info)",border:"1px solid rgba(29,78,216,0.1)",fontSize:12,color:"var(--color-text-info)"}}>
                    {imgFiles.length>0&&<span>{imgFiles.length} image{imgFiles.length>1?"s":""} will be sent to the AI as reference visuals alongside the Figma design. </span>}
                    {txtFiles.length>0&&<span>{txtFiles.length} text file{txtFiles.length>1?"s":""} will be appended to the requirements context.</span>}
                  </div>}
                </div>
              </div>;
            })()}
