<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── DB ─────────────────────────────────────────────────────────────────── */
const DB = { members:[], projects:[], assignments:[], sessions:[], bugs:[], notifs:[], savedStories:[], categories:[] };
const STORAGE_KEY = "qa_platform_db";
function loadDB() {
  try { const s=localStorage.getItem(STORAGE_KEY); if(s){ const p=JSON.parse(s); Object.keys(p).forEach(k=>{ if(Array.isArray(p[k])&&k in DB) DB[k]=p[k]; }); } } catch(e){}
  // Strip any cached passwords or legacy credentials — now stored server-side
  DB.members=DB.members.map(({password,...m})=>m);
}
function saveDB() {
  try { localStorage.setItem(STORAGE_KEY,JSON.stringify(DB)); } catch(e){}
}
// One-time migration: purge any legacy credential data from localStorage
(function purgeLegacyCredentials(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const p=JSON.parse(raw);
    if(p.memberSettings){delete p.memberSettings;localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}
  }catch(e){}
})();
loadDB();
const uid = () => Math.random().toString(36).slice(2,8);
const tod = () => new Date().toLocaleDateString();
const ts  = () => new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const tcol = t => t==="happy"?"green":t==="edge"?"amber":"blue";
const fwName = () => "Playwright";
const pushNotif = (to,msg) => { DB.notifs.push({id:uid(),to,msg,read:false,ts:ts(),at:Date.now()}); saveDB(); };

/* ─── Deployment helpers ─────────────────────────────────────────────────── */
// When opened as a local file use the local server; when served by server.js use relative paths.
const API_BASE = window.location.protocol === "file:" ? "http://localhost:3456" : "";
let _currentMemberId = ""; // set by App on login / page-load

/* ─── Session management ─────────────────────────────────────────────────── */
const SESSION_TOKEN_KEY = "qa_api_session_token";
const ADMIN_TOKEN_KEY   = "qa_admin_token";
const MEMBER_TOKEN_KEY  = "qa_member_token";

// Auth tokens live in sessionStorage for the tab. When "Remember Me" is on they
// are ALSO mirrored to localStorage so they survive a browser close alongside the
// persisted user session. Without this, reopening the app (Remember Me on) restores
// the logged-in member from localStorage but leaves sessionStorage empty — so any
// call that mints a session (e.g. Test Connection) fails with "Could not create test
// session" until the user logs out and back in.
function _rememberOn() {
  try { return !!localStorage.getItem(MEMBER_TOKEN_KEY); } catch { return false; }
}
// Persist the member token at login. When remember is on, mirror it to localStorage.
function persistMemberToken(memberTok, remember) {
  try {
    if (memberTok) sessionStorage.setItem(MEMBER_TOKEN_KEY, memberTok);
    if (remember && memberTok) localStorage.setItem(MEMBER_TOKEN_KEY, memberTok);
    else localStorage.removeItem(MEMBER_TOKEN_KEY);
  } catch {}
}
// Persist a freshly minted API session token, mirroring to localStorage in remember mode.
function persistSessionToken(sessionTok) {
  try {
    if (!sessionTok) return;
    sessionStorage.setItem(SESSION_TOKEN_KEY, sessionTok);
    if (_rememberOn()) localStorage.setItem(SESSION_TOKEN_KEY, sessionTok);
  } catch {}
}
// Clear all auth tokens from both storages (logout).
function clearAuthTokens() {
  try {
    sessionStorage.removeItem(MEMBER_TOKEN_KEY);  localStorage.removeItem(MEMBER_TOKEN_KEY);
    sessionStorage.removeItem(SESSION_TOKEN_KEY); localStorage.removeItem(SESSION_TOKEN_KEY);
  } catch {}
}
// On load, rehydrate sessionStorage from the localStorage mirror (present only when
// Remember Me was on). Lets all existing sessionStorage.getItem call sites work unchanged.
(function _hydrateAuthTokens() {
  try {
    if (!sessionStorage.getItem(MEMBER_TOKEN_KEY)) {
      const lm = localStorage.getItem(MEMBER_TOKEN_KEY);
      if (lm) sessionStorage.setItem(MEMBER_TOKEN_KEY, lm);
    }
    if (!sessionStorage.getItem(SESSION_TOKEN_KEY)) {
      const ls = localStorage.getItem(SESSION_TOKEN_KEY);
      if (ls) sessionStorage.setItem(SESSION_TOKEN_KEY, ls);
    }
  } catch {}
})();

async function _refreshSession() {
  const mt = sessionStorage.getItem(MEMBER_TOKEN_KEY);
  if (!mt) return null;
  try {
    const r = await fetch(API_BASE + "/api/members/session/refresh", {
      method: "POST",
      headers: { "X-Member-Token": mt }
    });
    if (!r.ok) return null;
    const d = await r.json();
    if (d.sessionToken) { persistSessionToken(d.sessionToken); return d.sessionToken; }
  } catch (e) { console.warn("Session refresh failed:", e.message); }
  return null;
}

/* ─── Session helpers ────────────────────────────────────────────────────── */
async function _ensureSession() {
  let token = sessionStorage.getItem(SESSION_TOKEN_KEY);
  if (!token) token = await _refreshSession();
  return token || null;
}

/* ─── Claude API ─────────────────────────────────────────────────────────── */
async function callAI(messages, sys="", max=4000, _legacy="", model="") {
  const doCall = (token) => fetch(API_BASE + "/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session-Token": token || "" },
    body: JSON.stringify({ messages, system: sys, max, model: model || undefined })
  });
  try {
    let token = await _ensureSession();
    let r = await doCall(token);
    // Session stale (server restarted) — refresh once and retry
    if (r.status === 500 || r.status === 401) {
      const fresh = await _refreshSession();
      if (fresh) r = await doCall(fresh);
    }
    if (r.ok) {
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      return d.text || "";
    } else {
      if (r.status === 401) {
        window.dispatchEvent(new CustomEvent('qa-auth-failure'));
        throw new Error("Session expired — please log in again.");
      }
      const d = await r.json().catch(()=>({}));
      throw new Error(d.error || "Server error " + r.status);
    }
  } catch(proxyErr) {
    if (!proxyErr.message.includes("fetch")) throw proxyErr;
    throw new Error("AI server is not running. Please start it with: node server.js");
  }
}

/* ─── Member storage helpers ─────────────────────────────────────────────── */
const callMemberStorage = async (memberId, method, storagePath, body) => {
  const token = sessionStorage.getItem('qa_member_token') || '';
  const r = await fetch(API_BASE + '/api/members/' + memberId + storagePath, {
    method,
    headers: {'Content-Type':'application/json','X-Member-Token': token},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
};

const serverStorage = {
  loadWorkspace: async (id) => { try { const r = await callMemberStorage(id,'GET','/workspace'); return r.workspace||null; } catch(e) { return null; } },
  saveWorkspace: async (id, state) => { try { await callMemberStorage(id,'POST','/workspace',{workspaceState:state}); return true; } catch(e) { return false; } },
  loadStories: async (id) => { try { const r = await callMemberStorage(id,'GET','/stories'); return r.stories||[]; } catch(e) { return []; } },
  saveStory: async (id, story) => { try { const r = await callMemberStorage(id,'POST','/stories',{story}); return r.id; } catch(e) { return null; } },
  updateStory: async (id, sid, updates) => { try { await callMemberStorage(id,'PUT','/stories/'+sid, updates); } catch(e) {} },
  deleteStory: async (id, sid) => { try { await callMemberStorage(id,'DELETE','/stories/'+sid); } catch(e) {} },
  loadCategories: async (id) => { try { const r = await callMemberStorage(id,'GET','/categories'); return r.categories||[]; } catch(e) { return []; } },
  saveCategory: async (id, name) => { try { const r = await callMemberStorage(id,'POST','/categories',{name}); return r.id; } catch(e) { return null; } },
  updateCategory: async (id, cid, name) => { try { await callMemberStorage(id,'PUT','/categories/'+cid,{name}); } catch(e) {} },
  deleteCategory: async (id, cid) => { try { await callMemberStorage(id,'DELETE','/categories/'+cid); } catch(e) {} },
  addNotification: async (id, notif) => { try { await callMemberStorage(id,'POST','/notifications',{notification:notif}); } catch(e) {} },
  markAllRead: async (id) => { try { await callMemberStorage(id,'PUT','/notifications/read-all'); } catch(e) {} }
};

/* ─── Jira API ───────────────────────────────────────────────────────────── */
async function callJira(proj, method, path, body=null) {
  let token = await _ensureSession();
  if (!token) throw new Error("No active session. Please log out and log back in.");
  const doCall = (t) => fetch(API_BASE + "/api/jira", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session-Token": t },
    body: JSON.stringify({ path, method, body })
  });
  let r = await doCall(token);
  // Session stale (server restarted) — refresh once and retry
  if (r.status === 500 || r.status === 401) {
    const fresh = await _refreshSession();
    if (fresh) r = await doCall(fresh);
  }
  if (!r.ok) {
    const d = await r.json().catch(()=>({}));
    throw new Error(d.error || "Server error " + r.status);
  }
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

/* ─── Admin sync (best-effort, never blocks UI) ─────────────────────────── */
async function syncToServer(type, payload) {
  try {
    const token = sessionStorage.getItem(SESSION_TOKEN_KEY);
    const r = await fetch(API_BASE + "/api/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Session-Token": token || "" },
      body: JSON.stringify({ type, ...payload })
    });
    if (r.ok) {
      const syncResult = await r.json().catch(() => ({}));
      if (syncResult.warnings && syncResult.warnings.length > 0) {
        try { localStorage.setItem('qa_sync_warnings', JSON.stringify(syncResult.warnings)); } catch(e) {}
      }
    }
  } catch {}
}

/* ─── Member helpers ─────────────────────────────────────────────────────── */
async function loadMembersFromServer() {
  try {
    const adminToken=sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
    const r=await fetch(API_BASE+"/api/members",{headers:{"X-Admin-Token":adminToken}});
    if(r.ok){ const list=await r.json(); DB.members=list; saveDB(); }
  } catch {}
}

/* ─── File helpers ───────────────────────────────────────────────────────── */
function dlFile(content, name, mime="text/plain") {
  const a = document.createElement("a");
  const url = URL.createObjectURL(new Blob([content],{type:mime}));
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
function toGapData(v) {
  if (!v) return null;
  return typeof v === "string" ? { legacy:true, raw:v } : v;
}
function formatGapText(gapData) {
  if (!gapData) return "";
  if (gapData.legacy) return gapData.raw || "";
  const sevIcon = s => s==="high"?"🔴":s==="medium"?"🟡":"🟢";
  const acIcon = s => s==="clear"?"✓":s==="missing"?"✗":"⚠";
  const lines = [];
  lines.push("📋 Story Summary:", gapData.summary||"", "");
  lines.push("✅ Acceptance Criteria Review:");
  (gapData.acReview||[]).forEach(a=>lines.push(`${acIcon(a.status)} ${a.text}${a.note?" — "+a.note:""}`));
  lines.push("", "🔍 GAP Analysis:");
  (gapData.gaps||[]).forEach(g=>lines.push(`${sevIcon(g.severity)} [${g.category||"Gap"}] ${g.description}`));
  lines.push("", "⚠️ Risk Areas:");
  (gapData.risks||[]).forEach(r=>lines.push(`${sevIcon(r.severity)} ${r.description}`));
  lines.push("", "💡 Recommendations:");
  (gapData.recommendations||[]).forEach(r=>lines.push("- "+r));
  if (gapData.coverage) {
    const c = gapData.coverage;
    lines.push("", "📊 Test Coverage Estimate:",
      `Happy flows: ${c.happyPct??"—"}% · Edge cases: ${c.edgePct??"—"}% · Negative cases: ${c.negativePct??"—"}% · Automation: ${c.automationPct??"—"}%`);
    if (c.note) lines.push(c.note);
  }
  return lines.join("\n").trim();
}
function exportCSV(cases, sid) {
  const h = ["ID","Title","Type","Preconditions","Steps","Expected","Platform","Automatable"];
  const rows = cases.filter(c=>c.status==="approved").map(c=>[
    c.id,c.title,c.type,c.preconditions||"",(c.steps||[]).join(" | "),c.expected||"",c.platform||"web",c.automatable===false?"No":"Yes"
  ]);
  const csv = [h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  dlFile("\uFEFF"+csv,"AIO_"+sid+".csv","text/csv;charset=utf-8");
}
function exportExcel(cases, sid) {
  const approved = cases.filter(c => c.status === "approved");
  const header = ["ID","Title","Description","Pre-condition","Test Data","Type","Priority","Test Steps","Expected Result"];
  const rows = [header];
  approved.forEach(c => {
    const steps = c.steps || [];
    const stepResults = c.stepResults || [];
    const priority = c.priority || "Medium";
    if (steps.length === 0) {
      rows.push([c.id, c.title, c.description||"", c.preconditions||"", c.testData||"", c.type||"", priority, "", c.expected||""]);
      return;
    }
    steps.forEach((step, i) => {
      const expected = stepResults[i] || (i === steps.length - 1 ? c.expected || "" : "");
      rows.push([
        i === 0 ? c.id : "",
        i === 0 ? c.title : "",
        i === 0 ? (c.description || "") : "",
        i === 0 ? (c.preconditions || "") : "",
        i === 0 ? (c.testData || "") : "",
        i === 0 ? (c.type || "") : "",
        i === 0 ? priority : "",
        step,
        expected
      ]);
    });
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  // Column widths
  ws["!cols"] = [
    {wch:10},{wch:40},{wch:40},{wch:30},{wch:25},{wch:15},{wch:10},{wch:50},{wch:50}
  ];
  // Header row style (bold)
  const range = XLSX.utils.decode_range(ws["!ref"]);
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({r:0, c})];
    if (cell) cell.s = {font:{bold:true}, fill:{fgColor:{rgb:"D9E1F2"}}, alignment:{wrapText:true,vertical:"center"}};
  }
  XLSX.utils.book_append_sheet(wb, ws, "Test Cases");
  XLSX.writeFile(wb, "AIO_TestCases_" + sid + ".xlsx");
}

/* ─── CSV user-data parser ───────────────────────────────────────────────── */
function parseCSVUsers(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { error: "CSV must have a header row and at least one data row." };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, '').toLowerCase());
  const uIdx = headers.findIndex(h => /^(username|user|email|login|name)$/.test(h));
  const pIdx = headers.findIndex(h => /^(password|pass|pwd|secret)$/.test(h));
  if (uIdx === -1) return { error: "Column not found. Add a column named 'username', 'user', 'email', or 'login'." };
  if (pIdx === -1) return { error: "Column not found. Add a column named 'password', 'pass', or 'pwd'." };
  const users = lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));
    return { username: cols[uIdx] || '', password: cols[pIdx] || '' };
  }).filter(u => u.username);
  if (users.length === 0) return { error: "No valid rows found in the CSV." };
  return { users };
}

// A saved story "belongs" to a project either via a Jira-ticket-prefixed sid
// (functional tests) or an explicit projectId (ui-design / non-functional
// tests, which have no sid). Functional-test stories never carry a projectId,
// so if the project has no Jira key there is no reliable signal either way —
// fall back to visible (matching the pre-existing behavior of showing
// everything in that case) rather than silently hiding the user's own data.
function storyMatchesProject(s, jiraProjKey, projectId) {
  if (s.projectId) return s.projectId === projectId;
  if (s.sid && jiraProjKey) return s.sid.startsWith(jiraProjKey + "-");
  return !jiraProjKey;
}

function tokenizeShellCommand(str) {
  const tokens = [];
  let i = 0, cur = '', inSingle = false, inDouble = false, sawAny = false;
  while (i < str.length) {
    const c = str[i];
    if (inSingle) {
      if (c === "'") { inSingle = false; } else { cur += c; }
    } else if (inDouble) {
      if (c === '"') { inDouble = false; }
      else if (c === '\\' && i + 1 < str.length && '"\\$`'.includes(str[i + 1])) { cur += str[i + 1]; i++; }
      else { cur += c; }
    } else {
      if (c === "'") { inSingle = true; sawAny = true; }
      else if (c === '"') { inDouble = true; sawAny = true; }
      else if (/\s/.test(c)) { if (sawAny || cur) { tokens.push(cur); cur = ''; sawAny = false; } }
      else if (c === '\\' && i + 1 < str.length) { cur += str[i + 1]; i++; sawAny = true; }
      else { cur += c; sawAny = true; }
    }
    i++;
  }
  if (cur || sawAny) tokens.push(cur);
  return tokens;
}

// Parses a pasted cURL command (from browser DevTools / Postman "Copy as cURL")
// into { url, method, body, bearer, basicUser, basicPass }. Unknown flags are ignored.
function parseCurlCommand(raw) {
  if (!raw || !raw.trim()) return null;
  // Normalize line continuations: bash "\", cmd "^", PowerShell "`", each followed by a newline.
  const normalized = raw.replace(/[\\^`]\s*\r?\n/g, ' ').replace(/\r?\n/g, ' ');
  const tokens = tokenizeShellCommand(normalized.trim());
  if (!tokens.length) return null;
  let i = 0;
  if (/^curl(\.exe)?$/i.test(tokens[0])) i = 1;

  let url = '', method = '', body = '', bearer = '', basicUser = '', basicPass = '';
  let hasData = false;
  const headers = [];

  for (; i < tokens.length; i++) {
    const t = tokens[i];
    if (t === '-X' || t === '--request') { method = (tokens[++i] || '').toUpperCase(); }
    else if (t === '-H' || t === '--header') { headers.push(tokens[++i] || ''); }
    else if (t === '-d' || t === '--data' || t === '--data-raw' || t === '--data-binary' || t === '--data-ascii') { body = tokens[++i] || ''; hasData = true; }
    else if (t === '--data-urlencode') { const v = tokens[++i] || ''; body = body ? body + '&' + v : v; hasData = true; }
    else if (t === '-u' || t === '--user') {
      const up = tokens[++i] || '';
      const idx = up.indexOf(':');
      basicUser = idx >= 0 ? up.slice(0, idx) : up;
      basicPass = idx >= 0 ? up.slice(idx + 1) : '';
    }
    else if (t === '--url') { url = tokens[++i] || ''; }
    else if (!url && /^https?:\/\//i.test(t)) { url = t; }
    // everything else (-k, -s, -L, --compressed, -i, -v, ...) is silently ignored
  }

  // Any header that isn't Authorization (handled above) or Content-Type/Accept
  // (already sent by every test) is likely a custom auth mechanism — e.g. an
  // API key header — so surface it as an importable custom header.
  const otherHeaders = [];
  headers.forEach(h => {
    const idx = h.indexOf(':');
    if (idx === -1) return;
    const rawName = h.slice(0, idx).trim();
    const name = rawName.toLowerCase();
    const value = h.slice(idx + 1).trim();
    if (name === 'authorization') {
      if (/^bearer\s+/i.test(value)) bearer = value.replace(/^bearer\s+/i, '');
      else if (/^basic\s+/i.test(value)) {
        try {
          const decoded = atob(value.replace(/^basic\s+/i, ''));
          const idx2 = decoded.indexOf(':');
          basicUser = idx2 >= 0 ? decoded.slice(0, idx2) : decoded;
          basicPass = idx2 >= 0 ? decoded.slice(idx2 + 1) : '';
        } catch {}
      }
    } else if (name !== 'content-type' && name !== 'accept') {
      otherHeaders.push({ name: rawName, value });
    }
  });

  if (!method) method = hasData ? 'POST' : 'GET';
  const ALLOWED_METHODS = ['GET', 'POST', 'PUT', 'PATCH', 'DELETE'];
  if (!ALLOWED_METHODS.includes(method)) method = hasData ? 'POST' : 'GET';

  return { url, method, body, bearer, basicUser, basicPass, otherHeaders };
}

function NotifBell({userId}) {
  const [open,setOpen]=useState(false);

    if(btnRef.current){const r=btnRef.current.getBoundingClientRect();const panelW=300;const left=Math.max(8,Math.min(r.right-panelW,window.innerWidth-panelW-8));setPos({top:r.bottom+6,left});}

    document.addEventListener("mousedown",onDocClick);
    return ()=>document.removeEventListener("mousedown",onDocClick);
  },[open]);

      🔔{unread.length>0&&<span style={{position:"absolute",top:-6,right:-6,background:"var(--color-text-danger)",color:"#fff",borderRadius:20,padding:"0 5px",fontSize:10,minWidth:16,textAlign:"center"}}>{unread.length}</span>}
    </button>
    {open&&<div ref={panelRef} style={{position:"fixed",left:pos.left,top:pos.top,width:300,maxHeight:"70vh",display:"flex",flexDirection:"column",background:"var(--color-background-secondary)",border:"1px solid var(--color-border-secondary)",borderRadius:12,zIndex:9999,boxShadow:"0 8px 24px rgba(0,0,0,.14)"}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid var(--color-border-tertiary)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        {unread.length>0&&<button onClick={()=>{unread.forEach(n=>n.read=true);saveDB();tick(x=>x+1);}} style={{padding:"3px 8px",borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>Mark all read</button>}
      </div>
      <div style={{maxHeight:340,overflowY:"auto"}}>
        {withinWeek.length===0
          ?<div style={{padding:16,fontSize:13,color:"var(--color-text-tertiary)"}}>No notifications in the past 7 days.</div>
          :visible.map(n=><div key={n.id} onClick={()=>{n.read=true;saveDB();tick(x=>x+1);}} style={{padding:"10px 16px",borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer",background:n.read?"transparent":"var(--color-background-info)"}}>
            <div style={{fontSize:13,fontWeight:n.read?400:500}}>{n.msg}</div>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>
              {n.at?new Date(n.at).toLocaleDateString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):n.ts}
            </div>
          </div>)
        }

            Show more ({withinWeek.length-shown} remaining)
          </button>
        </div>}
      </div>
    </div>}
  </div>;
}

/* ─── Markdown renderer for chat ─────────────────────────────────────────── */
function renderMd(text){
  const lines=text.split("\n");
  const out=[];let i=0;
  const isTableRow=l=>/^\|.+\|/.test(l.trim());
  const isTableSep=l=>/^\|[-|\s:]+\|/.test(l.trim());
  while(i<lines.length){
    const l=lines[i];
    // === SECTION DIVIDER === (bilingual gap output section headers)
    if(/^===\s*.+\s*===$/.test(l.trim())){
      const label=l.trim().replace(/^===\s*/,"").replace(/\s*===$/,"");
      const isArabic=/[؀-ۿ]/.test(label);
      out.push(<div key={i} style={{marginTop:24,marginBottom:10,padding:"10px 16px",borderRadius:10,background:"var(--color-background-info)",border:"1px solid rgba(29,78,216,0.18)",fontWeight:700,fontSize:14,color:"var(--color-text-info)",textAlign:isArabic?"right":"left",direction:isArabic?"rtl":"ltr"}}>{label}</div>);
      i++;continue;
    }
    // markdown headings
    if(/^###\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:13,marginTop:10,marginBottom:2}}>{l.replace(/^###\s/,"")}</div>);i++;continue;}
    if(/^##\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:14,marginTop:12,marginBottom:3}}>{l.replace(/^##\s/,"")}</div>);i++;continue;}
    if(/^#\s/.test(l)){out.push(<div key={i} style={{fontWeight:700,fontSize:15,marginTop:14,marginBottom:4}}>{l.replace(/^#\s/,"")}</div>);i++;continue;}
    // table
    if(isTableRow(l)){
      const rows=[];
      while(i<lines.length&&isTableRow(lines[i])){rows.push(lines[i]);i++;}
      const [headerRow,...bodyRows]=rows.filter(r=>!isTableSep(r));
      const headers=(headerRow||"").split("|").map(h=>h.trim()).filter(Boolean);
      const dataRows=bodyRows.map(r=>r.split("|").map(c=>c.trim()).filter(Boolean));
      const isRtl=/[؀-ۿ]/.test(headerRow||"");
      out.push(<div key={i} style={{overflowX:"auto",marginBottom:10,direction:isRtl?"rtl":"ltr"}}>
        <table style={{borderCollapse:"collapse",fontSize:13,width:"100%"}}>
          <thead><tr>{headers.map((h,j)=><th key={j} style={{padding:"7px 12px",background:"var(--color-background-info)",border:"1px solid var(--color-border-tertiary)",fontWeight:600,textAlign:isRtl?"right":"left",color:"var(--color-text-info)"}}>{h}</th>)}</tr></thead>
          <tbody>{dataRows.map((row,ri)=><tr key={ri} style={{background:ri%2===0?"var(--color-background-primary)":"var(--color-background-secondary)"}}>{row.map((cell,ci)=><td key={ci} style={{padding:"6px 12px",border:"1px solid var(--color-border-tertiary)",textAlign:isRtl?"right":"left"}}>{inlineMd(cell)}</td>)}</tr>)}</tbody>
        </table></div>);
      continue;
    }
    // bullet list
    if(/^[-*]\s/.test(l)){
      const items=[];
      while(i<lines.length&&/^[-*]\s/.test(lines[i])){items.push(lines[i].replace(/^[-*]\s/,""));i++;}
      out.push(<ul key={i} style={{margin:"4px 0 4px 18px",padding:0}}>{items.map((it,j)=><li key={j} style={{marginBottom:2}}>{inlineMd(it)}</li>)}</ul>);
      continue;
    }
    // numbered list
    if(/^\d+\.\s/.test(l)){
      const items=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s/,""));i++;}
      out.push(<ol key={i} style={{margin:"4px 0 4px 18px",padding:0}}>{items.map((it,j)=><li key={j} style={{marginBottom:2}}>{inlineMd(it)}</li>)}</ol>);
      continue;
    }
    // horizontal rule (dashes only, not === dividers)
    if(/^---+$/.test(l.trim())){out.push(<hr key={i} style={{border:"none",borderTop:"1px solid var(--color-border-tertiary)",margin:"8px 0"}}/>);i++;continue;}
    // blank line
    if(l.trim()===""){out.push(<div key={i} style={{height:6}}/>);i++;continue;}
    // ALL-CAPS section label (e.g. "REAL GAPS FOUND:", "STORY SUMMARY:") — treat as bold header
    if(/^[A-Z؀-ۿ][A-Z؀-ۿ\s]+:$/.test(l.trim())||/^[A-Z][A-Z\s]+:$/.test(l.trim())){
      const isArabic=/[؀-ۿ]/.test(l);
      out.push(<div key={i} style={{fontWeight:700,fontSize:13,marginTop:14,marginBottom:4,color:"var(--color-text-primary)",textAlign:isArabic?"right":"left",direction:isArabic?"rtl":"ltr"}}>{l.trim()}</div>);i++;continue;
    }
    // paragraph — detect Arabic lines and align right
    const isArabicLine=/[؀-ۿ]/.test(l);
    out.push(<div key={i} style={{marginBottom:2,textAlign:isArabicLine?"right":"left",direction:isArabicLine?"rtl":"ltr"}}>{inlineMd(l)}</div>);i++;
  }
  return out;
}
function inlineMd(text){
  // split on bold, italic, inline code, links
  const parts=[];let rest=text;let k=0;
  const re=/(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`|\[([^\]]+)\]\((\S+?)\))/g;let m;let last=0;
  while((m=re.exec(rest))!==null){
    if(m.index>last)parts.push(<span key={k++}>{rest.slice(last,m.index)}</span>);
    if(m[2])parts.push(<strong key={k++}>{m[2]}</strong>);
    else if(m[3])parts.push(<em key={k++}>{m[3]}</em>);
    else if(m[4])parts.push(<code key={k++} style={{background:"var(--color-background-secondary)",borderRadius:3,padding:"1px 5px",fontSize:12,fontFamily:"monospace"}}>{m[4]}</code>);
    else if(m[5])parts.push(<a key={k++} href={m[6]} target="_blank" rel="noopener noreferrer" style={{color:"var(--color-text-info)"}}>{m[5]}</a>);
    last=m.index+m[0].length;
  }
  if(last<rest.length)parts.push(<span key={k++}>{rest.slice(last)}</span>);
  return parts.length>0?parts:text;
}
/* Convert Jira's rendered HTML into the markdown dialect renderMd understands */
function htmlToMd(html){
  if(!html) return '';
  let s=html;
  s=s.replace(/<a\s+[^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi,(_,href,t)=>`[${t.replace(/<[^>]+>/g,'').trim()||href}](${href})`);
  s=s.replace(/<(strong|b)[^>]*>([\s\S]*?)<\/\1>/gi,(_,__,t)=>`**${t.replace(/<[^>]+>/g,'').trim()}**`);
  s=s.replace(/<(em|i)[^>]*>([\s\S]*?)<\/\1>/gi,(_,__,t)=>`*${t.replace(/<[^>]+>/g,'').trim()}*`);
  s=s.replace(/<code[^>]*>([\s\S]*?)<\/code>/gi,(_,t)=>`\`${t.replace(/<[^>]+>/g,'').trim()}\``);
  s=s.replace(/<h1[^>]*>([\s\S]*?)<\/h1>/gi,(_,t)=>`\n# ${t.replace(/<[^>]+>/g,'').trim()}\n`);
  s=s.replace(/<h2[^>]*>([\s\S]*?)<\/h2>/gi,(_,t)=>`\n## ${t.replace(/<[^>]+>/g,'').trim()}\n`);
  s=s.replace(/<h[3-6][^>]*>([\s\S]*?)<\/h[3-6]>/gi,(_,t)=>`\n### ${t.replace(/<[^>]+>/g,'').trim()}\n`);
  s=s.replace(/<ol[^>]*>([\s\S]*?)<\/ol>/gi,(_,inner)=>{
    let n=0;
    const items=inner.match(/<li[^>]*>([\s\S]*?)<\/li>/gi)||[];
    return '\n'+items.map(li=>`${++n}. ${li.replace(/<\/?li[^>]*>/gi,'').replace(/<[^>]+>/g,'').trim()}`).join('\n')+'\n';
  });
  s=s.replace(/<ul[^>]*>([\s\S]*?)<\/ul>/gi,(_,inner)=>{
    const items=inner.match(/<li[^>]*>([\s\S]*?)<\/li>/gi)||[];
    return '\n'+items.map(li=>`- ${li.replace(/<\/?li[^>]*>/gi,'').replace(/<[^>]+>/g,'').trim()}`).join('\n')+'\n';
  });
  s=s.replace(/<table[^>]*>([\s\S]*?)<\/table>/gi,(_,inner)=>{
    const rows=inner.match(/<tr[^>]*>([\s\S]*?)<\/tr>/gi)||[];
    const mdRows=rows.map(row=>{
      const cells=row.match(/<t[hd][^>]*>([\s\S]*?)<\/t[hd]>/gi)||[];
      const cellTexts=cells.map(c=>c.replace(/<\/?t[hd][^>]*>/gi,'').replace(/<[^>]+>/g,'').trim().replace(/\|/g,'\\|')||' ');
      return '| '+cellTexts.join(' | ')+' |';
    });
    if(!mdRows.length) return '';
    const colCount=(mdRows[0].match(/\|/g)||[]).length-1;
    const sep='|'+Array(colCount).fill('---').join('|')+'|';
    return '\n'+mdRows[0]+'\n'+sep+'\n'+mdRows.slice(1).join('\n')+'\n';
  });
  s=s.replace(/<br\s*\/?>/gi,'\n').replace(/<\/p>/gi,'\n\n').replace(/<p[^>]*>/gi,'').replace(/<\/div>/gi,'\n').replace(/<div[^>]*>/gi,'').replace(/<\/tr>/gi,'\n');
  s=s.replace(/<[^>]+>/g,'');
  s=s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ');
  return s.replace(/\n{3,}/g,'\n\n').trim();
}

/* ─── AI Chat ─────────────────────────────────────────────────────────────── */
function AIChat({proj,sid,sdata,cases=[],gapData=null,result=null,sessionBugs=[],coverageText="",platform=""}) {
  const [msgs,setMsgs]=useState([{role:"assistant",text:"Hi! I can see your full story, test cases, execution results and bugs. Ask me anything!"}]);
  const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const [jiraCtx,setJiraCtx]=useState("");
  const msgsRef=useRef(null);
  useEffect(()=>{if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);

  // Pre-fetch story Jira context on open
  useEffect(()=>{
    if(!proj?.jiraProjKey||!sid)return;
    (async()=>{
      try{
        const issue=await callJira(proj,"GET","/issue/"+sid+"?fields=summary,status,assignee,priority,description,issuetype,comment");
        const comments=(issue.fields?.comment?.comments||[]).slice(-3).map(c=>`  [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}"`).join("\n");
        const ctx=`Current Jira story:\n  Key: ${issue.key}\n  Summary: ${issue.fields?.summary}\n  Status: ${issue.fields?.status?.name}\n  Priority: ${issue.fields?.priority?.name}\n  Assignee: ${issue.fields?.assignee?.displayName||"Unassigned"}\n  Type: ${issue.fields?.issuetype?.name}${comments?"\n  Recent comments:\n"+comments:""}`;
        setJiraCtx(ctx);
      }catch{setJiraCtx("");}
    })();
  },[sid]);

  const isJiraQuery=t=>/bug|issue|ticket|jira|open|status|assign|sprint|backlog|comment|story|task|priority|close|resolve|report|list|show|fetch|get|[A-Z]+-\d+/i.test(t);

  const fetchJiraData=async(q)=>{
    if(!proj?.jiraProjKey)return"";
    const parts=[];
    try{
      // fetch specific issue keys mentioned in query e.g. JF-10, PROJ-5
      const keyMatches=[...new Set((q.match(/[A-Za-z]+-\d+/g)||[]).map(k=>k.toUpperCase()))];
      for(const key of keyMatches){
        try{
          const issue=await callJira(proj,"GET",`/issue/${key}?fields=summary,status,assignee,priority,description,issuetype,comment`);
          const descText=issue.fields?.description?.content?.[0]?.content?.[0]?.text||"";
          const comments=(issue.fields?.comment?.comments||[]).slice(-3).map(c=>`    [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}`).join("\n");
          parts.push(`Issue ${issue.key}:\n  Summary: ${issue.fields?.summary}\n  Type: ${issue.fields?.issuetype?.name}\n  Status: ${issue.fields?.status?.name}\n  Priority: ${issue.fields?.priority?.name}\n  Assignee: ${issue.fields?.assignee?.displayName||"Unassigned"}${descText?"\n  Description: "+descText:""}${comments?"\n  Recent comments:\n"+comments:""}`);
        }catch{}
      }
      // fetch active sprint tickets
      if(/sprint/i.test(q)){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND sprint in openSprints() ORDER BY priority ASC`,maxResults:20,fields:["summary","status","issuetype","assignee","priority"]});
          const items=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.issuetype?.name}/${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name} (${i.fields?.assignee?.displayName||"Unassigned"})`).join("\n");
          parts.push(items?`Active sprint tickets in ${proj.jiraProjKey} (${r.issues?.length||0}):\n${items}`:`No active sprint found in ${proj.jiraProjKey}.`);
        }catch(e){parts.push(`Could not fetch sprint data: ${e.message}`);}
      }
      // fetch open bugs for project
      if(/bug/i.test(q)){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND issuetype=Bug AND status!=Done ORDER BY created DESC`,maxResults:10,fields:["summary","status","priority","assignee"]});
          const bugs=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name} (${i.fields?.assignee?.displayName||"Unassigned"})`).join("\n");
          parts.push(bugs?`Open bugs in ${proj.jiraProjKey}:\n${bugs}`:`No open bugs found.`);
        }catch(e){parts.push(`Could not fetch bugs: ${e.message}`);}
      }
      // fetch recent issues
      if(/issue|ticket|task|list|show|fetch|open/i.test(q)&&!/bug|sprint/i.test(q)&&keyMatches.length===0){
        try{
          const r=await callJira(proj,"POST","/search/jql",{jql:`project=${proj.jiraProjKey} AND status!=Done ORDER BY updated DESC`,maxResults:10,fields:["summary","status","issuetype","assignee","priority"]});
          const issues=(r.issues||[]).map(i=>`  ${i.key}: [${i.fields?.issuetype?.name}/${i.fields?.priority?.name}] ${i.fields?.summary} — ${i.fields?.status?.name}`).join("\n");
          parts.push(issues?`Recent open issues in ${proj.jiraProjKey}:\n${issues}`:`No open issues found.`);
        }catch(e){parts.push(`Could not fetch issues: ${e.message}`);}
      }
      // fetch comments on current story
      if(sid&&/comment/i.test(q)&&keyMatches.length===0){
        try{
          const r=await callJira(proj,"GET","/issue/"+sid+"/comment?maxResults=5");
          const comments=(r.comments||[]).map(c=>`  [${c.author?.displayName}]: ${c.body?.content?.[0]?.content?.[0]?.text||""}`).join("\n");
          if(comments)parts.push(`Comments on ${sid}:\n${comments}`);
        }catch{}
      }
    }catch{}
    return parts.join("\n\n");
  };

  const send=async()=>{
    if(!msg.trim()||busy)return;
    const u=msg.trim(); setMsg(""); setMsgs(m=>[...m,{role:"user",text:u}]); setBusy(true);
    const hist=msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    try{
      let liveCtx="";
      if(isJiraQuery(u))liveCtx=await fetchJiraData(u);
      const jiraSection=[jiraCtx,liveCtx].filter(Boolean).join("\n\n");

      // Build workspace context from current session data
      const storySection=sdata?`USER STORY:\n  ID: ${sid}\n  Summary: ${sdata.summary||""}\n  Description: ${sdata.description||sdata.rawText||""}\n  Platform: ${platform}`:sid?`Story ID: ${sid}`:"No story loaded yet.";
      const gapSection=gapData?`GAP ANALYSIS:\n${formatGapText(gapData)}`:"";
      const casesSection=cases.length>0?`TEST CASES (${cases.length} total):\n${cases.map(c=>`  [${c.status?.toUpperCase()||"PENDING"}] ${c.id} (${c.type}): ${c.title}${c.steps?.length?"\n    Steps: "+c.steps.join(" → "):""}`).join("\n")}`:"No test cases yet.";
      const resultSection=result?`EXECUTION RESULTS:\n  Total: ${result.total} | Passed: ${result.pass?.length||0} | Failed: ${result.fail?.length||0}\n  Passed: ${(result.pass||[]).join(", ")||"none"}\n  Failed: ${(result.fail||[]).join(", ")||"none"}`:"No execution results yet.";
      const bugsSection=sessionBugs.length>0?`BUGS FILED (${sessionBugs.length}):\n${sessionBugs.map(b=>`  ${b.bid} [${b.sev}]: ${b.summary}${b.jKey?" → "+b.jKey:""}`).join("\n")}`:"No bugs filed yet.";
      const coverageSection=coverageText?`COVERAGE REPORT:\n${coverageText}`:"";

      const workspaceCtx=[storySection,gapSection,casesSection,resultSection,bugsSection,coverageSection].filter(Boolean).join("\n\n");
      const sys=`You are a QA expert assistant embedded in the QA AI Platform. CRITICAL RULES:\n1. You have ZERO tools and ZERO external access. You cannot call any APIs.\n2. NEVER mention permissions, tool access, approvals, or ask the user to do anything to grant access.\n3. All Jira data you will ever receive has already been fetched by the app and is shown below under "JIRA DATA". If it is empty, say "No data was returned from Jira for this query" and stop.\n4. Answer only from the context provided below and your QA expertise.\n\nProject: ${proj?.name||"—"} (Jira key: ${proj?.jiraProjKey||"—"})\n\n=== CURRENT SESSION ===\n${workspaceCtx}\n${jiraSection?`\n=== JIRA DATA (already fetched by the app) ===\n${jiraSection}`:"\n=== JIRA DATA ===\n(No Jira data was fetched for this query.)"}\n\nBe concise. Reference IDs and keys by name when relevant.`;
      const r=await callAI([...hist,{role:"user",content:u}],sys,2000,proj?.anthropicKey||"");
      setMsgs(m=>[...m,{role:"assistant",text:r}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"Error: "+e.message}]);}
    setBusy(false);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {jiraCtx&&<div style={{fontSize:11,color:"var(--color-text-tertiary)",padding:"4px 0 8px",display:"flex",alignItems:"center",gap:5}}>
      <span style={{width:7,height:7,borderRadius:"50%",background:"#36B37E",display:"inline-block"}}/>Connected to Jira · {proj?.jiraProjKey}{sid?" · "+sid:""}
    </div>}
    <div ref={msgsRef} style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,fontSize:13,lineHeight:1.65,background:m.role==="user"?"var(--color-text-info)":"var(--color-background-primary)",color:m.role==="user"?"#fff":"var(--color-text-primary)",border:m.role==="assistant"?"1px solid var(--color-border-tertiary)":"none"}}>
          {m.role==="assistant"?renderMd(m.text):<span style={{whiteSpace:"pre-wrap"}}>{m.text}</span>}
        </div>
      </div>)}
      {busy&&<div style={{alignSelf:"flex-start",padding:"10px 14px",borderRadius:12,background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",fontSize:13,color:"var(--color-text-tertiary)"}}>Thinking…</div>}
    </div>
    <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1px solid var(--color-border-tertiary)"}}>
      <input style={{...inp,flex:1,fontSize:13}} value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask about this story, open bugs, Jira issues…"/>
      <Btn v="primary" onClick={send} disabled={busy}>Send</Btn>
    </div>
  </div>;
}

/* ─── Perf AI Chat ────────────────────────────────────────────────────────── */
function PerfAIChat({proj,perfForm,perfResult}) {
  const [msgs,setMsgs]=useState([{role:"assistant",text:"Hi! I can see your performance test configuration and results. Ask me anything about the setup, metrics, thresholds, or how to improve API performance!"}]);
  const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const msgsRef=useRef(null);
  useEffect(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);

  const send=async()=>{
    if(!msg.trim()||busy)return;
    const u=msg.trim();setMsg("");setMsgs(m=>[...m,{role:"user",text:u}]);setBusy(true);
    const hist=msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    try{
      const authDesc=perfForm.authType==="bearer"?"Bearer Token":perfForm.authType==="basic"?"Basic Auth":perfForm.authType==="csv"?`Dynamic/CSV (${perfForm.csvUsers?.length||0} users)`:"None";
      const isFlow=perfForm.mode==="flow";
      const targetCtx=isFlow
        ?`Flow — ${(perfForm.steps||[]).filter(s=>s.url&&s.url.trim()).map((s,i)=>`\n    ${i+1}. ${s.method} ${s.url}${s.extractVar?` (extracts "${s.extractPath||""}" into {{${s.extractVar}}})`:""}`).join("")}`
        :`Method: ${perfForm.method} ${perfForm.apiUrl||"—"}`;
      const configCtx=`TEST CONFIGURATION:\n  Name: ${perfForm.testName||"—"}\n  Type: ${perfForm.testType==="stress"?"Stress Test":"Load Test"}\n  ${targetCtx}\n  Auth: ${authDesc}\n  Virtual Users: ${perfForm.vus}${perfForm.testType==="stress"?" (max)":""}\n  Duration: ${perfForm.duration}${perfForm.testType==="stress"?" per step":""}\n  Ramp: ${perfForm.ramp}\n  p95 Threshold: ${perfForm.p95Threshold}ms`;
      const resultCtx=perfResult?`\n\nTEST RESULTS:\n  Status: ${perfResult.passed?"PASSED ✅":"FAILED ❌"}\n  Total Requests: ${perfResult.metrics?.totalRequests||0}\n  RPS: ${perfResult.metrics?.rps||0}\n  Avg: ${perfResult.metrics?.avgDuration||0}ms | Min: ${perfResult.metrics?.minDuration||0}ms | Max: ${perfResult.metrics?.maxDuration||0}ms\n  p50: ${perfResult.metrics?.p50||0}ms | p90: ${perfResult.metrics?.p90||0}ms | p95: ${perfResult.metrics?.p95||0}ms | p99: ${perfResult.metrics?.p99||0}ms\n  Error Rate: ${perfResult.metrics?.errorRate||0}%`:"";
      const sys=`You are a performance testing expert embedded in the QA AI Platform. Help the user understand and improve their API performance tests. Project: "${proj?.name||"—"}"\n\n=== CURRENT TEST ===\n${configCtx}${resultCtx}\n\nBe concise and practical. Focus on performance testing best practices, k6 insights, and actionable recommendations based on the data above.`;
      const r=await callAI([...hist,{role:"user",content:u}],sys,2000);
      setMsgs(m=>[...m,{role:"assistant",text:r}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"Error: "+e.message}]);}
    setBusy(false);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div ref={msgsRef} style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,fontSize:13,lineHeight:1.65,background:m.role==="user"?"var(--color-text-info)":"var(--color-background-primary)",color:m.role==="user"?"#fff":"var(--color-text-primary)",border:m.role==="assistant"?"1px solid var(--color-border-tertiary)":"none"}}>
          {m.role==="assistant"?renderMd(m.text):<span style={{whiteSpace:"pre-wrap"}}>{m.text}</span>}
        </div>
      </div>)}
      {busy&&<div style={{alignSelf:"flex-start",padding:"10px 14px",borderRadius:12,background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",fontSize:13,color:"var(--color-text-tertiary)"}}>Thinking…</div>}
    </div>
    <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1px solid var(--color-border-tertiary)"}}>
      <input style={{...inp,flex:1,fontSize:13}} value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask about results, thresholds, k6…"/>
      <Btn v="primary" onClick={send} disabled={busy}>Send</Btn>
    </div>
  </div>;
}

/* ─── Perf Failures List — grouped/counted so identical failures show once ── */
function FailuresList({failures}) {
  if(!failures||!failures.length)return null;
  const total=failures.reduce((a,f)=>a+(f.count||1),0);
  return <div style={{...card,border:"1px solid var(--color-text-danger)"}}>
    <H2 style={{marginBottom:12}}>⚠ Failures — {total} total, {failures.length} distinct</H2>
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{borderBottom:"1px solid var(--color-border-secondary)"}}>{["Step","Expected","Actual","Error","Count"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--color-text-secondary)"}}>{h}</th>)}</tr></thead>
        <tbody>{failures.map((f,i)=><tr key={i} style={{borderBottom:"1px solid var(--color-border-tertiary)"}}>
          <td style={{padding:"6px 10px"}}>{f.step||"—"}</td>
          <td style={{padding:"6px 10px"}}><Tag c="blue">{f.expectedStatus}</Tag></td>
          <td style={{padding:"6px 10px"}}><Tag c="red">{f.actualStatus||"—"}{f.statusText?" "+f.statusText:""}</Tag></td>
          <td style={{padding:"6px 10px",maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={f.error||""}>{f.error||"—"}</td>
          <td style={{padding:"6px 10px",fontWeight:600}}>{f.count}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

            {s.extractVar&&<Tag c="green">{"→ {{"}{s.extractVar}{"}}"}</Tag>}
          </div>)}

      </div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:16}}>
        {[
          {icon:"📊",label:"Total Requests",val:(m.totalRequests||0).toLocaleString()},
          {icon:"⚡",label:"Requests / sec",val:m.rps??0},
          {icon:"⏱",label:"p95 Latency",val:`${m.p95??0} ms`,warn:over},
          {icon:"⚠️",label:"Error Rate",val:`${m.errorRate??0}%`,warn:m.errorRate>5},
          {icon:"📈",label:"Avg Latency",val:`${m.avgDuration??0} ms`},
          {icon:"📈",label:"Max Latency",val:`${m.maxDuration??0} ms`},
        ].map((x,i)=><div key={i} style={{padding:"10px",borderRadius:10,textAlign:"center",border:"1px solid "+(x.warn?"var(--color-text-danger)":"var(--color-border-tertiary)")}}>
          <div style={{fontSize:16,marginBottom:2}}>{x.icon}</div>
          <div style={{fontSize:16,fontWeight:700,color:x.warn?"var(--color-text-danger)":undefined}}>{x.val}</div>
          <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:2}}>{x.label}</div>
        </div>)}
      </div>

      <div>
        <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Response Time Breakdown</div>
        <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
          {[["Min",m.minDuration],["Avg",m.avgDuration],["p50",m.p50],["p90",m.p90],["p95",m.p95],["p99",m.p99],["Max",m.maxDuration]].map(([lbl,val])=>(
            <div key={lbl} style={{textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:600,color:lbl==="p95"&&over?"var(--color-text-danger)":undefined}}>{val??0} ms</div>
              <div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>{lbl}</div>
            </div>
          ))}
        </div>
      </div>
      {item.failures&&item.failures.length>0&&<div style={{marginTop:16}}><FailuresList failures={item.failures}/></div>}
      {onRunAgain&&<div style={{marginTop:20,display:"flex",justifyContent:"flex-end"}}><Btn v="primary" onClick={()=>onRunAgain(item)}>↻ Run Again</Btn></div>}
    </div>
  </div>;
}

/* ─── Member History Page — sidebar item below Workspace ─────────────────── */
function MemberHistoryPage({member,onRunAgain}) {

    fetch(API_BASE+"/api/members/"+member.id+"/perf-history",{headers:{"X-Member-Token":token}}).then(r=>r.json()).then(d=>{setPerfHistory(Array.isArray(d.results)?d.results:[]);setPerfHistoryLoading(false);}).catch(()=>setPerfHistoryLoading(false));

          <tbody>{perfHistory.map((h,i)=><tr key={i} onClick={()=>setHistoryDetail(h)} style={{borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="var(--color-background-secondary)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><td style={{padding:"6px 10px"}}>{h.testName||"—"}</td><td style={{padding:"6px 10px"}}>{h.mode==="flow"?<Tag c="blue">Flow</Tag>:(h.method||"GET")}</td><td style={{padding:"6px 10px",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={h.mode==="flow"?`${h.stepCount||0} step(s)`:(h.apiUrl||"")}>{h.mode==="flow"?`${h.stepCount||0} step(s)`:(h.apiUrl||"—")}</td><td style={{padding:"6px 10px"}}>{h.vus||"—"}</td><td style={{padding:"6px 10px"}}>{h.duration||"—"}</td><td style={{padding:"6px 10px"}}>{h.metrics?.p95!=null?h.metrics.p95:"—"}</td><td style={{padding:"6px 10px"}}>{h.p95Threshold?"≤"+h.p95Threshold+"ms":"—"}</td><td style={{padding:"6px 10px"}}><span style={{color:h.passed?"var(--color-text-success)":"var(--color-text-danger)",fontWeight:600}}>{h.passed?"✓ Pass":"✗ Fail"}</span></td><td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{h.syncedAt?new Date(h.syncedAt).toLocaleDateString():"—"}</td><td style={{padding:"6px 10px",whiteSpace:"nowrap"}}><button onClick={e=>{e.stopPropagation();setHistoryDetail(h);}} style={{...ghostBtn,padding:"3px 10px",fontSize:11}}>📄 Report</button>{onRunAgain&&<> <button onClick={e=>{e.stopPropagation();onRunAgain(h);}} style={{...ghostBtn,padding:"3px 10px",fontSize:11}}>↻ Run Again</button></>}</td></tr>)}</tbody>
        </table>
      </div>}
    </div>
    {historyDetail&&<PerfHistoryReportModal item={historyDetail} onClose={()=>setHistoryDetail(null)} onRunAgain={onRunAgain}/>}
  </div>;
}

/* ─── Admin Pages ─────────────────────────────────────────────────────────── */
function MembersPage({onBack}) {
  const [list,setList]=useState([...DB.members]);
  const [f,setF]=useState({name:"",email:"",password:"",role:"Junior QA Engineer"});
  const [editing,setEditing]=useState(null);
  const [ef,setEf]=useState({name:"",email:"",role:"Junior QA Engineer",password:""});
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  useEffect(()=>{ loadMembersFromServer().then(()=>setList([...DB.members])); },[]);
  const adminToken=()=>sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
  const add=async()=>{
    if(!f.name||!f.email||!f.password){setErr("All fields are required.");return;}
    setBusy(true); setErr("");
    try{
      const r=await fetch(API_BASE+"/api/members",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":adminToken()},body:JSON.stringify(f)});
      const d=await r.json();
      if(!r.ok){setErr(d.error||"Failed to add member.");setBusy(false);return;}
      DB.members.push(d); saveDB();
      pushNotif(d.id,"Welcome to QA AI Platform!");
      setList([...DB.members]); setF({name:"",email:"",password:"",role:"Junior QA Engineer"});
    }catch{setErr("Cannot reach server.");}
    setBusy(false);
  };
  const startEdit=m=>{ setEditing(m.id); setEf({name:m.name,email:m.email,role:m.role,password:""}); setErr(""); };
  const cancelEdit=()=>{ setEditing(null); setErr(""); };
  const saveEdit=async()=>{
    if(!ef.name||!ef.email){setErr("Name and email are required.");return;}
    setBusy(true); setErr("");
    try{
      const r=await fetch(API_BASE+"/api/members/"+editing,{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":adminToken()},body:JSON.stringify(ef)});
      const d=await r.json().catch(()=>({}));
      if(!r.ok){setErr(d.error||"Failed to update member (status "+r.status+"). Make sure the server is restarted.");setBusy(false);return;}
      setEditing(null);
      await loadMembersFromServer();
      setList([...DB.members]);
    }catch(e){setErr("Cannot reach server: "+e.message);}
    setBusy(false);
  };
  const del=async id=>{
    setBusy(true);
    try{
      await fetch(API_BASE+"/api/members/"+id,{method:"DELETE",headers:{"X-Admin-Token":adminToken()}});
      DB.members=DB.members.filter(m=>m.id!==id);
      DB.assignments=DB.assignments.filter(a=>a.memberId!==id);
      saveDB(); setList([...DB.members]);
    }catch{setErr("Cannot reach server.");}
    setBusy(false);
  };
  const [resetLinks,setResetLinks]=useState({});
  const sendResetLink=async(id)=>{
    try{
      const r=await fetch(API_BASE+"/api/admin/members/"+id+"/generate-reset-token",{method:"POST",headers:{"X-Admin-Token":adminToken()}});
      const d=await r.json();
      if(!r.ok){alert(d.error||"Failed to generate reset token.");return;}
      setResetLinks(p=>({...p,[id]:d.resetToken||d.token||""}));
    }catch{alert("Cannot reach server.");}
  };
  const ROLES=["Junior QA Engineer","Intermediate QA Engineer","Senior QA Engineer","QA Engineer Lead"];
  const th={textAlign:"left",padding:"8px 12px",borderBottom:"1px solid var(--color-border-tertiary)",fontSize:12,fontWeight:500,color:"var(--color-text-secondary)"};
  const td={padding:"10px 12px",borderBottom:"1px solid var(--color-border-tertiary)"};
  return <div>
    <BackLink onClick={onBack}/>
    <H1>Members</H1>
    {!editing&&<div style={card}><H2>Add member</H2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><Lbl>Full name</Lbl><input style={inp} value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="Jane Smith"/></div>
        <div><Lbl>Role</Lbl><select style={sel} value={f.role} onChange={e=>setF(p=>({...p,role:e.target.value}))}>{ROLES.map(r=><option key={r}>{r}</option>)}</select></div>
        <div><Lbl>Email</Lbl><input style={inp} value={f.email} onChange={e=>setF(p=>({...p,email:e.target.value}))} placeholder="jane@co.com"/></div>
        <div><Lbl>Password</Lbl><input type="password" style={inp} value={f.password} onChange={e=>setF(p=>({...p,password:e.target.value}))} placeholder="Min. 8 characters"/></div>
      </div>
      {err&&!editing&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:10}}>{err}</div>}
      <Btn v="primary" onClick={add} disabled={busy}>{busy?"Adding…":"Add member"}</Btn>
    </div>}
    {editing&&<div style={{...card,border:"2px solid var(--color-border-focus)",marginBottom:16}}><H2>Edit member</H2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><Lbl>Full name</Lbl><input style={inp} value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/></div>
        <div><Lbl>Role</Lbl><select style={sel} value={ef.role} onChange={e=>setEf(p=>({...p,role:e.target.value}))}>{ROLES.map(r=><option key={r}>{r}</option>)}</select></div>
        <div><Lbl>Email</Lbl><input style={inp} value={ef.email} onChange={e=>setEf(p=>({...p,email:e.target.value}))}/></div>
        <div><Lbl>New password</Lbl><input type="password" style={inp} value={ef.password} onChange={e=>setEf(p=>({...p,password:e.target.value}))} placeholder="Leave blank to keep current"/></div>
      </div>
      {err&&editing&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:10}}>{err}</div>}
      <div style={{display:"flex",gap:8}}><Btn v="primary" onClick={saveEdit} disabled={busy}>{busy?"Saving…":"Save changes"}</Btn><button onClick={cancelEdit} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Cancel</button></div>
    </div>}
    <div style={card}>{list.length===0?<div style={{color:"var(--color-text-tertiary)",fontSize:14}}>No members yet.</div>:
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
        <thead><tr><th style={th}>Name</th><th style={th}>Role</th><th style={th}>Email</th><th style={th}>Project</th><th style={th}></th></tr></thead>
        <tbody>{list.map(m=>{ const ps=DB.assignments.filter(x=>x.memberId===m.id).map(a=>DB.projects.find(x=>x.id===a.projectId)).filter(Boolean);
          return <tr key={m.id} style={editing===m.id?{background:"var(--color-background-subtle)"}:{}}><td style={td}><b>{m.name}</b></td><td style={td}><span style={{fontSize:13,color:"var(--color-text-secondary)"}}>{m.role}</span></td><td style={td}>{m.email}</td><td style={td}>{ps.length>0?ps.map(p=><Tag key={p.id} c="blue">{p.name}</Tag>):<span style={{color:"var(--color-text-tertiary)",fontSize:13}}>—</span>}</td><td style={td}><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><Btn v="ghost" onClick={()=>startEdit(m)} disabled={busy}>Edit</Btn><Btn v="danger" onClick={()=>del(m.id)} disabled={busy}>Remove</Btn>{resetLinks[m.id]?<div style={{display:"flex",gap:4,alignItems:"center"}}><input readOnly style={{fontSize:11,padding:"3px 6px",borderRadius:4,border:"1px solid var(--color-border-secondary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",width:120}} value={resetLinks[m.id]}/><button onClick={()=>setResetLinks(p=>{const n={...p};delete n[m.id];return n;})} style={{fontSize:10,padding:"2px 5px",borderRadius:3,border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)"}}>✕</button></div>:<Btn v="ghost" onClick={()=>sendResetLink(m.id)} disabled={busy}>Reset Link</Btn>}</div></td></tr>;
        })}</tbody>
      </table>}
    </div>
  </div>;
}

function ProjectsPage({onBack}) {
  const [list,setList]=useState([...DB.projects]);
  const EMPTY_F={name:"",jiraProjKey:"",platform:"web",frontendRepoUrl:"",backendRepoUrl:"",language:"ar"};
  const [f,setF]=useState({...EMPTY_F});
  const [editing,setEditing]=useState(null);
  const [testResult,setTestResult]=useState(null); const [testing,setTesting]=useState(false);
  const [saving,setSaving]=useState(false);
  const adminTok=()=>sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
  // GAP-02: load projects from server on mount and sync to global DB
  useEffect(()=>{
    fetch(API_BASE+"/api/projects",{headers:{"X-Admin-Token":adminTok()}})
      .then(r=>r.ok?r.json():null)
      .then(async d=>{
        if(!d) return;
        if(d.length===0&&DB.projects.length>0){
          // Server has no projects but localStorage does — auto-migrate (preserves IDs via parsed.id in server)
          for(const p of DB.projects){
            try{await fetch(API_BASE+"/api/projects",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":adminTok()},body:JSON.stringify(p)});}catch{}
          }
          // Migrate assignments grouped by member
          const memberIds=[...new Set(DB.assignments.map(a=>a.memberId))];
          for(const mId of memberIds){
            const pids=DB.assignments.filter(a=>a.memberId===mId).map(a=>a.projectId);
            try{await fetch(API_BASE+"/api/assignments/"+mId,{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":adminTok()},body:JSON.stringify({projectIds:pids})});}catch{}
          }
          const r2=await fetch(API_BASE+"/api/projects",{headers:{"X-Admin-Token":adminTok()}});
          if(r2.ok){const migrated=await r2.json();DB.projects=migrated;setList([...migrated]);return;}
        }
        DB.projects=d;setList([...d]);
      })
      .catch(()=>{});
  },[]);
  const save=async()=>{
    if(!f.name||saving) return;
    setSaving(true);
    try{
      let r,d;
      if(editing){
        r=await fetch(API_BASE+"/api/projects/"+editing,{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":adminTok()},body:JSON.stringify(f)});
        d=await r.json();
        if(r.ok){ Object.assign(DB.projects.find(x=>x.id===editing)||{},d); setEditing(null); }
        else{ alert(d.error||"Save failed"); }
      }else{
        r=await fetch(API_BASE+"/api/projects",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":adminTok()},body:JSON.stringify(f)});
        d=await r.json();
        if(r.ok){ DB.projects.push(d); }
        else{ alert(d.error||"Save failed"); }
      }
      if(r.ok){ saveDB(); setList([...DB.projects]); setF({...EMPTY_F}); setTestResult(null); }
    }catch(e){ alert("Cannot reach server: "+e.message); }
    setSaving(false);
  };
  const edit=p=>{ setEditing(p.id); setF({name:p.name,jiraProjKey:p.jiraProjKey||"",platform:p.platform||"web",frontendRepoUrl:p.frontendRepoUrl||"",backendRepoUrl:p.backendRepoUrl||"",language:p.language||"ar"}); setTestResult(null); };
  const testConnection=async()=>{
    if(!f.frontendRepoUrl.trim()&&!f.backendRepoUrl.trim()){ setTestResult({clientError:"Enter at least one repo URL first."}); return; }
    setTesting(true); setTestResult(null);
    try{
      const r=await fetch(API_BASE+"/api/project/check-attachment",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":sessionStorage.getItem(ADMIN_TOKEN_KEY)||""},body:JSON.stringify({frontendRepoUrl:f.frontendRepoUrl,backendRepoUrl:f.backendRepoUrl})});
      const d=await r.json();
      if(!r.ok) throw new Error(d.error||"Check failed");
      setTestResult(d);
    }catch(e){ setTestResult({clientError:e.message}); }
    setTesting(false);
  };
  const del=async id=>{
    if(!window.confirm("Delete this project? This will also remove all its member assignments.")) return;
    try{
      const r=await fetch(API_BASE+"/api/projects/"+id,{method:"DELETE",headers:{"X-Admin-Token":adminTok()}});
      if(r.ok){ DB.projects=DB.projects.filter(p=>p.id!==id); DB.assignments=DB.assignments.filter(a=>a.projectId!==id); saveDB(); setList([...DB.projects]); }
      else{ const d=await r.json(); alert(d.error||"Delete failed"); }
    }catch(e){ alert("Cannot reach server: "+e.message); }
  };
  const th={textAlign:"left",padding:"8px 12px",borderBottom:"1px solid var(--color-border-tertiary)",fontSize:12,fontWeight:500,color:"var(--color-text-secondary)"};
  const td={padding:"10px 12px",borderBottom:"1px solid var(--color-border-tertiary)"};
  return <div>
    <BackLink onClick={onBack}/>
    <H1>Projects</H1>
    <div style={{...card,marginBottom:12,padding:"12px 16px",background:"var(--color-background-info)",border:"1px solid var(--color-border-secondary)"}}>
      <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>ℹ️ Jira credentials (URL, email, API token) are configured per member in their Settings. AI runs via Claude CLI — no API key needed.</div>
    </div>
    <div style={card}><H2>{editing?"Edit":"New"} project</H2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><Lbl>Name</Lbl><input style={inp} value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="App QA"/></div>
        <div><Lbl>Platform</Lbl><select style={sel} value={f.platform} onChange={e=>setF(p=>({...p,platform:e.target.value}))}><option value="web">Web</option><option value="mobile">Mobile</option><option value="both">Web + Mobile</option></select></div>
        <div><Lbl>Jira Project Key</Lbl><input style={inp} value={f.jiraProjKey} onChange={e=>setF(p=>({...p,jiraProjKey:e.target.value}))} placeholder="PROJ"/></div>
        <div><Lbl>Language</Lbl><select style={sel} value={f.language||"ar"} onChange={e=>setF(p=>({...p,language:e.target.value}))}><option value="ar">Arabic RTL</option><option value="en">English LTR</option><option value="mixed">Mixed Language</option></select></div>
      </div>
      <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8}}>Attached repos (optional) — enables automatic script generation &amp; execution, skipping manual Codegen recording</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><Lbl>Frontend repo URL</Lbl><input style={inp} value={f.frontendRepoUrl} onChange={e=>{setF(p=>({...p,frontendRepoUrl:e.target.value}));setTestResult(null);}} placeholder="https://github.com/org/app-frontend"/></div>
        <div><Lbl>Backend repo URL</Lbl><input style={inp} value={f.backendRepoUrl} onChange={e=>{setF(p=>({...p,backendRepoUrl:e.target.value}));setTestResult(null);}} placeholder="https://github.com/org/app-backend"/></div>
      </div>
      <div style={{marginBottom:12}}>
        <button onClick={testConnection} disabled={testing||(!f.frontendRepoUrl.trim()&&!f.backendRepoUrl.trim())} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:testing?"not-allowed":"pointer",fontSize:14,fontWeight:500,color:"var(--color-text-secondary)",opacity:(!f.frontendRepoUrl.trim()&&!f.backendRepoUrl.trim())?0.5:1}}>{testing?"Testing…":"🔌 Test Connection"}</button>
        {testResult&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,fontSize:13,lineHeight:1.7,background:testResult.clientError?"var(--color-background-danger)":"var(--color-background-tertiary)",border:"1px solid "+(testResult.clientError?"rgba(153,27,27,0.2)":"var(--color-border-secondary)")}}>
          {testResult.clientError
            ?<span style={{color:"var(--color-text-danger)"}}>✗ {testResult.clientError}</span>
            :[["frontend","Frontend"],["backend","Backend"]].map(([key,label])=>{
              const r=testResult[key];
              if(!r) return null;
              return <div key={key}>{r.reachable?<span style={{color:"var(--color-text-success)"}}>✓ {label} ({r.name}) — reachable{r.truncated?" · source truncated to fit context limit":""}</span>:<span style={{color:"var(--color-text-danger)"}}>✗ {label} ({r.name}) — {r.error}</span>}</div>;
            })}
        </div>}
      </div>
      <div style={{display:"flex",gap:8}}><Btn v="primary" onClick={save} disabled={saving}>{saving?"Saving…":editing?"Save":"Add"}</Btn>{editing&&<button onClick={()=>{setEditing(null);setF({...EMPTY_F});setTestResult(null);}} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Cancel</button>}</div>
    </div>
    <div style={card}>{list.length===0?<div style={{color:"var(--color-text-tertiary)",fontSize:14}}>No projects.</div>:
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
        <thead><tr><th style={th}>Name</th><th style={th}>Jira Key</th><th style={th}>Platform</th><th style={th}>Attached</th><th style={th}>Members</th><th style={th}></th></tr></thead>
        <tbody>{list.map(p=>{
          const memberCount=DB.assignments.filter(a=>a.projectId===p.id).length;
          const attachedCount=[p.frontendRepoUrl,p.backendRepoUrl].filter(Boolean).length;
          return <tr key={p.id}><td style={td}><b>{p.name}</b></td><td style={td}><Tag c="blue">{p.jiraProjKey||"—"}</Tag></td><td style={td}><Tag c="blue">{p.platform}</Tag></td>
            <td style={td}>{attachedCount>0?<Tag c="green">{attachedCount===2?"Frontend + Backend":p.frontendRepoUrl?"Frontend only":"Backend only"}</Tag>:<Tag>None</Tag>}</td>

}

function AssignmentsPage({onBack}) {
  const adminTok=()=>sessionStorage.getItem(ADMIN_TOKEN_KEY)||"";
  const [list,setList]=useState([...DB.assignments]);
  const [mId,setMId]=useState("");
  const [selProjs,setSelProjs]=useState([]);
  const [editing,setEditing]=useState(null); // memberId being edited
  const [editProjs,setEditProjs]=useState([]);
  const [busy,setBusy]=useState(false);
  const toggleProj=(id,arr,set)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);
  // GAP-02: load assignments from server on mount
  useEffect(()=>{
    fetch(API_BASE+"/api/assignments",{headers:{"X-Admin-Token":adminTok()}})
      .then(r=>r.ok?r.json():null)
      .then(d=>{if(d){DB.assignments=d;setList([...d]);}})
      .catch(()=>{});
  },[]);
  const putAssignments=async(memberId,projectIds)=>{
    const r=await fetch(API_BASE+"/api/assignments/"+memberId,{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":adminTok()},body:JSON.stringify({projectIds})});
    if(!r.ok){const d=await r.json();throw new Error(d.error||"Failed to save assignments");}
  };
  const assign=async()=>{
    if(!mId||selProjs.length===0||busy) return;
    setBusy(true);
    try{
      const existing=DB.assignments.filter(a=>a.memberId===mId).map(a=>a.projectId);
      const merged=[...new Set([...existing,...selProjs])];
      await putAssignments(mId,merged);
      DB.assignments=DB.assignments.filter(a=>a.memberId!==mId);
      merged.forEach(pid=>DB.assignments.push({memberId:mId,projectId:pid}));
      const m=DB.members.find(x=>x.id===mId);
      const names=selProjs.map(pid=>DB.projects.find(p=>p.id===pid)?.name).filter(Boolean).join(", ");
      if(m&&names) pushNotif(mId,"Assigned to: "+names);
      saveDB(); setList([...DB.assignments]); setMId(""); setSelProjs([]);
    }catch(e){ alert(e.message); }
    setBusy(false);
  };
  const startEdit=memberId=>{
    setEditing(memberId);
    setEditProjs(DB.assignments.filter(a=>a.memberId===memberId).map(a=>a.projectId));
  };
  const cancelEdit=()=>setEditing(null);
  const saveEdit=async()=>{
    if(busy) return; setBusy(true);
    try{
      await putAssignments(editing,editProjs);
      DB.assignments=DB.assignments.filter(a=>a.memberId!==editing);
      editProjs.forEach(pid=>DB.assignments.push({memberId:editing,projectId:pid}));
      saveDB(); setList([...DB.assignments]); setEditing(null);
    }catch(e){ alert(e.message); }
    setBusy(false);
  };
  const delMember=async memberId=>{
    if(busy) return; setBusy(true);
    try{
      await putAssignments(memberId,[]);
      DB.assignments=DB.assignments.filter(a=>a.memberId!==memberId);
      saveDB(); setList([...DB.assignments]);
    }catch(e){ alert(e.message); }
    setBusy(false);
  };
  // Group by member
  const grouped=DB.members.map(m=>({m,projects:DB.projects.filter(p=>list.some(a=>a.memberId===m.id&&a.projectId===p.id))})).filter(x=>x.projects.length>0);
  const chkStyle={display:"flex",alignItems:"center",gap:6,padding:"4px 0",fontSize:13,cursor:"pointer"};
  const th={textAlign:"left",padding:"8px 12px",borderBottom:"1px solid var(--color-border-tertiary)",fontSize:12,fontWeight:500,color:"var(--color-text-secondary)"};
  const td={padding:"10px 12px",borderBottom:"1px solid var(--color-border-tertiary)"};
  return <div>
    <BackLink onClick={onBack}/>
    <H1>Assignments</H1>
    {!editing&&<div style={card}><H2>Assign member</H2>
      <div style={{marginBottom:12}}>
        <Lbl>Member</Lbl>
        <select style={sel} value={mId} onChange={e=>setMId(e.target.value)}><option value="">Select…</option>{DB.members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select>
      </div>
      {mId&&<div style={{marginBottom:12}}>
        <Lbl>Projects</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
          {DB.projects.map(p=><label key={p.id} style={chkStyle}>
            <input type="checkbox" checked={selProjs.includes(p.id)} onChange={()=>toggleProj(p.id,selProjs,setSelProjs)}/>
            {p.name}
          </label>)}
        </div>
      </div>}
      <Btn v="primary" onClick={assign} disabled={!mId||selProjs.length===0||busy}>{busy?"Saving…":"Assign"}</Btn>
    </div>}
    {editing&&(()=>{const m=DB.members.find(x=>x.id===editing);return(<div style={{...card,border:"2px solid var(--color-border-focus)",marginBottom:16}}><H2>Edit projects for {m?.name}</H2>
      <div style={{marginBottom:12}}>
        <Lbl>Projects</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
          {DB.projects.map(p=><label key={p.id} style={chkStyle}>
            <input type="checkbox" checked={editProjs.includes(p.id)} onChange={()=>toggleProj(p.id,editProjs,setEditProjs)}/>
            {p.name}
          </label>)}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}><Btn v="primary" onClick={saveEdit} disabled={busy}>{busy?"Saving…":"Save changes"}</Btn><button onClick={cancelEdit} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Cancel</button></div>
    </div>);})()}
    <div style={card}>{grouped.length===0?<div style={{color:"var(--color-text-tertiary)",fontSize:14}}>No assignments.</div>:
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
        <thead><tr><th style={th}>Member</th><th style={th}>Projects</th><th style={th}></th></tr></thead>
        <tbody>{grouped.map(({m,projects})=>
          <tr key={m.id} style={editing===m.id?{background:"var(--color-background-subtle)"}:{}}>
            <td style={td}><b>{m.name}</b><div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{m.role}</div></td>
            <td style={td}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{projects.map(p=><Tag key={p.id} c="green">{p.name}</Tag>)}</div></td>
            <td style={td}><div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={()=>startEdit(m.id)} disabled={busy}>Edit</Btn><Btn v="danger" onClick={()=>delMember(m.id)} disabled={busy}>Remove</Btn></div></td>
          </tr>
        )}</tbody>
      </table>}
    </div>
  </div>;
}

function DashboardPage({onNavigate}) {

/* ─── ADF text extractor (recursive) ────────────────────────────────────── */
function adfToText(node) {
  if (!node) return '';
  if (typeof node === 'string') return node;
  if (node.type === 'text') {
    const link = (node.marks||[]).find(m=>m.type==='link');
    const bold = (node.marks||[]).some(m=>m.type==='strong');
    const t = bold ? `**${node.text||''}**` : (node.text||'');
    return link ? `[${node.text||''}](${link.attrs?.href||''})` : t;
  }
  // Inline nodes that store their text in attrs, not content
  if (node.type === 'mention') return node.attrs?.text || node.attrs?.displayName || '';
  if (node.type === 'emoji') return node.attrs?.text || node.attrs?.shortName || '';
  if (node.type === 'status') return `[${node.attrs?.text||''}]`;
  if (node.type === 'date') return node.attrs?.text || '';
  if (node.type === 'inlineCard' || node.type === 'blockCard' || node.type === 'embedCard') return node.attrs?.url||'';
  if (node.type === 'hardBreak' || node.type === 'rule') return '\n';
  if (node.type === 'heading') {
    const level = Math.min(node.attrs?.level||1, 3);
    return '#'.repeat(level) + ' ' + (node.content||[]).map(adfToText).join('') + '\n';
  }
  if (node.type === 'bulletList') {
    return (node.content||[]).map(li => '- ' + (li.content||[]).map(adfToText).join('').trim()).join('\n') + '\n';
  }
  if (node.type === 'orderedList') {
    return (node.content||[]).map((li,i) => `${i+1}. ` + (li.content||[]).map(adfToText).join('').trim()).join('\n') + '\n';
  }
  const inner = (node.content||[]).map(adfToText).join('');
  const blockTypes = ['paragraph','listItem','blockquote','panel','codeBlock','expand','nestedExpand','tableRow'];
  return blockTypes.includes(node.type) ? inner+'\n' : inner;
}
/* Strip HTML tags + decode entities (used as fallback when ADF yields nothing) */
function htmlToText(html) {
  return html
    .replace(/<br\s*\/?>/gi,'\n').replace(/<\/?(p|div|li|tr|td|th|h[1-6])[^>]*>/gi,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\n{3,}/g,'\n\n').trim();
}

/* ─── Coverage charts ────────────────────────────────────────────────────── */
function DonutChart({data,title,size=160}) {
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:size,color:"var(--color-text-tertiary)",fontSize:13}}><div style={{fontSize:28,marginBottom:6}}>—</div>No data</div>;
  const cx=size/2,cy=size/2,r=size*0.38,ir=size*0.22;
  if(data.length===1) return(
    <div><div style={{fontWeight:500,fontSize:13,marginBottom:10,textAlign:"center"}}>{title}</div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
          <circle cx={cx} cy={cy} r={r} fill={data[0].color}/>
          <circle cx={cx} cy={cy} r={ir} fill="#fff"/>
          <text x={cx} y={cy-5} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.12} fontWeight="700" fill="#1a1a18">{total}</text>
          <text x={cx} y={cy+11} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.075} fill="#888">total</text>
        </svg>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>
          <div style={{width:10,height:10,borderRadius:2,background:data[0].color,flexShrink:0}}/><span style={{flex:1,color:"var(--color-text-secondary)"}}>{data[0].label}</span><span style={{fontWeight:600}}>{data[0].value} <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>(100%)</span></span>
        </div></div>
      </div>
    </div>);
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const frac=d.value/total,a1=angle,a2=angle+frac*2*Math.PI-0.005;
    angle=a2+0.005;
    const [c1,s1,c2,s2]=[Math.cos(a1),Math.sin(a1),Math.cos(a2),Math.sin(a2)],lg=frac>0.5?1:0;
    return {d:`M ${cx+r*c1} ${cy+r*s1} A ${r} ${r} 0 ${lg} 1 ${cx+r*c2} ${cy+r*s2} L ${cx+ir*c2} ${cy+ir*s2} A ${ir} ${ir} 0 ${lg} 0 ${cx+ir*c1} ${cy+ir*s1} Z`,color:d.color,label:d.label,value:d.value,pct:Math.round(frac*100)};
  });
  return(
    <div><div style={{fontWeight:500,fontSize:13,marginBottom:10,textAlign:"center"}}>{title}</div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
          {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth={2}/>)}
          <circle cx={cx} cy={cy} r={ir} fill="#fff"/>
          <text x={cx} y={cy-5} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.12} fontWeight="700" fill="#1a1a18">{total}</text>
          <text x={cx} y={cy+11} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.075} fill="#888">total</text>
        </svg>
        <div style={{flex:1}}>{slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,marginBottom:6}}>
          <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/><span style={{flex:1,color:"var(--color-text-secondary)"}}>{s.label}</span><span style={{fontWeight:600}}>{s.value} <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>({s.pct}%)</span></span>
        </div>)}</div>
      </div>
    </div>);
}
function BarChart({data,title}) {
  return(
    <div><div style={{fontWeight:500,fontSize:13,marginBottom:14,textAlign:"center"}}>{title}</div>
