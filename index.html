            try{
              const descText=`Visual discrepancy found comparing Figma design vs live implementation.\n\nArea: ${bug.area}\nSeverity: ${bug.severity}\n\nExpected (Figma):\n${bug.expected}\n\nActual (Implementation):\n${bug.actual}\n\nRecommendation:\n${bug.recommendation||"See description."}\n\nPage URL: ${uidForm.pageUrl}\nFigma URL: ${uidForm.figmaUrl}${uidJiraTicketKey?"\n\nLinked Ticket: "+uidJiraTicketKey:""}`;
              const body={fields:{project:{key:proj.jiraProjKey},summary:"[UI Design] "+bug.title,description:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:descText}]}]},issuetype:{name:"Bug"},priority:{name:bug.severity}}};
              const res=await callJira(proj,"POST","/issue",body);
              if(uidJiraTicketKey&&res.key){try{await callJira(proj,"POST","/issueLink",{type:{name:"Relates"},inwardIssue:{key:res.key},outwardIssue:{key:uidJiraTicketKey}});}catch{}}
              setUidJiraStatus(s=>({...s,[bug.id]:res.key||"created"}));
              syncToServer("bug",{memberId:member.id,memberName:member.name,projectId:proj?.id||"",projectName:proj?.name||"",bid:bug.id,sid:"UI-"+proj.jiraProjKey,summary:"[UI Design] "+bug.title,severity:bug.severity,jiraKey:res.key||null,status:"Open"});
            }catch(e){setUidJiraStatus(s=>({...s,[bug.id]:"error: "+e.message.slice(0,200)}));}
          };
          const importAll=async()=>{for(const b of bugs){if(!uidJiraStatus[b.id]||uidJiraStatus[b.id].startsWith("error")){await importBug(b);}}};
          const importedCount=Object.values(uidJiraStatus).filter(s=>s&&!s.startsWith("error")&&s!=="importing").length;
          const allDone=bugs.length>0&&bugs.every(b=>uidJiraStatus[b.id]&&!uidJiraStatus[b.id].startsWith("error")&&uidJiraStatus[b.id]!=="importing");
          const sevC=s=>s==="Critical"||s==="High"?"red":"amber";
          return <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div><H2 style={{marginBottom:2}}>Review & Import Bugs to Jira</H2>
                <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>{bugs.length} visual bug{bugs.length!==1?"s":""} found · {importedCount} imported{uidJiraTicketKey&&<> · Linked to <Tag c="blue">{uidJiraTicketKey}</Tag></>}</div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>{setUidShowAddBug(o=>!o);setUidEditingBugId(null);}} style={ghostBtn}>+ Add Bug</button>
                {!jiraConfigured&&<Tag c="amber">No Jira — configure in Settings</Tag>}
                {jiraConfigured&&!allDone&&<button onClick={importAll} style={{...ghostBtn,fontSize:13}}>Import All to Jira</button>}
                {allDone&&<Tag c="green">✓ All imported to Jira</Tag>}
                <button onClick={()=>setPhase("uidResults")} style={{...ghostBtn,fontSize:13}}>← Back to Results</button>
                <Btn v="primary" onClick={()=>setPhase("uidReport")}>Report →</Btn>
              </div>
            </div>
            {uidShowAddBug&&<div style={{...card,marginBottom:16,border:"1px solid var(--color-border-accent)"}}>
              <H2 style={{marginBottom:12}}>Add New Bug</H2>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div><Lbl>Title *</Lbl><input style={inp} value={uidAddBugForm.title} onChange={e=>setUidAddBugForm(p=>({...p,title:e.target.value}))} placeholder="Bug title"/></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><Lbl>Severity</Lbl><select style={{...inp,width:"100%"}} value={uidAddBugForm.severity} onChange={e=>setUidAddBugForm(p=>({...p,severity:e.target.value}))}>{["Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}</select></div>
                  <div><Lbl>Area</Lbl><input style={inp} value={uidAddBugForm.area} onChange={e=>setUidAddBugForm(p=>({...p,area:e.target.value}))} placeholder="e.g. Header, Footer, Form"/></div>
                </div>
                <div><Lbl>Description</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidAddBugForm.description} onChange={e=>setUidAddBugForm(p=>({...p,description:e.target.value}))} placeholder="Describe the visual discrepancy"/></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><Lbl>Expected (Figma)</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidAddBugForm.expected} onChange={e=>setUidAddBugForm(p=>({...p,expected:e.target.value}))} placeholder="What the design shows"/></div>
                  <div><Lbl>Actual (Implementation)</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidAddBugForm.actual} onChange={e=>setUidAddBugForm(p=>({...p,actual:e.target.value}))} placeholder="What the live page shows"/></div>
                </div>
                <div><Lbl>Recommendation</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidAddBugForm.recommendation} onChange={e=>setUidAddBugForm(p=>({...p,recommendation:e.target.value}))} placeholder="How to fix"/></div>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <Btn v="primary" disabled={!uidAddBugForm.title.trim()} onClick={addNewBug}>Add Bug</Btn>
                  <button onClick={()=>setUidShowAddBug(false)} style={ghostBtn}>Cancel</button>
                </div>
              </div>
            </div>}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {bugs.map(b=>{
                const status=uidJiraStatus[b.id];
                const isImported=status&&!status.startsWith("error")&&status!=="importing";
                const isError=status?.startsWith("error");
                const isImporting=status==="importing";
                return <div key={b.id} style={{...card,marginBottom:0,padding:"14px 16px",border:"1px solid "+(isImported?"rgba(22,101,52,0.3)":isError?"rgba(153,27,27,0.2)":"var(--color-border-tertiary)"),background:isImported?"var(--color-background-success)":isError?"var(--color-background-danger)":"var(--color-background-primary)"}}>
                  {uidEditingBugId===b.id
                    ?<div style={{display:"flex",flexDirection:"column",gap:10}}>
                        <div><Lbl>Title</Lbl><input style={{...inp,marginBottom:0}} value={uidEditBugForm.title||""} onChange={e=>setUidEditBugForm(p=>({...p,title:e.target.value}))}/></div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          <div><Lbl>Severity</Lbl><select style={{...inp,width:"100%",marginBottom:0}} value={uidEditBugForm.severity||"High"} onChange={e=>setUidEditBugForm(p=>({...p,severity:e.target.value}))}>{["Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}</select></div>
                          <div><Lbl>Area</Lbl><input style={{...inp,marginBottom:0}} value={uidEditBugForm.area||""} onChange={e=>setUidEditBugForm(p=>({...p,area:e.target.value}))}/></div>
                        </div>
                        <div><Lbl>Description</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidEditBugForm.description||""} onChange={e=>setUidEditBugForm(p=>({...p,description:e.target.value}))}/></div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          <div><Lbl>Expected (Figma)</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidEditBugForm.expected||""} onChange={e=>setUidEditBugForm(p=>({...p,expected:e.target.value}))}/></div>
                          <div><Lbl>Actual (Implementation)</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidEditBugForm.actual||""} onChange={e=>setUidEditBugForm(p=>({...p,actual:e.target.value}))}/></div>
                        </div>
                        <div><Lbl>Recommendation</Lbl><textarea style={{...ta,marginBottom:0}} rows={2} value={uidEditBugForm.recommendation||""} onChange={e=>setUidEditBugForm(p=>({...p,recommendation:e.target.value}))}/></div>
                        <div style={{display:"flex",gap:8}}>
                          <Btn v="primary" onClick={()=>{updateBug(b.id,uidEditBugForm);setUidEditingBugId(null);}}>Save</Btn>
                          <button onClick={()=>setUidEditingBugId(null)} style={ghostBtn}>Cancel</button>
                        </div>
                      </div>
                    :<div>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                          <Tag c="red">{b.id}</Tag>
                          <Tag c={sevC(b.severity)}>{b.severity}</Tag>
                          <Tag>{b.area}</Tag>
                          {isImported&&<Tag c="green">✓ {status}</Tag>}
                          <div style={{marginLeft:"auto",display:"flex",gap:2}}>
                            {!isImported&&<button title="Edit" onClick={()=>{setUidEditingBugId(b.id);setUidShowAddBug(false);setUidEditBugForm({title:b.title||"",severity:b.severity||"High",area:b.area||"",description:b.description||"",expected:b.expected||"",actual:b.actual||"",recommendation:b.recommendation||""});}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:14,padding:"2px 5px"}}>✎</button>}
                            <button title="Delete" onClick={()=>deleteBug(b.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"2px 5px"}}>✕</button>
                          </div>
                        </div>
                        <div style={{fontWeight:500,fontSize:13,marginBottom:4}}>{b.title}</div>
                        <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:6}}>{b.description}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12,marginBottom:4}}>
                          <div><b style={{color:"var(--color-text-success)"}}>Expected:</b> {b.expected}</div>
                          <div><b style={{color:"var(--color-text-danger)"}}>Actual:</b> {b.actual}</div>
                        </div>
                        {b.recommendation&&<div style={{fontSize:12,color:"var(--color-text-tertiary)",marginBottom:4}}>💡 {b.recommendation}</div>}
                        {isError&&<div style={{marginTop:6,fontSize:12,color:"var(--color-text-danger)",wordBreak:"break-word"}}>{status}</div>}
                        {!isImported&&<div style={{marginTop:10}}>
                          <button disabled={isImporting||!jiraConfigured} onClick={()=>importBug(b)} style={{...ghostBtn,fontSize:13,opacity:isImporting||!jiraConfigured?0.5:1,cursor:isImporting||!jiraConfigured?"not-allowed":"pointer"}}>
                            {isImporting?"Importing…":"→ Import to Jira"}
                          </button>
                        </div>}
                      </div>}
                </div>;
              })}
            </div>
          </div>;
        })()}

        {/* ── UI Design: Report ── */}
        {!uidLoading&&phase==="uidReport"&&uidVisualResult&&(()=>{
          const bugs=uidVisualResult.bugs||[];
          const importedBugs=bugs.filter(b=>uidJiraStatus[b.id]&&!uidJiraStatus[b.id].startsWith("error")&&uidJiraStatus[b.id]!=="importing");
          const approvedCases=uidCases.filter(c=>c.status!=="rejected");
          const rejectedCases=uidCases.filter(c=>c.status==="rejected");
          const criticalBugs=bugs.filter(b=>b.severity==="Critical");
          const highBugs=bugs.filter(b=>b.severity==="High");
          const sendComment=async()=>{
            if(!uidReportComment.trim()){return;}
            if(!uidJiraTicketKey){alert("No Jira ticket linked.");return;}
            if(!jiraConfigured){alert("Configure Jira credentials in Settings.");return;}
            setUidCommentStatus({sending:true,done:false,error:""});
            try{
              const lines=[
                uidReportComment,
                "",
                "---",
                `UI Design Test Summary`,
                `Page: ${uidForm.pageUrl||"—"}`,
                `Test Cases: ${uidCases.length} total · ${approvedCases.length} approved · ${rejectedCases.length} rejected`,
                `Bugs Found: ${bugs.length} (${criticalBugs.length} Critical · ${highBugs.length} High)`,
                `Bugs Imported to Jira: ${importedBugs.length}`,
                importedBugs.length>0?`Jira Issues: ${importedBugs.map(b=>uidJiraStatus[b.id]).join(", ")}`:null,
              ].filter(Boolean).join("\n");
              const adfBody={type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:lines}]}]};
              await callJira(proj,"POST",`/issue/${uidJiraTicketKey}/comment`,{body:adfBody});
              setUidCommentStatus({sending:false,done:true,error:""});
              showToast("Comment added to "+uidJiraTicketKey);
            }catch(e){setUidCommentStatus({sending:false,done:false,error:e.message.slice(0,160)});}
          };
          const scoreColor=s=>s>=80?"var(--color-text-success)":s>=60?"#d97706":"var(--color-text-danger)";
          return <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:8}}>
              <div><H2 style={{marginBottom:2}}>Test Session Report</H2>
                <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>UI Design test summary{uidJiraTicketKey&&<> for <Tag c="blue">{uidJiraTicketKey}</Tag></>}</div>
              </div>
              <button onClick={()=>setPhase("uidBugs")} style={{...ghostBtn,fontSize:13}}>← Back to Bugs</button>
            </div>

            {/* Summary stat cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:20}}>
              {[
                {val:uidCases.length,label:"Test Cases",sub:`${approvedCases.length} approved · ${rejectedCases.length} rejected`,color:"var(--accent)"},
                {val:bugs.length,label:"Bugs Found",sub:`${criticalBugs.length} Critical · ${highBugs.length} High`,color:"var(--color-text-danger)"},
                {val:importedBugs.length,label:"Imported to Jira",sub:uidJiraTicketKey||"No ticket linked",color:"var(--color-text-success)"},
                {val:(uidVisualResult.overallScore||0)+"%",label:"Design Match",sub:uidVisualResult.verdict||"",color:scoreColor(uidVisualResult.overallScore||0)},
              ].map(({val,label,sub,color})=>(
                <div key={label} style={{...card,padding:"16px 14px",textAlign:"center"}}>
                  <div style={{fontSize:26,fontWeight:700,color}}>{val}</div>
                  <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-primary)",marginTop:2}}>{label}</div>
                  <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:3}}>{sub}</div>
                </div>
              ))}
            </div>

            {/* Session details */}
            <div style={{...card,marginBottom:16}}>
              <H2 style={{marginBottom:12}}>Session Details</H2>
              <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:13}}>
                {uidJiraTicketKey&&<div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{color:"var(--color-text-tertiary)",minWidth:110,flexShrink:0}}>Linked Ticket</span><Tag c="blue">{uidJiraTicketKey}</Tag></div>}
                {uidForm.pageUrl&&<div style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{color:"var(--color-text-tertiary)",minWidth:110,flexShrink:0}}>Page URL</span><span style={{wordBreak:"break-all"}}>{uidForm.pageUrl}</span></div>}
                {uidForm.figmaUrl&&<div style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{color:"var(--color-text-tertiary)",minWidth:110,flexShrink:0}}>Figma URL</span><span style={{wordBreak:"break-all",overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>{uidForm.figmaUrl}</span></div>}
                {importedBugs.length>0&&<div style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{color:"var(--color-text-tertiary)",minWidth:110,flexShrink:0}}>Jira Issues</span>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {importedBugs.map(b=><div key={b.id} style={{display:"flex",gap:4,alignItems:"center"}}>
                      <Tag c="green">{uidJiraStatus[b.id]}</Tag>
                      <Tag c={b.severity==="Critical"||b.severity==="High"?"red":"amber"}>{b.severity}</Tag>
                      <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{b.title}</span>
                    </div>)}
                  </div>
                </div>}
                {bugs.filter(b=>!uidJiraStatus[b.id]||uidJiraStatus[b.id].startsWith("error")).length>0&&
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{color:"var(--color-text-tertiary)",minWidth:110,flexShrink:0}}>Not Imported</span>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {bugs.filter(b=>!uidJiraStatus[b.id]||uidJiraStatus[b.id].startsWith("error")).map(b=><Tag key={b.id} c="red">{b.id}</Tag>)}
                    </div>
                  </div>}
              </div>
            </div>

            {/* Comment to Jira */}
            <div style={card}>
              <H2 style={{marginBottom:4}}>Add Comment to Jira Story</H2>
              <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:14}}>
                {uidJiraTicketKey
                  ?<>Your comment will be posted directly to <Tag c="blue">{uidJiraTicketKey}</Tag>. A test summary is automatically appended.</>
                  :"No Jira ticket linked — go back to Jira Ticket step to select one."}
              </div>
              <textarea
                style={{...ta,width:"100%",boxSizing:"border-box",minHeight:130,marginBottom:0}}
                value={uidReportComment}
                onChange={e=>setUidReportComment(e.target.value)}
                placeholder={"Write your QA findings, recommendations, or any notes for the developer...\n\nExample:\nAll critical UI bugs have been filed. The hero section and statistics area need urgent attention before release. Navigation and footer passed visual review."}
              />
              <div style={{display:"flex",gap:10,alignItems:"center",marginTop:12,flexWrap:"wrap"}}>
                {uidCommentStatus.done
                  ?<Tag c="green">✓ Comment added to {uidJiraTicketKey}</Tag>
                  :<>
                      <Btn v="primary"
                        disabled={!uidReportComment.trim()||!uidJiraTicketKey||!jiraConfigured||uidCommentStatus.sending}
                        onClick={sendComment}>
                        {uidCommentStatus.sending?"Sending…":"💬 Add Comment to Jira"}
                      </Btn>
                      {uidCommentStatus.done&&<button onClick={()=>setUidCommentStatus({sending:false,done:false,error:""})} style={ghostBtn}>Edit & Resend</button>}
                      {!jiraConfigured&&<Tag c="amber">Configure Jira in Settings first</Tag>}
                      {!uidJiraTicketKey&&jiraConfigured&&<Tag c="amber">No ticket linked</Tag>}
                    </>}
                {uidCommentStatus.error&&<div style={{fontSize:12,color:"var(--color-text-danger)",wordBreak:"break-word",flex:"1 1 100%",marginTop:4}}>{uidCommentStatus.error}</div>}
              </div>
            </div>
          </div>;
        })()}

        {perfLoading&&<Loader msg="Running k6 performance test…"/>}

        {!loading&&!perfLoading&&phase==="perfTest"&&(()=>{
          const durLabels={'30s':'30 seconds','60s':'1 minute','2m':'2 minutes','5m':'5 minutes'};
          const durSecs={'30s':30,'60s':60,'2m':120,'5m':300};
          const rampSecs={'5s':5,'10s':10,'30s':30};
          const isStress=perfForm.testType==='stress';
          const totalSec=isStress?durSecs[perfForm.duration]*4+rampSecs[perfForm.ramp]*5:(durSecs[perfForm.duration]||60)+(rampSecs[perfForm.ramp]||10)*2;
          const s_=v=>setPerfForm(f=>({...f,...v}));
          const inpN={...inp,maxWidth:130};
          // Auth/body/headers aren't persisted in history (tokens shouldn't be stored in plaintext),
          // so re-running from a saved record restores everything else and resets those to defaults.
          const runAgainFromHistory=(h)=>{
            setPerfForm({
              ...PERF_FORM_DEFAULT,
              testName:h.testName||"",
              testType:h.testType||"load",
              mode:h.mode||"single",
              method:h.method||"GET",
              apiUrl:h.apiUrl||"",
              steps:Array.isArray(h.steps)?h.steps:[],
              vus:h.vus||PERF_FORM_DEFAULT.vus,
              duration:h.duration||PERF_FORM_DEFAULT.duration,
              ramp:h.ramp||PERF_FORM_DEFAULT.ramp,
              p95Threshold:h.p95Threshold||PERF_FORM_DEFAULT.p95Threshold,
            });
            setPerfResult(null);
            setHistoryDetail(null);
            setPerfTab("test");
          };
          const applyCurl=()=>{
            const parsed=parseCurlCommand(curlDraft);
            if(!parsed||!parsed.url){setCurlErr("Couldn't find a URL in that command.");return;}
            const authUpdates={};
            if(parsed.bearer){authUpdates.authType="bearer";authUpdates.token=parsed.bearer;}
            else if(parsed.basicUser){authUpdates.authType="basic";authUpdates.basicUsername=parsed.basicUser;authUpdates.basicPassword=parsed.basicPass;}
            if(parsed.otherHeaders&&parsed.otherHeaders.length)authUpdates.customHeaders=[...(perfForm.customHeaders||[]),...parsed.otherHeaders];
            if(perfForm.mode==="flow"){
              const newStep={...PERF_STEP_DEFAULT(),method:parsed.method||"GET",url:parsed.url,requestBody:parsed.body||""};
              s_({steps:[...(perfForm.steps||[]),newStep],...authUpdates});
              setCurlErr("");
              return;
            }
            const updates={apiUrl:parsed.url,method:parsed.method,...authUpdates};
            if(parsed.body)updates.requestBody=parsed.body;
            s_(updates);
            setCurlErr("");
          };
          const ptabBtn=(id,lbl)=><button onClick={()=>{
            if(id==='history'&&perfHistory.length===0&&!perfHistoryLoading){
              setPerfHistoryLoading(true);
              const token=sessionStorage.getItem(MEMBER_TOKEN_KEY)||sessionStorage.getItem(SESSION_TOKEN_KEY)||"";
              fetch(API_BASE+"/api/members/"+member.id+"/perf-history",{headers:{"X-Member-Token":token}}).then(r=>r.json()).then(d=>{setPerfHistory(Array.isArray(d.results)?d.results:[]);setPerfHistoryLoading(false);}).catch(()=>setPerfHistoryLoading(false));
            }
            setPerfTab(id);
          }} style={{padding:"6px 16px",borderRadius:8,border:"1px solid "+(perfTab===id?"var(--color-text-info)":"var(--color-border-secondary)"),background:perfTab===id?"var(--color-background-info)":"transparent",cursor:"pointer",fontSize:13,fontWeight:perfTab===id?600:400,color:perfTab===id?"var(--color-text-info)":"var(--color-text-secondary)"}}>{lbl}</button>;
          return <div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>{ptabBtn("test","Configure Test")}{ptabBtn("history","History")}</div>
          {perfTab==="history"&&<div style={card}>
            <H2 style={{marginBottom:12}}>Performance Test History</H2>
            {perfHistoryLoading?<div style={{color:"var(--color-text-tertiary)",fontSize:13}}>Loading...</div>:perfHistory.length===0?<div style={{color:"var(--color-text-tertiary)",fontSize:13}}>No history yet. Run a test to see results here.</div>:
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:"1px solid var(--color-border-secondary)"}}>{["Name","Method","URL","VUs","Duration","p95 (ms)","Threshold","Pass/Fail","Date",""].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--color-text-secondary)"}}>{h}</th>)}</tr></thead>
                <tbody>{perfHistory.map((h,i)=><tr key={i} onClick={()=>setHistoryDetail(h)} style={{borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="var(--color-background-secondary)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><td style={{padding:"6px 10px"}}>{h.testName||"—"}</td><td style={{padding:"6px 10px"}}>{h.mode==="flow"?<Tag c="blue">Flow</Tag>:(h.method||"GET")}</td><td style={{padding:"6px 10px",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={h.mode==="flow"?`${h.stepCount||0} step(s)`:(h.apiUrl||"")}>{h.mode==="flow"?`${h.stepCount||0} step(s)`:(h.apiUrl||"—")}</td><td style={{padding:"6px 10px"}}>{h.vus||"—"}</td><td style={{padding:"6px 10px"}}>{h.duration||"—"}</td><td style={{padding:"6px 10px"}}>{h.metrics?.p95!=null?h.metrics.p95:"—"}</td><td style={{padding:"6px 10px"}}>{h.p95Threshold?"≤"+h.p95Threshold+"ms":"—"}</td><td style={{padding:"6px 10px"}}><span style={{color:h.passed?"var(--color-text-success)":"var(--color-text-danger)",fontWeight:600}}>{h.passed?"✓ Pass":"✗ Fail"}</span></td><td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>{h.syncedAt?new Date(h.syncedAt).toLocaleDateString():"—"}</td><td style={{padding:"6px 10px",whiteSpace:"nowrap"}}><button onClick={e=>{e.stopPropagation();setHistoryDetail(h);}} style={{...ghostBtn,padding:"3px 10px",fontSize:11}}>📄 Report</button> <button onClick={e=>{e.stopPropagation();runAgainFromHistory(h);}} style={{...ghostBtn,padding:"3px 10px",fontSize:11}}>↻ Run Again</button></td></tr>)}</tbody>
              </table>
            </div>}
          </div>}
          {historyDetail&&<PerfHistoryReportModal item={historyDetail} onClose={()=>setHistoryDetail(null)} onRunAgain={runAgainFromHistory}/>}
          {perfTab==="test"&&<div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
            {/* ── LEFT: form ── */}
            <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:0}}>

              {/* Import from cURL */}
              <div style={card}>
                <H2 style={{marginBottom:8}}>Import from cURL</H2>
                <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginBottom:10}}>Paste a cURL command (from browser DevTools' "Copy as cURL", Postman, etc.) to auto-fill the method, URL, body, and auth below.</div>
                <textarea style={{...inp,height:70,fontFamily:"monospace",fontSize:12,resize:"vertical"}} value={curlDraft} onChange={e=>{setCurlDraft(e.target.value);setCurlErr("");}} placeholder={'curl -X POST https://api.example.com/items \\\n  -H "Authorization: Bearer eyJ..." \\\n  -d \'{"key":"value"}\''}/>
                <div style={{display:"flex",gap:10,alignItems:"center",marginTop:8}}>
                  <button onClick={applyCurl} disabled={!curlDraft.trim()} style={{...ghostBtn,opacity:curlDraft.trim()?1:0.5,cursor:curlDraft.trim()?"pointer":"not-allowed"}}>⬇ Import</button>
                  {curlErr&&<span style={{fontSize:12,color:"var(--color-text-danger)"}}>{curlErr}</span>}
                </div>
              </div>

              {/* Test type */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>Test Type</H2>
                <div style={{display:"flex",gap:12}}>
                  {[{v:"load",icon:"🏋",label:"Load Test",desc:"Steady traffic at a fixed VU count."},{v:"stress",icon:"🔥",label:"Stress Test",desc:"Steps up users (25→50→75→100%) to find the breaking point."}].map(o=>(
                    <button key={o.v} onClick={()=>s_({testType:o.v})} style={{flex:1,padding:14,borderRadius:12,border:"2px solid "+(perfForm.testType===o.v?"var(--color-text-info)":"var(--color-border-secondary)"),background:perfForm.testType===o.v?"var(--color-background-info)":"var(--color-background-primary)",cursor:"pointer",textAlign:"left"}}>
                      <div style={{fontSize:20,marginBottom:4}}>{o.icon}</div>
                      <div style={{fontWeight:500,fontSize:14}}>{o.label}</div>
                      <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{o.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Request Mode */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>Request Mode</H2>
                <div style={{display:"flex",gap:12}}>
                  {[{v:"single",icon:"🎯",label:"Single Endpoint",desc:"Hammer one API with load."},{v:"flow",icon:"🔗",label:"API Flow",desc:"Run a sequence of APIs in order each iteration — e.g. login → use token → call protected API."}].map(o=>(
                    <button key={o.v} onClick={()=>s_({mode:o.v})} style={{flex:1,padding:14,borderRadius:12,border:"2px solid "+(perfForm.mode===o.v?"var(--color-text-info)":"var(--color-border-secondary)"),background:perfForm.mode===o.v?"var(--color-background-info)":"var(--color-background-primary)",cursor:"pointer",textAlign:"left"}}>
                      <div style={{fontSize:20,marginBottom:4}}>{o.icon}</div>
                      <div style={{fontWeight:500,fontSize:14}}>{o.label}</div>
                      <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{o.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* API Details */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>{perfForm.mode==="flow"?"Flow Details":"API Details"}</H2>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div><Lbl>Test Name *</Lbl><input style={inp} value={perfForm.testName} onChange={e=>s_({testName:e.target.value})} placeholder="e.g. Login API — Load Test"/></div>
                  {perfForm.mode==="single"&&<div style={{display:"flex",gap:12}}>
                    <div style={{width:130}}>
                      <Lbl>Method</Lbl>
                      <select style={{...inp,width:"100%"}} value={perfForm.method} onChange={e=>s_({method:e.target.value})}>
                        {["GET","POST","PUT","PATCH","DELETE"].map(m=><option key={m}>{m}</option>)}
                      </select>
                    </div>
                    <div style={{flex:1}}><Lbl>API Endpoint URL *</Lbl><input style={inp} value={perfForm.apiUrl} onChange={e=>s_({apiUrl:e.target.value})} placeholder="https://api.example.com/endpoint or .../items/{{itemId}}"/></div>
                  </div>}
                  {perfForm.mode==="flow"&&<div>
                    <Lbl>Steps <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>— run in order, once per iteration. A step can extract a field from its JSON response into a variable the later steps reuse via {"{{name}}"}.</span></Lbl>
                    <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
                      {(perfForm.steps||[]).map((st,i)=>{
                        const upd=patch=>s_({steps:perfForm.steps.map((s2,j)=>j===i?{...s2,...patch}:s2)});
                        const move=dir=>{
                          const j=i+dir; if(j<0||j>=perfForm.steps.length)return;
                          const next=[...perfForm.steps]; [next[i],next[j]]=[next[j],next[i]]; s_({steps:next});
                        };
                        return <div key={st.id} style={{border:"1px solid var(--color-border-secondary)",borderRadius:10,padding:12,background:"var(--color-background-secondary)"}}>
                          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                            <span style={{fontSize:12,fontWeight:600,color:"var(--color-text-tertiary)",flexShrink:0}}>#{i+1}</span>
                            <input style={{...inp,flex:1}} value={st.name} placeholder={`Step name (optional), e.g. "Login"`} onChange={e=>upd({name:e.target.value})}/>
                            <button onClick={()=>move(-1)} disabled={i===0} style={{...ghostBtn,padding:"0 8px",opacity:i===0?0.35:1,cursor:i===0?"not-allowed":"pointer"}} title="Move up">↑</button>
                            <button onClick={()=>move(1)} disabled={i===perfForm.steps.length-1} style={{...ghostBtn,padding:"0 8px",opacity:i===perfForm.steps.length-1?0.35:1,cursor:i===perfForm.steps.length-1?"not-allowed":"pointer"}} title="Move down">↓</button>
                            <button onClick={()=>s_({steps:perfForm.steps.filter((_,j)=>j!==i)})} style={{...ghostBtn,padding:"0 8px"}} title="Remove step">✕</button>
                          </div>
                          <div style={{display:"flex",gap:8,marginBottom:8}}>
                            <div style={{width:120}}>
                              <select style={{...inp,width:"100%"}} value={st.method} onChange={e=>upd({method:e.target.value})}>
                                {["GET","POST","PUT","PATCH","DELETE"].map(m=><option key={m}>{m}</option>)}
                              </select>
                            </div>
                            <input style={{...inp,flex:1}} value={st.url} placeholder="https://api.example.com/endpoint or .../items/{{itemId}}" onChange={e=>upd({url:e.target.value})}/>
                            <input style={{...inpN,width:90}} type="number" value={st.expectedStatus} title="Expected status code" onChange={e=>upd({expectedStatus:parseInt(e.target.value)||200})}/>
                          </div>
                          {["POST","PUT","PATCH"].includes(st.method)&&<textarea style={{...inp,width:"100%",height:56,fontFamily:"monospace",fontSize:12,resize:"vertical",marginBottom:8}} value={st.requestBody} onChange={e=>upd({requestBody:e.target.value})} placeholder='Request body (JSON), e.g. {"key":"{{value}}"}'/>}
                          <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            <span style={{fontSize:11,color:"var(--color-text-tertiary)",flexShrink:0}}>Save response field as variable:</span>
                            <input style={{...inp,flex:1}} value={st.extractPath} placeholder="field path, e.g. data.token or id" onChange={e=>upd({extractPath:e.target.value})}/>
                            <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>→ {"{{"}</span>
                            <input style={{...inp,width:120}} value={st.extractVar} placeholder="varName" onChange={e=>upd({extractVar:e.target.value})}/>
                            <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{"}}"}</span>
                          </div>
                        </div>;
                      })}
                    </div>
                    <button onClick={()=>s_({steps:[...(perfForm.steps||[]),PERF_STEP_DEFAULT()]})} style={{...ghostBtn,fontSize:12,marginTop:8}}>+ Add Step</button>
                  </div>}
                  <div>
                    <Lbl>Configurable Variables <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>— reference as {"{{name}}"} anywhere {perfForm.mode==="flow"?"in a step's URL/body above":"in the URL above"}; each becomes overridable per run</span></Lbl>
                    {(perfForm.variables||[]).map((v,i)=>(
                      <div key={i} style={{display:"flex",gap:8,marginTop:6}}>
                        <input style={{...inp,flex:1}} value={v.name} placeholder="e.g. auctionItemId" onChange={e=>{
                          const next=[...perfForm.variables]; next[i]={...next[i],name:e.target.value}; s_({variables:next});
                        }}/>
                        <input style={{...inp,flex:1}} value={v.value} placeholder="default value" onChange={e=>{
                          const next=[...perfForm.variables]; next[i]={...next[i],value:e.target.value}; s_({variables:next});
                        }}/>
                        <button onClick={()=>s_({variables:perfForm.variables.filter((_,j)=>j!==i)})} style={{...ghostBtn,padding:"0 10px"}} title="Remove">✕</button>
                      </div>
                    ))}
                    <button onClick={()=>s_({variables:[...(perfForm.variables||[]),{name:"",value:""}]})} style={{...ghostBtn,fontSize:12,marginTop:8}}>+ Add Variable</button>
                  </div>
                  {perfForm.mode==="single"&&<div style={{maxWidth:200}}><Lbl>Expected Status Code</Lbl><input style={inpN} type="number" value={perfForm.expectedStatus} onChange={e=>s_({expectedStatus:parseInt(e.target.value)||200})}/></div>}
                  <div>
                    <Lbl>Authentication</Lbl>
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      {[{v:"none",label:"🔓 None"},{v:"bearer",label:"🔑 Bearer"},{v:"basic",label:"👤 Basic"},{v:"csv",label:"🔄 Dynamic"}].map(o=>(
                        <button key={o.v} onClick={()=>s_({authType:o.v})} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(perfForm.authType===o.v?"var(--color-text-info)":"var(--color-border-secondary)"),background:perfForm.authType===o.v?"var(--color-background-info)":"transparent",cursor:"pointer",fontSize:13,fontWeight:perfForm.authType===o.v?600:400,color:perfForm.authType===o.v?"var(--color-text-info)":"var(--color-text-secondary)"}}>
                          {o.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  {perfForm.authType==="bearer"&&<div><Lbl>Bearer Token *</Lbl><input style={inp} value={perfForm.token} onChange={e=>s_({token:e.target.value})} placeholder="eyJhbGci…"/></div>}
                  {perfForm.authType==="basic"&&<div style={{display:"flex",gap:12}}>
                    <div style={{flex:1}}><Lbl>Username *</Lbl><input style={inp} value={perfForm.basicUsername} onChange={e=>s_({basicUsername:e.target.value})} placeholder="admin"/></div>
                    <div style={{flex:1}}><Lbl>Password *</Lbl><input style={{...inp}} type="password" value={perfForm.basicPassword} onChange={e=>s_({basicPassword:e.target.value})} placeholder="••••••"/></div>
                  </div>}
                  {perfForm.authType==="csv"&&<div>
                    <Lbl>Upload CSV File *</Lbl>
                    <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginBottom:8}}>CSV must have columns: <strong>username</strong> (or <em>email</em>/<em>login</em>) and <strong>password</strong> (or <em>pass</em>/<em>pwd</em>). Each virtual user cycles through the rows.</div>
                    <input type="file" accept=".csv" id="csvUploadInput" style={{display:"none"}} onChange={e=>{
                      const file=e.target.files[0];
                      if(!file)return;
                      const reader=new FileReader();
                      reader.onload=ev=>{
                        const result=parseCSVUsers(ev.target.result);
                        if(result.error){s_({csvError:result.error,csvUsers:null,csvFileName:file.name});}
                        else{s_({csvUsers:result.users,csvFileName:file.name,csvError:""});}
                      };
                      reader.readAsText(file);
                      e.target.value="";
                    }}/>
                    <label htmlFor="csvUploadInput" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"var(--color-background-tertiary)",cursor:"pointer",fontSize:13,fontWeight:500}}>
                      📁 {perfForm.csvFileName?perfForm.csvFileName:"Choose CSV File"}
                    </label>
                    {perfForm.csvError&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"var(--color-background-danger)",border:"1px solid var(--color-text-danger)",color:"var(--color-text-danger)",fontSize:13}}>⚠ {perfForm.csvError}</div>}
                    {perfForm.csvUsers&&perfForm.csvUsers.length>0&&<div style={{marginTop:10}}>
                      <div style={{fontSize:13,color:"var(--color-text-success)",fontWeight:500,marginBottom:6}}>✓ {perfForm.csvUsers.length} users loaded</div>
                      <div style={{fontSize:12,background:"var(--color-background-tertiary)",border:"1px solid var(--color-border-tertiary)",borderRadius:8,padding:"8px 12px",fontFamily:"monospace",maxHeight:110,overflowY:"auto"}}>
                        <div style={{fontWeight:600,color:"var(--color-text-secondary)",marginBottom:4,borderBottom:"1px solid var(--color-border-tertiary)",paddingBottom:4}}>username · password</div>
                        {perfForm.csvUsers.slice(0,4).map((u,i)=><div key={i} style={{color:"var(--color-text-primary)",padding:"2px 0"}}>{u.username} · {"•".repeat(Math.min(u.password.length,10))}</div>)}
                        {perfForm.csvUsers.length>4&&<div style={{color:"var(--color-text-tertiary)",marginTop:4}}>… and {perfForm.csvUsers.length-4} more</div>}
                      </div>
                    </div>}
                  </div>}
                  <div>
                    <Lbl>Custom Headers <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>— for auth your API expects in its own header, e.g. X-Api-Key. Values can reference {"{{variables}}"} too.</span></Lbl>
                    {(perfForm.customHeaders||[]).map((h,i)=>(
                      <div key={i} style={{display:"flex",gap:8,marginTop:6}}>
                        <input style={{...inp,flex:1}} value={h.name} placeholder="e.g. X-Api-Key" onChange={e=>{
                          const next=[...perfForm.customHeaders]; next[i]={...next[i],name:e.target.value}; s_({customHeaders:next});
                        }}/>
                        <input style={{...inp,flex:1}} value={h.value} placeholder="header value" onChange={e=>{
                          const next=[...perfForm.customHeaders]; next[i]={...next[i],value:e.target.value}; s_({customHeaders:next});
                        }}/>
                        <button onClick={()=>s_({customHeaders:perfForm.customHeaders.filter((_,j)=>j!==i)})} style={{...ghostBtn,padding:"0 10px"}} title="Remove">✕</button>
                      </div>
                    ))}
                    <button onClick={()=>s_({customHeaders:[...(perfForm.customHeaders||[]),{name:"",value:""}]})} style={{...ghostBtn,fontSize:12,marginTop:8}}>+ Add Header</button>
                  </div>
                  {perfForm.mode==="single"&&["POST","PUT","PATCH"].includes(perfForm.method)&&<div><Lbl>Request Body (JSON) <span style={{fontWeight:400,color:"var(--color-text-tertiary)"}}>— can reference {"{{variables}}"} too</span></Lbl><textarea style={{...inp,height:76,fontFamily:"monospace",resize:"vertical"}} value={perfForm.requestBody} onChange={e=>s_({requestBody:e.target.value})} placeholder='{"key":"{{value}}"}'/></div>}
                </div>
              </div>

              {/* Load Profile */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>Load Profile</H2>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <div><Lbl>{isStress?"Max Virtual Users":"Virtual Users"}</Lbl><input style={inpN} type="number" min="1" max="1000" value={perfForm.vus} onChange={e=>s_({vus:parseInt(e.target.value)||1})}/></div>
                  <div>
                    <Lbl>{isStress?"Duration / Step":"Duration"}</Lbl>
                    <select style={{...inp}} value={perfForm.duration} onChange={e=>s_({duration:e.target.value})}>
                      <option value="30s">30 seconds</option><option value="60s">1 minute</option><option value="2m">2 minutes</option><option value="5m">5 minutes</option>
                    </select>
                  </div>
                  {!isStress&&<div>
                    <Lbl>Ramp Up/Down</Lbl>
                    <select style={{...inp}} value={perfForm.ramp} onChange={e=>s_({ramp:e.target.value})}>
                      <option value="5s">5 seconds</option><option value="10s">10 seconds</option><option value="30s">30 seconds</option>
                    </select>
                  </div>}
                </div>
              </div>

              {/* Thresholds */}
              <div style={card}>
                <H2 style={{marginBottom:12}}>Thresholds</H2>
                <div style={{maxWidth:260}}>
                  <Lbl>p95 Response Time (ms)</Lbl>
                  <input style={inpN} type="number" value={perfForm.p95Threshold} onChange={e=>s_({p95Threshold:parseInt(e.target.value)||2000})}/>
                  <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:4}}>Test fails if 95% of requests exceed this limit. Industry standard ≤ 2000 ms.</div>
                </div>
              </div>

              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <Btn v="primary" onClick={doRunPerfTest} disabled={!perfForm.testName.trim()||(perfForm.mode==="flow"?perfFlowStepsValid().length===0:!perfForm.apiUrl.trim())||(perfForm.authType==="csv"&&(!perfForm.csvUsers||perfForm.csvUsers.length===0))}>▶ Start Test</Btn>
                <button onClick={()=>setPhase("testType")} style={{...ghostBtn,fontSize:13}}>← Back</button>
              </div>
            </div>

            {/* ── RIGHT: live summary ── */}
            <div style={{width:230,flexShrink:0}}>
              <div style={{...card,position:"sticky",top:0}}>
                <H2 style={{marginBottom:12}}>Test Summary</H2>
                {(()=>{
                  const namedVars=(perfForm.variables||[]).filter(v=>v.name.trim());
                  const namedHeaders=(perfForm.customHeaders||[]).filter(h=>h.name.trim());
                  const isFlowMode=perfForm.mode==="flow";
                  const validSteps=(perfForm.steps||[]).filter(s=>s.url&&s.url.trim());
                  return [
                  {label:"Type",val:<Tag c={isStress?"red":"blue"}>{isStress?"Stress":"Load"}</Tag>},
                  {label:"Name",val:perfForm.testName||"—"},
                  ...(isFlowMode
                    ?[{label:"Flow",val:validSteps.length?`${validSteps.length} step(s)`:"—"}]
                    :[{label:"Method",val:<Tag c="blue">{perfForm.method}</Tag>},
                      {label:"URL",val:<span style={{fontSize:11,wordBreak:"break-all"}}>{perfForm.apiUrl||"—"}</span>}]),
                  {label:"Variables",val:namedVars.length?namedVars.map(v=>v.name).join(", "):"—"},
                  {label:"Custom Headers",val:namedHeaders.length?namedHeaders.map(h=>h.name).join(", "):"—"},
                  {label:"Auth",val:perfForm.authType==="bearer"?"🔑 Bearer":perfForm.authType==="basic"?"👤 Basic":perfForm.authType==="csv"?("🔄 Dynamic ("+(perfForm.csvUsers?.length||0)+" users)"):"🔓 None"},
                  null,
                  {label:"Virtual Users",val:isStress?perfForm.vus+" (max)":String(perfForm.vus)},
                  {label:"Duration",val:isStress?(durLabels[perfForm.duration]+" / step"):(durLabels[perfForm.duration]||perfForm.duration)},
                  {label:"Est. Total",val:`~${Math.floor(totalSec/60)}m ${totalSec%60}s`},
                  {label:"p95 Threshold",val:perfForm.p95Threshold+" ms"},
                ].map((row,i)=>row===null
                  ?<div key={i} style={{borderTop:"1px solid var(--color-border-tertiary)",margin:"8px 0"}}/>
                  :<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,gap:8}}>
                    <span style={{fontSize:12,color:"var(--color-text-tertiary)",flexShrink:0}}>{row.label}</span>
                    <span style={{fontSize:12,fontWeight:500,textAlign:"right"}}>{row.val}</span>
                  </div>
                  );
                })()}
                {isStress&&<div style={{marginTop:8,fontSize:12,color:"var(--color-text-secondary)",background:"var(--color-background-warning)",padding:"8px 10px",borderRadius:8}}>
                  🔥 Steps: {Math.ceil(perfForm.vus*.25)} → {Math.ceil(perfForm.vus*.5)} → {Math.ceil(perfForm.vus*.75)} → {perfForm.vus} VUs
                </div>}
                {perfForm.mode==="flow"&&(perfForm.steps||[]).filter(s=>s.url&&s.url.trim()).length>0&&<div style={{marginTop:8,fontSize:11,background:"var(--color-background-tertiary)",border:"1px solid var(--color-border-tertiary)",borderRadius:8,padding:"8px 10px"}}>
                  {(perfForm.steps||[]).filter(s=>s.url&&s.url.trim()).map((s,i)=><div key={s.id} style={{padding:"3px 0",display:"flex",gap:6,alignItems:"baseline"}}>
                    <span style={{color:"var(--color-text-tertiary)",flexShrink:0}}>{i+1}.</span>
                    <span style={{fontWeight:600,flexShrink:0}}>{s.method}</span>
                    <span style={{wordBreak:"break-all"}}>{s.name?.trim()||s.url}</span>
                  </div>)}
                </div>}
              </div>
            </div>
          </div>}
          </div>;
        })()}

        {!loading&&!perfLoading&&phase==="perfResult"&&perfResult&&(()=>{
          const pass=perfResult.passed;
          const m=perfResult.metrics||{};

                <Lbl>Title</Lbl><input style={{...inp,marginBottom:8,fontWeight:500}} value={c.title} onChange={e=>editC(c.id,"title",e.target.value)} disabled={!editOn}/>

                <Lbl>Test Data</Lbl><textarea style={{...ta,marginBottom:8,minHeight:50}} rows={2} value={c.testData||""} onChange={e=>editC(c.id,"testData",e.target.value)} disabled={!editOn} placeholder="e.g. username: admin / password: Test@123"/>
                <Lbl>Steps</Lbl>
                {(c.steps||[]).map((step,si)=><div key={si} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"var(--color-text-tertiary)",minWidth:18}}>{si+1}.</span>
                  <input style={{...inp,flex:1}} value={step} onChange={e=>editS(c.id,si,e.target.value)} disabled={!editOn}/>
                  {editOn&&<button onClick={()=>delStep(c.id,si)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"0 4px",lineHeight:1,flexShrink:0}}>✕</button>}
                </div>)}
                {editOn&&<button onClick={()=>addStep(c.id)} style={{marginTop:6,padding:"4px 10px",borderRadius:6,border:"1px dashed var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>+ Add step</button>}
                <Lbl>Expected result</Lbl><input style={{...inp,marginBottom:8}} value={c.expected||""} onChange={e=>editC(c.id,"expected",e.target.value)} disabled={!editOn}/>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,cursor:editOn?"pointer":"default",opacity:editOn?1:0.6}}>
                  <input type="checkbox" checked={c.automatable!==false} disabled={!editOn} onChange={e=>editC(c.id,"automatable",e.target.checked)}/> Automatable
                </label>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,minWidth:96}}><Btn v="success" onClick={()=>approve(c.id)}>✓ Approve</Btn><Btn v="danger" onClick={()=>reject(c.id)}>✗ Reject</Btn></div>
            </div>
          </div>)}
          {rejectedCases.length > 0 && <div style={{marginTop:16}}>
            <button onClick={()=>setShowRejected(o=>!o)} style={{fontSize:12,color:"#94A3B8",background:"none",border:"1px solid #94A3B8",borderRadius:4,padding:"3px 8px",cursor:"pointer"}}>
              {(showRejected ? "Hide" : "Show") + " " + rejectedCases.length + " rejected case" + (rejectedCases.length > 1 ? "s" : "")}
            </button>
            {showRejected && <div style={{marginTop:8}}>
              {rejectedCases.map(c => <div key={c.id} style={{opacity:0.6,borderLeft:"3px solid #EF4444",paddingLeft:8,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"#EF4444"}}>Rejected</span>
                <span style={{fontSize:13,flex:1}}>{c.title}</span>
                <button onClick={()=>setCases(cs=>cs.map(x=>x.id===c.id?{...x,status:"pending"}:x))} style={{fontSize:11,padding:"2px 6px",borderRadius:3,border:"1px solid #94A3B8",background:"none",cursor:"pointer"}}>Restore</button>
              </div>)}
            </div>}
          </div>}
          <div style={{marginBottom:16,marginTop:16}}>
            <button onClick={()=>setShowAddCase(o=>!o)} style={{...ghostBtn,borderStyle:"dashed"}}>+ Add test case manually</button>
          </div>
          {showAddCase&&<div style={{...card,border:"2px dashed var(--color-border-secondary)",marginBottom:16}}>
            <div style={{fontWeight:500,marginBottom:12}}>New manual test case</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div style={{gridColumn:"1/-1"}}><Lbl>Title <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl><input style={{...inp,borderColor:newCaseErr&&!newCase.title.trim()?"var(--color-text-danger)":undefined}} value={newCase.title} onChange={e=>{setNewCase(p=>({...p,title:e.target.value}));if(newCaseErr)setNewCaseErr("");}} placeholder="e.g. Submit form with valid data"/></div>
              <div><Lbl>Type</Lbl><select style={sel} value={newCase.type} onChange={e=>setNewCase(p=>({...p,type:e.target.value}))}><option value="happy">Happy flow</option><option value="edge">Edge case</option><option value="negative">Negative</option></select></div>
              <div><Lbl>Platform</Lbl><select style={sel} value={newCase.platform} onChange={e=>setNewCase(p=>({...p,platform:e.target.value}))}><option value="web">Web</option><option value="mobile">Mobile</option><option value="both">Web + Mobile</option></select></div>
              <div style={{gridColumn:"1/-1"}}><Lbl>Preconditions</Lbl><input style={inp} value={newCase.preconditions} onChange={e=>setNewCase(p=>({...p,preconditions:e.target.value}))} placeholder="e.g. User is logged in"/></div>
            </div>
            <Lbl>Steps</Lbl>
            {newCase.steps.map((s,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--color-text-tertiary)",minWidth:18}}>{i+1}.</span>
              <input style={inp} value={s} onChange={e=>setNewCase(p=>({...p,steps:p.steps.map((x,j)=>j===i?e.target.value:x)}))} placeholder={"Step "+(i+1)}/>
              {newCase.steps.length>1&&<button onClick={()=>setNewCase(p=>({...p,steps:p.steps.filter((_,j)=>j!==i)}))} style={{padding:"4px 8px",borderRadius:6,border:"none",background:"var(--color-background-danger)",color:"var(--color-text-danger)",cursor:"pointer",fontSize:12}}>✕</button>}
            </div>)}
            <button onClick={()=>setNewCase(p=>({...p,steps:[...p.steps,""]}))} style={{marginBottom:10,padding:"4px 10px",borderRadius:6,border:"1px dashed var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>+ Add step</button>
            <div style={{marginBottom:12}}><Lbl>Expected result <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl><input style={{...inp,borderColor:newCaseErr&&!newCase.expected.trim()?"var(--color-text-danger)":undefined}} value={newCase.expected} onChange={e=>{setNewCase(p=>({...p,expected:e.target.value}));if(newCaseErr)setNewCaseErr("");}} placeholder="e.g. Success message shown"/></div>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,marginBottom:14,cursor:"pointer"}}>
              <input type="checkbox" checked={newCase.automatable} onChange={e=>setNewCase(p=>({...p,automatable:e.target.checked}))}/> Automatable
            </label>
            {newCaseErr&&<div style={{marginBottom:10,padding:"8px 12px",borderRadius:8,background:"var(--color-background-danger)",border:"1px solid var(--color-text-danger)",color:"var(--color-text-danger)",fontSize:13}}>⚠ {newCaseErr}</div>}
            <div style={{display:"flex",gap:8}}><Btn v="primary" onClick={addManualCase}>Add case</Btn><button onClick={()=>{setShowAddCase(false);setNewCaseErr("");}} style={ghostBtn}>Cancel</button></div>
          </div>}
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {cases.filter(c=>c.status==="pending").length>0
              ?<Btn v="primary" onClick={()=>{setCases(cs=>cs.map(c=>c.status==="pending"?{...c,status:"approved"}:c));goToNextPhase();}}>✓ Approve {cases.filter(c=>c.status==="pending").length} Remaining & Continue</Btn>
              :<Btn v="primary" onClick={goToNextPhase}>Continue →</Btn>}
          </div>
        </div>;})()}

        {!loading&&phase==="jira"&&<div>
          <div style={{...card,padding:"16px 20px"}}>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:14}}>Story <b>{sid}</b> · <b>{approved.length}</b> approved cases · <Tag c="blue">web</Tag></div>
            <div style={{display:"flex",gap:10}}>
              <Btn v="primary" onClick={()=>{exportExcel(cases,sid);setAppUrl("");setPhase("urlPrompt");}}>⬇ Export AIO Excel</Btn>
              <Btn v="ghost" onClick={()=>{exportCSV(cases,sid);setAppUrl("");setPhase("urlPrompt");}}>⬇ Export AIO CSV</Btn>
              <Btn v="success" onClick={doAioImport}>⬆ Import to AIO Tests</Btn>
              <button onClick={()=>{setAppUrl("");setPhase("urlPrompt");}} style={ghostBtn}>Skip</button>
            </div>
          </div>
        </div>}

        {!loading&&phase==="urlPrompt"&&(()=>{
          const attachedConfigured=!forceManual&&!!(proj?.frontendRepoUrl?.trim()||proj?.backendRepoUrl?.trim());
          return <div>
          <div style={card}>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}><span style={{fontSize:20}}>🔗</span><span style={{fontWeight:500,fontSize:16}}>Application URL</span></div>
            <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16,lineHeight:1.6}}>Enter the URL of the application under test.</div>
            <Lbl>Application URL <span style={{color:"var(--color-text-danger)"}}>*</span></Lbl>
            <input autoFocus style={{...inp,marginBottom:16,fontSize:14}} value={appUrl} onChange={e=>{setAppUrl(e.target.value);setForceManual(false);}} placeholder="https://example.com" onKeyDown={e=>e.key==="Enter"&&appUrl.trim()&&checkAttachment()}/>
            {attachedConfigured&&<div style={{...card,marginBottom:16,background:"var(--color-background-info)",border:"1px solid var(--color-border-secondary)"}}>
              <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-info)"}}>🔗 Attached: {[proj.frontendRepoUrl?.trim()&&"Frontend",proj.backendRepoUrl?.trim()&&"Backend"].filter(Boolean).join(" + ")}</div>
              <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:4}}>Continue will verify the repo is reachable, then generate and run scripts automatically — no manual recording needed.</div>
            </div>}
            {forceManual&&<div style={{...card,marginBottom:16,background:"var(--color-background-warning)",border:"1px solid var(--color-border-warning)"}}>
              <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-warning)"}}>⚠️ Falling back to manual recording — the attached repo was unreachable.</div>
            </div>}
            {!attachedConfigured&&codegenScript&&<div style={{...card,marginBottom:16,background:"var(--color-background-success)",border:"1px solid var(--color-text-success)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-success)"}}>✅ Codegen recording ready — locators will be used in script generation</div>
                <button onClick={()=>{setCodegenScript("");setCodegenStatus("idle");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--color-text-tertiary)"}}>✕ Clear</button>
              </div>
            </div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <Btn v="primary" onClick={()=>appUrl.trim()&&checkAttachment()} disabled={!appUrl.trim()}>
                {attachedConfigured?"Continue →":codegenScript?"Generate Scripts with Recorded Locators →":"Continue to Script Generation →"}
              </Btn>
              {!attachedConfigured&&<button onClick={()=>appUrl.trim()&&startCodegen()} disabled={!appUrl.trim()||codegenStatus==="launching"} style={{padding:"8px 18px",borderRadius:8,border:"1px solid #0052CC",background:appUrl.trim()?"#0052CC":"var(--color-background-tertiary)",color:appUrl.trim()?"#fff":"var(--color-text-tertiary)",cursor:appUrl.trim()?"pointer":"not-allowed",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",gap:8}}>
                {codegenStatus==="launching"?"Launching…":"🎭 Record with Playwright Codegen"}
              </button>}
            </div>
            {!attachedConfigured&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:8,background:"var(--color-background-tertiary)",fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.6}}>
              <b>💡 Playwright Codegen</b> opens a live browser at your URL. Perform your test actions manually — clicks, form fills, navigation — and the platform captures the exact locators to use in the generated scripts. Close the browser when done.
            </div>}
          </div>
        </div>;})()}

        {phase==="checkingAttachment"&&<Loader msg="Checking attached project…" sub="Verifying repo access and pulling latest source"/>}

        {!loading&&phase==="attachError"&&<div>
          <Banner icon="⚠️" title="Attached project unreachable" sub={[attachCheck?.frontend?.attached&&!attachCheck.frontend.reachable&&`Frontend (${attachCheck.frontend.name}): ${attachCheck.frontend.error}`,attachCheck?.backend?.attached&&!attachCheck.backend.reachable&&`Backend (${attachCheck.backend.name}): ${attachCheck.backend.error}`].filter(Boolean).join(" · ")||"Could not verify the attached repository."} color="danger"/>
          <div style={{display:"flex",gap:10,marginTop:12}}>
            <Btn v="primary" onClick={checkAttachment}>🔄 Retry Check</Btn>
            <button onClick={()=>{setAutoExecute(false);setAttachStatus("none");setForceManual(true);setPhase("urlPrompt");}} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Fall back to Playwright Codegen instead</button>
          </div>
        </div>}

        {phase==="codegenRecording"&&<div>
          <div style={card}>
            <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}><span style={{fontSize:24}}>🎭</span><div><div style={{fontWeight:600,fontSize:16}}>Playwright Codegen — Live Recording</div><div style={{fontSize:13,color:"var(--color-text-secondary)",marginTop:2}}>{appUrl}</div></div></div>
            {codegenStatus==="launching"&&<Loader msg="Launching browser…" sub="Opening Playwright Codegen for your application"/>}
            {codegenStatus==="running"&&<div>
              <div style={{...card,background:"var(--color-background-danger)",border:"1px solid var(--color-text-danger)",marginBottom:16}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:"var(--color-text-danger)",display:"inline-block",animation:"qa-pulse 1.2s ease-in-out infinite",flexShrink:0}}/>
                  <div><div style={{fontWeight:600,fontSize:14,color:"var(--color-text-danger)"}}>Recording in progress</div><div style={{fontSize:13,color:"var(--color-text-secondary)",marginTop:2}}>A browser window has opened. Perform your test actions — clicks, form fills, navigation — then <b>close the browser</b> to stop recording.</div></div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                {["Click elements and buttons","Fill in form fields","Navigate between pages"].map((tip,i)=><div key={i} style={{padding:"10px 12px",borderRadius:8,background:"var(--color-background-tertiary)",fontSize:12,color:"var(--color-text-secondary)"}}><span style={{marginRight:6}}>{"🖱️✏️🔗"[i]}</span>{tip}</div>)}
              </div>
              <button onClick={cancelCodegen} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>✕ Cancel Recording</button>
            </div>}
            {codegenStatus==="done"&&<div>
              <Banner icon="✅" title="Recording complete!" sub={"Playwright locators captured — they will be used in script generation."} color="success"/>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:6}}>Recorded script preview:</div>
                <pre style={{background:"var(--color-background-tertiary)",borderRadius:8,padding:14,fontSize:11,fontFamily:"monospace",lineHeight:1.6,overflow:"auto",maxHeight:280,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0}}>{codegenScript}</pre>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <Btn v="primary" onClick={()=>setPhase("scriptSelect")}>Use Recorded Locators →</Btn>
                <button onClick={startCodegen} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>🔄 Record Again</button>
                <button onClick={()=>{setCodegenScript("");setCodegenStatus("idle");setPhase("scriptSelect");}} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Skip Recording</button>
              </div>
            </div>}
            {codegenStatus==="empty"&&<div>
              <Banner icon="⚠️" title="No actions recorded" sub="The browser was closed without performing any actions." color="warning"/>
              <div style={{display:"flex",gap:10,marginTop:12}}>
                <Btn v="primary" onClick={startCodegen}>🎭 Try Again</Btn>
                <button onClick={()=>setPhase("scriptSelect")} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Continue Without Recording</button>
              </div>
            </div>}
            {(codegenStatus==="error"||codegenStatus==="not_installed")&&<div>
              <Banner icon="❌" title={codegenStatus==="not_installed"?"Playwright not installed":"Codegen failed"} sub={codegenStatus==="not_installed"?"Run: npx playwright install  in your terminal, then try again.":"An error occurred starting the codegen session."} color="danger"/>
              <div style={{display:"flex",gap:10,marginTop:12}}>
                <Btn v="primary" onClick={startCodegen}>Retry</Btn>
                <button onClick={()=>setPhase("scriptSelect")} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"transparent",cursor:"pointer",fontSize:14,color:"var(--color-text-secondary)"}}>Continue Without Recording</button>
              </div>
            </div>}
          </div>
        </div>}

        {!loading&&phase==="scriptSelect"&&<div>
          {autoExecute&&attachCheck&&<Banner icon="🔗" title={"Attached: "+[attachCheck.frontend?.reachable&&attachCheck.frontend.name,attachCheck.backend?.reachable&&attachCheck.backend.name].filter(Boolean).join(" + ")} sub={[attachCheck.frontend&&!attachCheck.frontend.reachable&&"⚠ Frontend not reachable — proceeding with backend only",attachCheck.backend&&!attachCheck.backend.reachable&&"⚠ Backend not reachable — proceeding with frontend only",!attachCheck.frontend&&"No frontend attached",!attachCheck.backend&&"No backend attached"].filter(Boolean).join(" · ")+" — scripts will be generated and executed automatically after selection."} color="success"/>}
          <Banner icon="🤖" title="Select cases to automate" sub={autoable.length+" automatable cases available · "+manOnly.length+" manual-only"} color="info"/>
          {manOnly.length>0&&<div style={{...card,background:"var(--color-background-tertiary)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:500,fontSize:14}}>📋 {manOnly.length} case{manOnly.length!==1?"s":""} can't be automated — needs manual testing</div>
              <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{manOnly.filter(c=>c.manualStatus).length} of {manOnly.length} already tested</div>
            </div>
            <Btn onClick={()=>setPhase("manualExec")}>Execute Manual Tests →</Btn>
          </div>}
          {autoable.length>0&&<div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <H2>Choose cases for script generation</H2>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setSelectedForScripts(autoable.map(c=>c.id))} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>Select all</button>
                <button onClick={()=>setSelectedForScripts([])} style={{...ghostBtn,padding:"4px 10px",fontSize:12}}>Clear</button>
              </div>
            </div>
            {autoable.map(c=><label key={c.id} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:"1px solid var(--color-border-tertiary)",cursor:"pointer",alignItems:"center"}}>
              <input type="checkbox" checked={selectedForScripts.includes(c.id)} onChange={()=>setSelectedForScripts(p=>p.includes(c.id)?p.filter(x=>x!==c.id):[...p,c.id])}/>
              <Tag c="blue">{c.id}</Tag><Tag c={tcol(c.type)}>{c.type}</Tag><span style={{fontSize:14,flex:1}}>{c.title}</span>
            </label>)}
          </div>}
          <div style={{display:"flex",gap:10}}>
            {autoable.length>0
              ?<Btn v="primary" onClick={()=>selectedForScripts.length>0&&doScripts()} disabled={selectedForScripts.length===0}>{autoExecute?`Generate & Run Automatically (${selectedForScripts.length} cases)`:`Generate Scripts (${selectedForScripts.length} cases)`}</Btn>
              :<Btn v="primary" onClick={()=>setPhase("bugReport")}>Skip to Bug Report →</Btn>}
          </div>
        </div>}

        {!loading&&phase==="manualExec"&&(()=>{
          const done=manOnly.filter(c=>c.manualStatus).length;
          const setManual=(id,field,val)=>setCases(cs=>cs.map(c=>c.id===id?{...c,[field]:val}:c));
          return <div>
            <Banner icon="📋" title="Manual test execution" sub={done+" of "+manOnly.length+" cases tested"} color="info"/>
            {manOnly.map(c=><div key={c.id} style={{...card,borderLeft:"3px solid "+(c.manualStatus==="pass"?"var(--color-text-success)":c.manualStatus==="fail"?"var(--color-text-danger)":c.manualStatus==="blocked"?"var(--color-text-warning)":"var(--color-border-secondary)")}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                <Tag c="blue">{c.id}</Tag><Tag c={tcol(c.type)}>{c.type}</Tag><span style={{fontWeight:500,fontSize:14,flex:1}}>{c.title}</span>
              </div>
              {c.preconditions&&<div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:6}}><b>Preconditions:</b> {c.preconditions}</div>}
              <div style={{fontSize:13,marginBottom:6}}><b>Steps:</b>
                <ol style={{margin:"4px 0 0 18px",padding:0}}>{(c.steps||[]).map((s,i)=><li key={i} style={{marginBottom:2}}>{s}</li>)}</ol>
              </div>
              <div style={{fontSize:13,marginBottom:10}}><b>Expected:</b> {c.expected}</div>
              <textarea style={{...ta,marginBottom:10}} rows={2} value={c.manualActual||""} onChange={e=>setManual(c.id,"manualActual",e.target.value)} placeholder="Actual result observed while testing…"/>
              <div style={{display:"flex",gap:8}}>
                {[["pass","✓ Pass","success"],["fail","✗ Fail","danger"],["blocked","⛔ Blocked","warning"]].map(([v,label,color])=>
                  <button key={v} onClick={()=>setManual(c.id,"manualStatus",v)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(c.manualStatus===v?`var(--color-text-${color})`:"var(--color-border-secondary)"),background:c.manualStatus===v?`var(--color-background-${color})`:"transparent",color:c.manualStatus===v?`var(--color-text-${color})`:"var(--color-text-secondary)",cursor:"pointer",fontSize:13,fontWeight:500}}>{label}</button>
                )}
              </div>
            </div>)}
            <div style={{display:"flex",gap:10}}>
              <Btn v="primary" onClick={()=>setPhase(autoable.length>0?"scriptSelect":"bugReport")}>{done<manOnly.length?`Continue (${manOnly.length-done} untested) →`:"Continue →"}</Btn>
            </div>
          </div>;
        })()}

        {!loading&&phase==="autoReady"&&<div>
          {fixed&&<Banner icon="🔧" title="Scripts fixed" sub="Failures addressed." color="info"/>}
          {!autoExecute&&<Banner icon="📥" title="No project attached — download these scripts and run them locally against your own environment" sub="Auto-execution is only available when a frontend or backend repo is attached to this project." color="warning"/>}
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}><div style={{fontWeight:500}}>Automation scripts</div><Tag c="blue">{fwName()}</Tag></div>
            <Tabs tabs={[{id:"web",label:"Web automation script"}]} active="web" onChange={setTab}/>
